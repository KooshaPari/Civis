# Star Wars Stat Overrides
# Buffs to make Star Wars pack noticeable in-game

overrides:
  # Clone Trooper Elite - Republic gets dramatically tougher troops (VISIBLE TEST)
  - target: unit.stats.hp
    value: 5.0
    mode: multiply
    filter: Components.MeleeUnit

  - target: unit.stats.attack_cooldown
    value: 0.2
    mode: multiply
    filter: Components.MeleeUnit

  # Battle Droids - CIS gets fast swarms (VISIBLE TEST)
  - target: unit.stats.hp
    value: 0.3
    mode: multiply
    filter: Components.RangeUnit

  - target: unit.stats.speed
    value: 3.0
    mode: multiply
    filter: Components.RangeUnit
