# Local-first: PRs use quality.yml + pr-governance only.
# Legacy-tooling scanner (phenotype shared scanner) ran on every push to main.
# It is now dispatch-only: the scanner accepts a `--report-only` flag and is
# already installed in the dev environment (see scripts/phenotype-integration).
name: Legacy Tooling Gate (WARN Mode)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  legacy-tooling-scan:
    # Manual escape hatch: rerun the scanner on the cloud and PR-comment.
    if: github.event_name == 'workflow_dispatch'
    name: Legacy Tooling Anti-Pattern Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Checkout phenotype/repos for shared tools
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: kooshapari/phenotype
          path: phenotype-repos
          sparse-checkout: tooling/legacy-enforcement
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run Legacy Tooling Scanner (WARN Mode)
        run: |
          python3 phenotype-repos/tooling/legacy-enforcement/scanner/legacy_tooling_scanner.py \
            --repo-root . \
            --policy phenotype-repos/tooling/legacy-enforcement/policy/rules.yaml \
            --output-json legacy_tooling_report.json \
            --output-md legacy_tooling_report.md \
            --report-only
        continue-on-error: true
      - name: Upload scan report (JSON)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: legacy-tooling-report-json
          path: legacy_tooling_report.json
          retention-days: 30
      - name: Upload scan report (Markdown)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: legacy-tooling-report-md
          path: legacy_tooling_report.md
          retention-days: 30
