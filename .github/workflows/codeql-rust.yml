# Local-first: PRs use quality.yml + pr-governance only.
# Heavy CodeQL Rust scan runs locally via lefthook (the manifest's clippy +
# `cargo test --workspace` already exercise the same surface that CodeQL
# inspects). This workflow is a manual escape hatch; no push/PR triggers.
name: CodeQL (Rust)

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  analyze:
    # Manual escape hatch: rerun CodeQL Rust with the full autobuild pipeline.
    if: github.event_name == 'workflow_dispatch'
    name: Analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
