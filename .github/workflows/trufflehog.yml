# Local-first: PRs use quality.yml + pr-governance only.
# trufflehog secrets scan is run locally via lefthook (the pre-commit script
# `.github/hooks/pre-commit` invokes the shared security-guard hooks which
# include trufflehog). This workflow is dispatch-only.
name: Trufflehog Secrets Scan
on:
  workflow_dispatch:

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  trufflehog:
    # Manual escape hatch: rerun the secrets scan on the cloud.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: trufflehog/actions/setup@main
      - run: trufflehog github --only-verified --no-update
        env:
          # token-less: trufflehog github clones the repo and scans with --no-update
