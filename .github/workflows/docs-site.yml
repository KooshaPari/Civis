# Local-first: PRs use quality.yml + pr-governance only.
# Heavy docs check (bun install + Playwright chromium e2e) runs locally via
# `cd docs && bun run docs:check` and is gated by the same lefthook pre-push
# emission. The repo's pages.yml handles the actual VitePress build+deploy.
name: Docs Site

on:
  workflow_dispatch:

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  docs-build:
    # Manual escape hatch: rerun the full Playwright + e2e docs check.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install
      - name: Install docs deps
        working-directory: docs
        run: bun install
      - name: Install Playwright browsers
        working-directory: docs
        run: bunx playwright install chromium --with-deps
      - name: Docs check (build, unit, component, chromium e2e)
        working-directory: docs
        run: bun run docs:check
