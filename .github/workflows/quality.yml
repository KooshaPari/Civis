name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Rust test
        run: cargo test --all

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install docs deps
        run: bun install
      - name: Build docs
        run: bun run docs:build
