version: '3'

tasks:
  lint:
    desc: "Run linter with oxlint"
    cmds:
      - oxlint

  format:
    desc: "Format with oxfmt"
    cmds:
      - oxfmt --write .

  docs:dev:
    desc: "Start VitePress dev server"
    cmds:
      - bun run docs:dev

  docs:build:
    desc: "Build VitePress documentation"
    cmds:
      - bun run docs:build

  install:
    desc: "Install dependencies with bun"
    cmds:
      - bun install

  quality:
    desc: "Run quality checks (lint + docs build)"
    cmds:
      - task: lint
      - task: docs:build
