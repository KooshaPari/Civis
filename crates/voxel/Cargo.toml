[package]
name = "civ-voxel"
description = "Adaptive voxel substrate: sparse octree + dense leaf chunks; deterministic mesh-dirty queue"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"

# Adaptive graphics kernel shared across Phenotype-org game clients.
# The dependency is renamed to preserve the existing phenotype_voxel import path
# while sourcing the absorbed kernel from phenotype-gfx.
phenotype-voxel = { package = "phenotype-gfx", git = "https://github.com/KooshaPari/phenotype-gfx.git" }

[dev-dependencies]
proptest = "1.4"
