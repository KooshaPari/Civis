name: Asset Pipeline Build

on:
  push:
    branches: [main]
    paths:
      - 'src/Tools/PackCompiler/**'
      - 'packs/**'
      - '.github/workflows/asset-pipeline.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test Asset Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj /p:RestoreLockedMode=true

      - name: Build PackCompiler
        run: dotnet build src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj -c Debug --no-restore

      - name: Run unit tests
        run: dotnet test src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj --verbosity normal --no-build

      - name: Test asset pipeline - import
        continue-on-error: true
        run: dotnet run --no-build --project src/Tools/PackCompiler -- assets import packs/warfare-starwars

      - name: Test asset pipeline - validate
        continue-on-error: true
        run: dotnet run --no-build --project src/Tools/PackCompiler -- assets validate packs/warfare-starwars

      - name: Test asset pipeline - optimize
        continue-on-error: true
        run: dotnet run --no-build --project src/Tools/PackCompiler -- assets optimize packs/warfare-starwars

      - name: Test asset pipeline - generate
        continue-on-error: true
        run: dotnet run --no-build --project src/Tools/PackCompiler -- assets generate packs/warfare-starwars

      - name: Test full pipeline build
        continue-on-error: true
        run: dotnet run --no-build --project src/Tools/PackCompiler -- assets build packs/warfare-starwars

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: asset-pipeline-output
          path: packs/warfare-starwars/output/
          if-no-files-found: warn

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: cd docs && npm install

      - name: Check if package.json exists
        id: check-vitepress
        run: |
          if [ -f "docs/package.json" ]; then
            echo "has-package-json=true" >> $GITHUB_OUTPUT
          else
            echo "has-package-json=false" >> $GITHUB_OUTPUT
          fi

      - name: Build VitePress site
        if: steps.check-vitepress.outputs.has-package-json == 'true'
        run: cd docs && npm run build

      - name: Deploy to GitHub Pages
        if: steps.check-vitepress.outputs.has-package-json == 'true'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
