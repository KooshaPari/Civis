[package]
name = "civ-watch"
description = "Civis 3D live-dev hot-reload harness: SSE-streamed Simulation snapshots for a web dashboard"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lib]
name = "civ_watch"
path = "src/lib.rs"

[[bin]]
name = "civ-watch"
path = "src/main.rs"

[dependencies]
civ-engine = { path = "../engine" }
civ-planet = { path = "../planet" }
civ-voxel = { path = "../voxel" }
civ-protocol-3d = { path = "../protocol-3d" }
civ-server = { path = "../server" }
civ-agents = { path = "../agents" }
civ-economy = { path = "../economy" }
civ-laws = { path = "../laws" }
civ-tactics = { path = "../tactics" }
civ-mod-host = { path = "../mod-host" }
civ-save-db = { path = "../save-db" }
pheno-tracing = { path = "../pheno-tracing" }
hecs = "0.10"
axum = "0.7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tower-http = { version = "0.5", features = ["cors", "fs"] }
futures = "0.3"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
sha2 = "0.10"

[dev-dependencies]
http-body-util = "0.1"
tower = { version = "0.5", features = ["util"] }
zip = "2"
wat = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
tempfile = "3"
