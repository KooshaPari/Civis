<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Lava: molten pool with bubble cracks -->
  <defs>
    <radialGradient id="lavaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c0390a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5a0a00" stop-opacity="1"/>
    </radialGradient>
    <filter id="lavaFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- lava pool body -->
  <ellipse cx="24" cy="30" rx="18" ry="12" fill="url(#lavaGlow)"/>
  <!-- crust cracks (dark) -->
  <path d="M8,26 Q14,22 18,28 Q22,34 28,26 Q34,18 40,24"
    fill="none" stroke="#2a0800" stroke-width="2" opacity="0.7"/>
  <path d="M10,32 Q16,28 22,34" fill="none" stroke="#2a0800" stroke-width="1.5" opacity="0.5"/>
  <!-- glowing fissure lines -->
  <path d="M8,26 Q14,22 18,28 Q22,34 28,26 Q34,18 40,24"
    fill="none" stroke="#ff8c00" stroke-width="1" opacity="0.6" filter="url(#lavaFilter)"/>
  <!-- bubbles -->
  <circle cx="18" cy="28" r="3" fill="none" stroke="#ff6a00" stroke-width="1.5" opacity="0.7" filter="url(#lavaFilter)"/>
  <circle cx="30" cy="25" r="2.5" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.6"/>
  <!-- splash droplet -->
  <path d="M28,16 Q30,10 32,16" fill="none" stroke="#ff6a00" stroke-width="2" stroke-linecap="round" filter="url(#lavaFilter)"/>
  <circle cx="30" cy="11" r="2.5" fill="#ff6a00" filter="url(#lavaFilter)"/>
  <!-- outer dark rim -->
  <ellipse cx="24" cy="30" rx="18" ry="12" fill="none" stroke="#5a1800" stroke-width="2"/>
</svg>
