# Local-first quality: developers run `lefthook run pre-push` (or `just quality-manifest`).
# This workflow only verifies the committed attestation — no Rust/Node toolchain on the runner.
name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-manifest:
    name: quality-manifest (cloud verify)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  # Optional heavy sweep (manual / release only — not required for PR merge).
  quality-full:
    name: quality-full (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Full Rust + web sweep
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          (cd clients/godot-ref/rust && cargo test)
          (cd web && npm test)
          (cd web/dashboard && bun install --frozen-lockfile && bun run typecheck && bun run build)
