# lefthook.yml — DINOForge git hook configuration
# https://github.com/evilmartians/lefthook
#
# STASH POLICY: no stage_fixed anywhere — lefthook NEVER stashes unstaged changes.
# Hooks always run against the full working tree as-is.
#
# Bypass all hooks:      LEFTHOOK=0 git commit
# Skip specific command: LEFTHOOK_EXCLUDE=format-check git commit
# Run manually:          lefthook run pre-commit
#                        lefthook run pre-push

min_version: 2.0.0

pre-commit:
  parallel: true
  commands:
    format-check:
      glob: "**/*.cs"
      # Scope: whitespace + style only. Analyzers category is excluded because
      # pre-existing DF warnings (Pattern #94/#105/#106/#111/#114/#123) have no
      # auto-fix and would stall every commit. Analyzer drift is gated in CI.
      run: |
        dotnet format whitespace src/DINOForge.CI.NoRuntime.sln --verify-no-changes --include {staged_files} && \
        dotnet format style src/DINOForge.CI.NoRuntime.sln --verify-no-changes --include {staged_files}

    check-yaml:
      glob: "**/*.{yaml,yml}"
      run: python scripts/hooks/check-yaml.py

    check-json:
      glob: "**/*.json"
      run: python scripts/hooks/check-json.py

    check-merge-conflicts:
      run: python scripts/hooks/check-merge-conflicts.py

pre-push:
  parallel: false
  commands:
    build:
      priority: 1
      run: dotnet build src/DINOForge.CI.NoRuntime.sln -c Release --verbosity minimal

    test-unit:
      priority: 2
      env:
        CI: "true"
        GameInstalled: "false"
      run: dotnet test src/Tests/DINOForge.Tests.csproj -c Release --verbosity normal

    test-integration:
      priority: 3
      # DINO_DISABLE_TEST_LAUNCH=1 prevents fixtures (GameFixture, GameTestFixture,
      # LiveGameIntegrationTests, GameSandboxIntegrationTests) from launching the
      # game during pre-push. All consumers skip gracefully via _gameAvailable /
      # _infrastructureAvailable guards, avoiding ConnectAsync-cancellation OCE
      # escapes that previously broke VSTestTask (iter-144 wave-1 push fix).
      #
      # NOTE: Integration csproj is NOT in DINOForge.CI.NoRuntime.sln, so the
      # `build` step above does not produce its artifacts. We omit --no-build
      # here so `dotnet test` restores+compiles the Integration project (and
      # its transitive deps) on demand. Iter-144 P0 push-blocker fix.
      env:
        DINO_DISABLE_TEST_LAUNCH: "1"
      run: dotnet test src/Tests/Integration/DINOForge.Tests.Integration.csproj -c Release --verbosity normal
