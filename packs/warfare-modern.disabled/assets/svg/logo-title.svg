<?xml version="1.0" encoding="UTF-8"?>
<!--
  IRONLINE — Title Lockup
  DINOForge Warfare-Modern pack · identity asset

  ORIGINAL ART DISCLAIMER
  ========================
  All geometry and letterform compositions in this file are wholly original
  and hand-authored for the DINOForge project. No real-world insignia,
  trademark, coat-of-arms, or copyrighted graphic has been reproduced.
  The crosshair-ring motif is a generic open military-grammar form with
  no affiliation to any nation, organisation, or armed force.

  Layout: emblem (octagonal crosshair ring) at left · wordmark at right
  ViewBox: 0 0 1600 500  (wide lockup format)

  Palette: identity-modern.md §2.1 / §2.2
    Olive Drab    #4A5240
    NATO Navy     #1C2B3A
    Desert Tan    #C9A96E
    Hi-Vis Amber  #F5A623
    Buff White    #EDE8DC
    Faded Field   #A0A08A
    Camo Edge     #2E3528
    UI Background #141A18
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1600 500"
     width="1600" height="500"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="IRONLINE — Warfare Modern title lockup">

  <defs>
    <!-- Background gradient: near-black to dark olive -->
    <linearGradient id="title-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#141A18"/>
      <stop offset="45%"  stop-color="#1C2B3A"/>
      <stop offset="100%" stop-color="#0E1410"/>
    </linearGradient>

    <!-- Emblem radial bg gradient -->
    <radialGradient id="emb-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4A5240"/>
      <stop offset="100%" stop-color="#2E3528"/>
    </radialGradient>

    <!-- Amber glow for center dot -->
    <radialGradient id="amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F5A623" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#F5A623" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>

    <!-- Arc paths for emblem text (centred in 480×480 at offset 10,10 within 500-wide zone) -->
    <path id="emb-top-arc"
          d="M 90,250 A 160,160 0 0,1 410,250"
          fill="none"/>
    <path id="emb-bot-arc"
          d="M 90,250 A 160,160 0 0,0 410,250"
          fill="none"/>
  </defs>

  <!-- ════════════════════════════════════════════════════════
       PANEL BACKGROUND
       Chamfered rectangle (top-left + bottom-right 24px cut)
       ════════════════════════════════════════════════════════ -->
  <polygon id="main-bg"
           points="
             24,0
             1600,0
             1600,476
             1576,500
             0,500
             0,24
           "
           fill="url(#title-bg)"/>

  <!-- Left accent strip (Hi-Vis Amber) -->
  <rect id="accent-strip" x="0" y="0" width="5" height="500"
        fill="#F5A623"/>

  <!-- Bottom rule line -->
  <line x1="0" y1="496" x2="1600" y2="496"
        stroke="#2E3528" stroke-width="1"/>

  <!-- ════════════════════════════════════════════════════════
       EMBLEM ZONE (0..500 × 0..500)
       Octagonal crosshair ring, centred at (250, 250)
       ════════════════════════════════════════════════════════ -->

  <!-- Octagonal background plate -->
  <polygon id="emb-plate"
           points="
             250,22
             388,84
             478,222
             478,278
             388,416
             250,478
             112,416
             22,278
             22,222
             112,84
           "
           fill="url(#emb-bg)"
           stroke="#2E3528" stroke-width="3"/>

  <!-- Outer ring (NATO Navy) — r=196, stroke 28 -->
  <circle id="emb-ring-outer" cx="250" cy="250" r="196"
          fill="none" stroke="#1C2B3A" stroke-width="28"/>

  <!-- Spoke ticks — cardinal (long), diagonal (short) -->
  <!-- North cardinal -->
  <line x1="250" y1="54"  x2="250" y2="108"
        stroke="#F5A623" stroke-width="7" stroke-linecap="square"/>
  <!-- East cardinal -->
  <line x1="392" y1="250" x2="446" y2="250"
        stroke="#F5A623" stroke-width="7" stroke-linecap="square"/>
  <!-- South cardinal -->
  <line x1="250" y1="392" x2="250" y2="446"
        stroke="#F5A623" stroke-width="7" stroke-linecap="square"/>
  <!-- West cardinal -->
  <line x1="54"  y1="250" x2="108" y2="250"
        stroke="#F5A623" stroke-width="7" stroke-linecap="square"/>
  <!-- NE diagonal -->
  <line x1="339" y1="161" x2="314" y2="186"
        stroke="#F5A623" stroke-width="4" stroke-linecap="square"/>
  <!-- SE diagonal -->
  <line x1="339" y1="339" x2="314" y2="314"
        stroke="#F5A623" stroke-width="4" stroke-linecap="square"/>
  <!-- SW diagonal -->
  <line x1="161" y1="339" x2="186" y2="314"
        stroke="#F5A623" stroke-width="4" stroke-linecap="square"/>
  <!-- NW diagonal -->
  <line x1="161" y1="161" x2="186" y2="186"
        stroke="#F5A623" stroke-width="4" stroke-linecap="square"/>

  <!-- Inner ring (thin NATO Navy outline) -->
  <circle id="emb-ring-inner" cx="250" cy="250" r="130"
          fill="none" stroke="#1C2B3A" stroke-width="4"/>

  <!-- Mid dashed indicator ring -->
  <circle id="emb-ring-mid" cx="250" cy="250" r="90"
          fill="none" stroke="#4A5240" stroke-width="2" stroke-dasharray="10 7"/>

  <!-- Centre amber glow halo -->
  <circle cx="250" cy="250" r="40"
          fill="url(#amber-glow)"/>

  <!-- Centre dot -->
  <circle id="emb-center" cx="250" cy="250" r="16"
          fill="#F5A623"/>

  <!-- Arc text: ALLIANCE (top), THEATER 1 (bottom) -->
  <text font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="20" letter-spacing="7"
        fill="#EDE8DC" text-anchor="middle">
    <textPath href="#emb-top-arc" startOffset="50%">ALLIANCE</textPath>
  </text>
  <text font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="18" letter-spacing="5"
        fill="#EDE8DC" text-anchor="middle">
    <textPath href="#emb-bot-arc" startOffset="50%">THEATER 1</textPath>
  </text>

  <!-- ════════════════════════════════════════════════════════
       WORDMARK ZONE (x=540 onward)
       "WARFARE" — large stencil display line
       ": MODERN" — secondary line, 60% height, amber accent
       ════════════════════════════════════════════════════════ -->

  <!-- Primary word: WARFARE -->
  <text id="wm-warfare"
        x="560" y="230"
        font-family="'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif"
        font-size="220" font-weight="400"
        letter-spacing="22"
        fill="#EDE8DC">WARFARE</text>

  <!-- Stencil drop shadow (simulated — offset 2,3 at 50% opacity black) -->
  <text x="562" y="233"
        font-family="'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif"
        font-size="220" font-weight="400"
        letter-spacing="22"
        fill="#000000" fill-opacity="0.45"
        style="pointer-events:none">WARFARE</text>
  <!-- Re-draw on top after shadow -->
  <text x="560" y="230"
        font-family="'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif"
        font-size="220" font-weight="400"
        letter-spacing="22"
        fill="#EDE8DC">WARFARE</text>

  <!-- Brevity rule between words — extends 40px past right edge of "MODERN" -->
  <line id="brevity-rule"
        x1="560" y1="256" x2="1590" y2="256"
        stroke="#4A5240" stroke-width="2"/>

  <!-- Colon + MODERN (60% of 220px = ~132px) -->
  <!-- Colon in Amber -->
  <text x="560" y="380"
        font-family="'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif"
        font-size="132" font-weight="400"
        letter-spacing="10"
        fill="#F5A623">:</text>
  <!-- MODERN flush after colon -->
  <text id="wm-modern"
        x="610" y="380"
        font-family="'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif"
        font-size="132" font-weight="400"
        letter-spacing="18"
        fill="#A0A08A">MODERN</text>

  <!-- ════════════════════════════════════════════════════════
       VERSION / CREDIT STRIP  (bottom-right)
       ════════════════════════════════════════════════════════ -->
  <text x="1580" y="488"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="14" text-anchor="end"
        fill="#606050">DINOFORGE WARFARE-MODERN · v1.0.0</text>

</svg>
