<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!--
    Loading spinner: on-theme compass/world ring emblem.
    Radially symmetric — looks good when rotated.
    Cyan rgb(80,200,240) + gold #E8B84B on transparent background.
    Bevy animates rotation; no CSS animation embedded.
  -->
  <defs>
    <!-- Outer ring gradient (sweeping cyan fade to give motion feel) -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#50C8F0;stop-opacity:1" />
      <stop offset="45%"  style="stop-color:#50C8F0;stop-opacity:0.6" />
      <stop offset="70%"  style="stop-color:#50C8F0;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#50C8F0;stop-opacity:0.05" />
    </linearGradient>

    <!-- Inner ring gradient -->
    <linearGradient id="innerRingGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#E8B84B;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#E8B84B;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0.1" />
    </linearGradient>

    <!-- Center globe gradient -->
    <radialGradient id="centerGrad" cx="40%" cy="38%" r="60%">
      <stop offset="0%"   style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="60%"  style="stop-color:#0d2040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060d1e;stop-opacity:1" />
    </radialGradient>

    <!-- Glow filter for tick marks -->
    <filter id="tickGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Center glow -->
    <filter id="centerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Outer glow for ring -->
    <filter id="outerRingGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- ── OUTER RING (main spinner band) ── -->
  <!-- Full ring base: very dark, near-transparent -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#50C8F0" stroke-width="5" opacity="0.12" />

  <!-- Gradient arc — drawn as thick stroke arc approximation via 3/4 circle -->
  <!-- Arc 0→270°: full cyan, fades to transparent -->
  <circle cx="60" cy="60" r="52"
          fill="none"
          stroke="url(#ringGrad)"
          stroke-width="5"
          stroke-dasharray="245 82"
          stroke-dashoffset="0"
          stroke-linecap="round"
          filter="url(#outerRingGlow)" />

  <!-- ── COMPASS TICK MARKS (8 cardinal/intercardinal directions) ── -->
  <!-- Cardinal: longer gold ticks at N/E/S/W (0/90/180/270°) -->
  <g filter="url(#tickGlow)">
    <!-- North (top) -->
    <line x1="60" y1="4"  x2="60" y2="14" stroke="#E8B84B" stroke-width="2.5" stroke-linecap="round" />
    <!-- South -->
    <line x1="60" y1="106" x2="60" y2="116" stroke="#E8B84B" stroke-width="2.5" stroke-linecap="round" />
    <!-- East -->
    <line x1="106" y1="60" x2="116" y2="60" stroke="#E8B84B" stroke-width="2.5" stroke-linecap="round" />
    <!-- West -->
    <line x1="4"   y1="60" x2="14"  y2="60" stroke="#E8B84B" stroke-width="2.5" stroke-linecap="round" />

    <!-- Intercardinal: shorter cyan ticks at 45/135/225/315° -->
    <!-- NE -->
    <line x1="96.6" y1="23.4" x2="90.0" y2="30.0" stroke="#50C8F0" stroke-width="1.8" stroke-linecap="round" opacity="0.8" />
    <!-- SE -->
    <line x1="96.6" y1="96.6" x2="90.0" y2="90.0" stroke="#50C8F0" stroke-width="1.8" stroke-linecap="round" opacity="0.8" />
    <!-- SW -->
    <line x1="23.4" y1="96.6" x2="30.0" y2="90.0" stroke="#50C8F0" stroke-width="1.8" stroke-linecap="round" opacity="0.8" />
    <!-- NW -->
    <line x1="23.4" y1="23.4" x2="30.0" y2="30.0" stroke="#50C8F0" stroke-width="1.8" stroke-linecap="round" opacity="0.8" />
  </g>

  <!-- ── INNER RING (counter-detail) ── -->
  <circle cx="60" cy="60" r="41"
          fill="none"
          stroke="url(#innerRingGrad)"
          stroke-width="2"
          stroke-dasharray="193 65"
          stroke-dashoffset="65"
          stroke-linecap="round"
          opacity="0.7" />

  <!-- ── CENTER GLOBE (mini world emblem) ── -->
  <circle cx="60" cy="60" r="26" fill="url(#centerGrad)" filter="url(#centerGlow)" />
  <circle cx="60" cy="60" r="26" fill="none" stroke="#50C8F0" stroke-width="1" opacity="0.7" />

  <!-- Globe latitude lines -->
  <ellipse cx="60" cy="60" rx="26" ry="7"  fill="none" stroke="#50C8F0" stroke-width="0.7" opacity="0.5" />
  <ellipse cx="60" cy="60" rx="26" ry="15" fill="none" stroke="#50C8F0" stroke-width="0.7" opacity="0.4" />
  <ellipse cx="60" cy="60" rx="26" ry="22" fill="none" stroke="#50C8F0" stroke-width="0.7" opacity="0.3" />

  <!-- Globe longitude lines -->
  <ellipse cx="60" cy="60" rx="7"  ry="26" fill="none" stroke="#50C8F0" stroke-width="0.7" opacity="0.4" />
  <ellipse cx="60" cy="60" rx="15" ry="26" fill="none" stroke="#50C8F0" stroke-width="0.7" opacity="0.35" />

  <!-- Globe land masses (tiny stylized) -->
  <path d="M48,52 L52,48 L58,49 L59,54 L54,57 L49,55 Z" fill="#1e4a30" opacity="0.9" />
  <path d="M62,50 L66,47 L70,49 L71,54 L66,56 L63,53 Z" fill="#1e4a30" opacity="0.9" />
  <path d="M52,62 L58,60 L62,62 L61,67 L54,68 Z"        fill="#1e4a30" opacity="0.8" />

  <!-- Globe center pole dot -->
  <circle cx="60" cy="34" r="1.5" fill="#50C8F0" opacity="0.9" />
  <circle cx="60" cy="86" r="1.5" fill="#50C8F0" opacity="0.6" />

  <!-- ── COMPASS NEEDLE (N pointer) ── -->
  <g filter="url(#tickGlow)">
    <!-- North point: gold -->
    <polygon points="60,36 56,60 60,57 64,60" fill="#E8B84B" opacity="0.95" />
    <!-- South point: cyan, dimmer -->
    <polygon points="60,84 56,60 60,63 64,60" fill="#50C8F0" opacity="0.6" />
  </g>

  <!-- Center pivot dot -->
  <circle cx="60" cy="60" r="3" fill="#E8B84B" opacity="0.9" />
  <circle cx="60" cy="60" r="1.5" fill="#fff8e0" opacity="0.95" />

  <!-- ── OUTER DECORATIVE RING: tiny diamond notches at cardinal points ── -->
  <g fill="#E8B84B" opacity="0.75">
    <!-- N notch -->
    <polygon points="60,6 62,9 60,12 58,9" />
    <!-- S notch -->
    <polygon points="60,114 62,111 60,108 58,111" />
    <!-- E notch -->
    <polygon points="114,60 111,58 108,60 111,62" />
    <!-- W notch -->
    <polygon points="6,60 9,58 12,60 9,62" />
  </g>
</svg>
