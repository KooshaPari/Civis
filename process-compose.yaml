version: "0.5"

log_location: .process-compose/process-compose.log
log_level: info

environment:
  - RUST_LOG=info
  - CIV_SERVER_HOST=0.0.0.0
  - CIV_SERVER_PORT=8080
  - CIV_METRICS_PORT=9090

processes:
  sim-server:
    command: cargo
    args: ["run", "-p", "civ-server", "--release"]
    working_dir: .
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "netstat -tulpn 2>/dev/null | grep -q 8080 || curl -s http://localhost:8080/health >/dev/null 2>&1 || true"]
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 10
    log_location: .process-compose/logs/sim-server.log
    depends_on:
      - condition: "healthy"

  metrics-collector:
    command: sh
    args:
      - -c
      - |
        while true; do
          sleep 10
          curl -s http://localhost:9090/metrics > /tmp/civ-metrics-$(date +%s).txt 2>/dev/null || true
        done
    depends_on:
      sim-server:
        condition: "process_healthy"
    availability:
      restart: on_failure
      max_restarts: 3
      backoff_seconds: 5
    log_location: .process-compose/logs/metrics-collector.log

  replay-validator:
    command: sh
    args:
      - -c
      - |
        set -e
        echo "Waiting for sim-server to stabilize..."
        sleep 5

        # Run deterministic replay validation
        if [[ -f "crates/engine/tests/fr_determinism_replay.rs" ]]; then
          echo "Running determinism replay tests..."
          cargo test --package civ-engine --test fr_determinism_replay -- --test-threads=1
          echo "Determinism validation passed"
        else
          echo "Replay test not yet implemented"
        fi

        # Keep process alive
        while true; do
          sleep 60
        done
    depends_on:
      sim-server:
        condition: "process_healthy"
    availability:
      restart: on_failure
      max_restarts: 2
      backoff_seconds: 10
    log_location: .process-compose/logs/replay-validator.log
