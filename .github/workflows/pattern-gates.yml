name: Pattern Detection Gates (Unified Matrix)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  detect-patterns:
    name: Pattern #${{ matrix.pattern.number }} (${{ matrix.pattern.name }})
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 8
      fail-fast: false
      matrix:
        pattern:
          - { number: 99, name: 'string-dict', script: 'detect_unprotected_string_dict.py' }
          - { number: 104, name: 'catch-swallow-default', script: 'detect_catch_swallow_default.py' }
          - { number: 105, name: 'event-lifecycle', script: 'detect_event_lifecycle_asymmetry.py' }
          - { number: 106, name: 'implicit-encoding', script: 'detect_implicit_encoding.py' }
          - { number: 107, name: 'unvalidated-di', script: 'detect_unvalidated_di.py' }
          - { number: 108, name: 'test-sleep-sync', script: 'detect_test_sleep_sync.py' }
          - { number: 110, name: 'open-ended-count', script: 'detect_open_ended_count.py' }
          - { number: 111, name: 'silent-catch', script: 'detect_silent_catch.py' }
          - { number: 113, name: 'blocking-poll-sleep', script: 'detect_blocking_poll_sleep.py' }
          - { number: 114, name: 'ct-not-threaded', script: 'detect_ct_not_threaded.py' }
          - { number: 115, name: 'httpclient-per-instance', script: 'detect_httpclient_per_instance.py' }
          - { number: 117, name: 'stringbuilder-no-capacity', script: 'detect_stringbuilder_no_capacity.py' }
          - { number: 120, name: 'unguarded-json-deserialize', script: 'detect_unguarded_json_deserialize.py' }
          - { number: 121, name: 'unnecessary-allocation', script: 'detect_unnecessary_allocation.py' }
          - { number: 123, name: 'public-mutable-collections', script: 'detect_public_mutable_collections.py' }
          - { number: 124, name: 'unsealed-public-classes', script: 'detect_unsealed_public_classes.py' }
          - { number: 125, name: 'orphan-interface-mocks', script: 'detect_orphan_interface_mocks.py' }
          - { number: 232, name: 'unbounded-log-append', script: 'detect_unbounded_log_append.py' }
          - { number: 233, name: 'bepinex-plugin-tfm', script: 'detect_bepinex_plugin_tfm.py' }
          - { number: 234, name: 'test-pack-leak', script: 'detect_test_pack_leak.py' }
          - { number: 235, name: 'graphicraycaster-eventsystem', script: 'detect_graphicraycaster_no_eventsystem.py' }
          - { number: 441, name: 'hardcoded-pipe-names', script: 'detect_hardcoded_pipe_names.py' }
          - { number: 94, name: 'framework-version', script: 'check_framework_version.py', continue_on_error: true }
          - { number: 231, name: 'static-init-side-effect', script: 'detect_static_init_side_effect.py' }
          - { number: 116, name: 'sync-over-async', script: 'detect_sync_over_async.py', continue_on_error: true }
          - { number: 98, name: 'missing-configureawait', script: 'detect_missing_configureawait.py', continue_on_error: true }
          - { number: 102, name: 'orphan-process-start', script: 'detect_orphan_process_start.py', continue_on_error: true }
          - { number: 109, name: 'inline-json-options', script: 'detect_inline_json_options.py' }
          - { number: 862, name: 'raw-remove-item', script: 'detect_raw_remove_item.py', continue_on_error: true }
          - { number: 112, name: 'direct-datetime', script: 'detect_direct_datetime.py', continue_on_error: true }
          - { number: 97,  name: 'tcs-sync-continuations', script: 'detect_tcs_sync_continuations.py', continue_on_error: true }
          - { number: 101, name: 'stringly-enums', script: 'detect_stringly_enums.py', continue_on_error: true }
          - { number: 999, name: 'logerror-no-stack', script: 'detect_logerror_no_stack.py', continue_on_error: true }
          - { number: 998, name: 'global-state-tests', script: 'detect_global_state_tests.py', continue_on_error: true }
          - { number: 735, name: 'comparer-mismatch', script: 'detect_comparer_mismatch.py', continue_on_error: true }
          # P1 #739: Wire orphan detectors (initially continue-on-error for safe rollout)
          - { number: 94,  name: 'unbounded-constraints', script: 'detect_unbounded_constraints.py', continue_on_error: true }
          - { number: 95,  name: 'unguarded-deserialize', script: 'detect_unguarded_deserialize.py', continue_on_error: true }
          - { number: 226, name: 'public-mutable-fields', script: 'detect_pattern_226.py', continue_on_error: true }
          - { number: 230, name: 'broad-exception-catch', script: 'audit_broad_exception_catch.py', continue_on_error: true }
          - { number: 223, name: 'todo-without-ticket', script: 'audit_todo_without_ticket.py', continue_on_error: true }

    steps:
      - name: Checkout code
        uses: actions/checkout@a1cd7d75d18221425915e628d674c94e6975657c # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@0b93645e9aeb9bc5e3ef4b25c73cc3b91a4f6b81 # v5.0.0
        with:
          python-version: '3.11'

      - name: Run Pattern #${{ matrix.pattern.number }} detection
        continue-on-error: ${{ matrix.pattern.continue_on_error == true }}
        run: |
          python scripts/ci/${{ matrix.pattern.script }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@573e96872e1e9bf7d7d6db67e6efe79c0c3eac65 # v4.0.4
        with:
          name: pattern-${{ matrix.pattern.number }}-report
          path: pattern-${{ matrix.pattern.number }}-report.json
          retention-days: 14

  detect-unbounded-constraints:
    name: Pattern #94 (unbounded-constraints)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a1cd7d75d18221425915e628d674c94e6975657c # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@0b93645e9aeb9bc5e3ef4b25c73cc3b91a4f6b81 # v5.0.0
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Run Pattern #94 detection
        run: python scripts/ci/detect_unbounded_constraints.py

  detect-unguarded-deserialize:
    name: Pattern #95 (unguarded-deserialize)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a1cd7d75d18221425915e628d674c94e6975657c # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@0b93645e9aeb9bc5e3ef4b25c73cc3b91a4f6b81 # v5.0.0
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Run Pattern #95 detection
        run: python scripts/ci/detect_unguarded_deserialize.py

  detect-public-mutable-fields:
    name: Pattern #226 (public-mutable-fields)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a1cd7d75d18221425915e628d674c94e6975657c # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@0b93645e9aeb9bc5e3ef4b25c73cc3b91a4f6b81 # v5.0.0
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Run Pattern #226 detection
        run: python scripts/ci/detect_pattern_226.py

  audit-broad-exception-catch:
    name: Pattern #230 (broad-exception-catch)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a1cd7d75d18221425915e628d674c94e6975657c # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@0b93645e9aeb9bc5e3ef4b25c73cc3b91a4f6b81 # v5.0.0
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Run Pattern #230 detection
        run: python scripts/ci/audit_broad_exception_catch.py

  audit-todo-without-ticket:
    name: Pattern #223 (todo-without-ticket)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a1cd7d75d18221425915e628d674c94e6975657c # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@0b93645e9aeb9bc5e3ef4b25c73cc3b91a4f6b81 # v5.0.0
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Run Pattern #223 detection
        run: python scripts/ci/audit_todo_without_ticket.py
