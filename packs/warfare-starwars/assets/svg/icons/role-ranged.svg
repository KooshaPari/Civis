<?xml version="1.0" encoding="UTF-8"?>
<!--
  DINOForge — warfare-starwars
  Role Icon: Ranged (blaster rifle / sniper)
  Motif: Side-view of a long-barrelled energy rifle with scope, clean angular silhouette.
  Original geometry. 64×64, monochrome white.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Ranged</title>
  <!-- Rifle body / receiver block -->
  <rect x="10" y="26" width="36" height="10" rx="2" fill="#F5F7FA"/>
  <!-- Long barrel extending right -->
  <rect x="44" y="29" width="16" height="5" rx="1" fill="#F5F7FA"/>
  <!-- Barrel tip flash suppressor -->
  <rect x="59" y="27" width="4" height="9" rx="1" fill="#C5CCD6"/>
  <!-- Stock / butt extending left -->
  <rect x="4"  y="28" width="8"  height="8" rx="2" fill="#F5F7FA"/>
  <!-- Pistol grip -->
  <rect x="18" y="34" width="7" height="12" rx="2" fill="#F5F7FA"/>
  <!-- Trigger guard arc -->
  <path d="M 18,36 Q 21.5,44 25,36" fill="none" stroke="#F5F7FA" stroke-width="2"/>
  <!-- Scope body on top -->
  <rect x="26" y="18" width="16" height="9" rx="2" fill="#F5F7FA"/>
  <!-- Scope lens circle -->
  <circle cx="34" cy="22" r="3" fill="#05060A" stroke="#C5CCD6" stroke-width="1"/>
  <!-- Scope rail mounts -->
  <rect x="24" y="25" width="3" height="3" fill="#C5CCD6"/>
  <rect x="42" y="25" width="3" height="3" fill="#C5CCD6"/>
  <!-- Magazine / power cell -->
  <rect x="30" y="35" width="8" height="10" rx="2" fill="#F5F7FA"/>
</svg>
