[package]
name = "dinoforge-asset-pipeline"
version = "0.1.0"
edition = "2021"
authors = ["DINOForge Agents"]
license = "MIT"
description = "High-performance asset import and LOD generation for DINOForge mod platform"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
pyo3 = { version = "0.28", features = ["extension-module"] }
nalgebra = "0.33"  # Linear algebra (mesh transforms, bounds)
rayon = "1.12"  # Parallelism for LOD generation
ndarray = "0.15"  # Array operations (SIMD-compatible)
# assimp removed: requires C++ build tools and CMake. Will be wrapped in future via AssetPipeline DLL

[dev-dependencies]
criterion = "0.5"  # Benchmarking
tempfile = "3"  # Test fixtures

[lib]
crate-type = ["cdylib", "rlib"]  # cdylib for PyO3, rlib for testing

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.bench]
opt-level = 3
lto = true

# Allow unsafe code (documented with SAFETY: comments)
[lints.rust]
unsafe_code = "warn"
