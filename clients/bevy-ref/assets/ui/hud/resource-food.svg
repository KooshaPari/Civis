<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Food: stylized wheat stalk with grain -->
  <defs>
    <filter id="foodGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- stalk -->
  <line x1="16" y1="30" x2="16" y2="8" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" filter="url(#foodGlow)"/>
  <!-- grain ear (ellipses on stalk) -->
  <ellipse cx="16" cy="8" rx="3.5" ry="5" fill="#0d1628" stroke="#E8B84B" stroke-width="1.8" filter="url(#foodGlow)"/>
  <!-- side grain left -->
  <ellipse cx="10" cy="13" rx="3" ry="4" fill="#0d1628" stroke="#E8B84B" stroke-width="1.5"
    transform="rotate(-20 10 13)" opacity="0.85"/>
  <!-- side grain right -->
  <ellipse cx="22" cy="13" rx="3" ry="4" fill="#0d1628" stroke="#E8B84B" stroke-width="1.5"
    transform="rotate(20 22 13)" opacity="0.85"/>
  <!-- second pair -->
  <ellipse cx="11" cy="19" rx="2.5" ry="3.5" fill="#0d1628" stroke="#E8B84B" stroke-width="1.2"
    transform="rotate(-15 11 19)" opacity="0.6"/>
  <ellipse cx="21" cy="19" rx="2.5" ry="3.5" fill="#0d1628" stroke="#E8B84B" stroke-width="1.2"
    transform="rotate(15 21 19)" opacity="0.6"/>
  <!-- base leaf curves -->
  <path d="M16,24 Q10,22 8,26" stroke="#2ecc71" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M16,24 Q22,22 24,26" stroke="#2ecc71" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
