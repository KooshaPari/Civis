name: unguarded-deserialize
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Pattern #95 detection gate — fails CI when a cross-FFI C# call site
# deserializes a typed DTO without IValidatable + JsonGuard pairing.
# Mirrors the IValidatable/JsonGuard contract enforced inside src/SDK/
# (#210 / #215) at the Tools, Runtime, and NativeInterop boundaries.
#
# Companion: scripts/ci/detect_unguarded_deserialize.py (run with
# --self-test for spec). Allowlist:
# docs/qa/unguarded-deserialize-allowlist.txt.
# Cross-reference: tasks #264 (HIGH mop-up) / #265 (this gate) /
# #266 (MED mop-up).

on:
  pull_request:
    paths:
      - "src/Tools/**/*.cs"
      - "src/Runtime/**/*.cs"
      - "src/SDK/**/*.cs"
      - "scripts/ci/detect_unguarded_deserialize.py"
      - "docs/qa/unguarded-deserialize-allowlist.txt"
      - ".github/workflows/unguarded-deserialize.yml"
  push:
    branches: [main]
    paths:
      - "src/Tools/**/*.cs"
      - "src/Runtime/**/*.cs"
      - "src/SDK/**/*.cs"
      - "scripts/ci/detect_unguarded_deserialize.py"
      - "docs/qa/unguarded-deserialize-allowlist.txt"
      - ".github/workflows/unguarded-deserialize.yml"
  workflow_dispatch:
jobs:
  unguarded-deserialize-check:
    name: Pattern #95 unguarded-deserialize
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12"

      - name: Self-test the gate
        run: python scripts/ci/detect_unguarded_deserialize.py --self-test

      - name: Run unguarded-deserialize gate
        run: python scripts/ci/detect_unguarded_deserialize.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: unguarded-deserialize-report
          path: docs/qa/unguarded-deserialize-report.json
          if-no-files-found: warn
          retention-days: 14
