name: "cargo-test"
description: "Run cargo test with standard Civis flags"
inputs:
  package:
    description: "Package to test (optional, empty = all)"
    required: false
    default: ""
  test-flags:
    description: "Extra flags to pass to cargo test"
    required: false
    default: "--no-fail-fast"
runs:
  using: "composite"
  steps:
    - name: Run cargo test
      shell: bash
      run: |
        if [ -z "${{ inputs.package }}" ]; then
          cargo test --workspace -j 4 ${{ inputs.test-flags }}
        else
          cargo test -p ${{ inputs.package }} -j 4 ${{ inputs.test-flags }}
        fi
