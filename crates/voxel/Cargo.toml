[package]
name = "civ-voxel"
description = "Adaptive voxel substrate: sparse octree + dense leaf chunks; deterministic mesh-dirty queue"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
# Compact, deterministic binary serialisation for the disk-backed dirty-chunk cache.
bincode = "1.3"

# Adaptive voxel kernel shared across Phenotype-org game clients.
# Pin the git revision so CI resolves the exact same kernel without requiring
# a sibling checkout.
phenotype-voxel = { git = "https://github.com/KooshaPari/phenotype-voxel.git", rev = "0bbd1b7c64e64e7723c42a7417680c23860dfb5a" }

[dev-dependencies]
proptest = "1.4"
