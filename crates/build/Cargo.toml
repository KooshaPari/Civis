[package]
name = "civ-build"
description = "Procedural voxel building grammar + freehand authoring; produces shared BuildingGraph"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
civ-voxel = { path = "../voxel" }

[dev-dependencies]
proptest = "1.4"
