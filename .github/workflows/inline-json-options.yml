name: inline-json-options
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Pattern #109 detection gate — fails CI when production code constructs
# ad-hoc ``new JsonSerializerOptions { ... }`` literals outside designated
# holder paths (src/SDK/Json/JsonOptions.cs and src/**/Json/*JsonOptions.cs).
# Inline options drift between read/write paths and mask asymmetric
# naming-policy bugs.
#
# Companion: scripts/ci/detect_inline_json_options.py (run with
# --self-test for spec). Allowlist:
# docs/qa/inline-json-options-allowlist.txt.
# Cross-reference: tasks #325 (consolidation sweep) / #326 (this gate) /
# #327 (CLAUDE.md doctrine).

on:
  pull_request:
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_inline_json_options.py"
      - "docs/qa/inline-json-options-allowlist.txt"
      - ".github/workflows/inline-json-options.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_inline_json_options.py"
      - "docs/qa/inline-json-options-allowlist.txt"
      - ".github/workflows/inline-json-options.yml"
  workflow_dispatch:
jobs:
  inline-json-options-check:
    name: Pattern #109 inline-json-options
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12"

      - name: Self-test the gate
        run: python scripts/ci/detect_inline_json_options.py --self-test

      - name: Run inline-json-options gate
        run: python scripts/ci/detect_inline_json_options.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: inline-json-options-report
          path: docs/qa/inline-json-options-report.json
          if-no-files-found: warn
          retention-days: 14
