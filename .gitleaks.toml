# Gitleaks configuration for DINOForge
# Prevents credential leaks and secrets from being committed
# Run: gitleaks detect --config .gitleaks.toml

[allowlist]
description = "Allowlist for example/test values"
commits = []
paths = [
    "docs/",
    "tests/",
    "test-data/",
    "examples/",
    "packs/.*example.*",
]
regexes = []

# OpenAI API Keys (sk-* format)
[[rules]]
description = "OpenAI API Key"
id = "openai-api-key"
regex = "(?i)(sk-[a-z0-9]{48,})"
keywords = ["sk-"]
entropy = 3.5
secretGroup = 1

# Anthropic/Claude API Keys
[[rules]]
description = "Anthropic API Key"
id = "anthropic-api-key"
regex = "(?i)(sk-ant-[a-z0-9]{28,})"
keywords = ["sk-ant-"]
entropy = 3.5
secretGroup = 1

# GitHub Tokens
[[rules]]
description = "GitHub Token"
id = "github-token"
regex = "(?i)(gh[pousr]{1}_[a-z0-9]{36,255})"
keywords = ["gh_", "ghp_", "ghu_", "ghs_", "ghr_"]
entropy = 3.5
secretGroup = 1

# GitHub Personal Access Tokens (classic)
[[rules]]
description = "GitHub Personal Access Token"
id = "github-pat"
regex = "(?i)github[_\s]*token[_\s]*[:=][_\s]*([a-f0-9]{40})"
keywords = ["github_token", "github token"]
entropy = 3.0
secretGroup = 1

# AWS Access Key ID
[[rules]]
description = "AWS Access Key ID"
id = "aws-access-key"
regex = "(?i)(AKIA[0-9A-Z]{16})"
keywords = ["AKIA"]
entropy = 3.0
secretGroup = 1

# AWS Secret Access Key
[[rules]]
description = "AWS Secret Access Key"
id = "aws-secret-key"
regex = "(?i)aws_secret_access_key[_\s]*[:=][_\s]*([a-z0-9/+=]{40})"
keywords = ["aws_secret_access_key"]
entropy = 3.5
secretGroup = 1

# Private Keys (PEM format)
[[rules]]
description = "Private Key (PEM)"
id = "private-key-pem"
regex = "-----BEGIN (?:RSA|DSA|EC|OPENSSH|PRIVATE) PRIVATE KEY-----"
keywords = ["-----BEGIN"]
entropy = 3.0
secretGroup = 0

# JWT Tokens
[[rules]]
description = "JWT Token"
id = "jwt-token"
regex = "(?i)(eyJ[a-z0-9_-]{100,}\.eyJ[a-z0-9_-]{100,}\.eyJ[a-z0-9_-]{40,})"
keywords = ["eyJ"]
entropy = 4.0
secretGroup = 1

# Database Connection Strings
[[rules]]
description = "Database Connection String (SQL Server)"
id = "sql-connection-string"
regex = "(?i)(server=|host=)[^;]*;.*(?:password|pwd)=([^;]*)"
keywords = ["password=", "pwd="]
entropy = 3.0
secretGroup = 2

# MongoDB Connection String
[[rules]]
description = "MongoDB Connection String"
id = "mongodb-connection-string"
regex = "(?i)(mongodb(?:\\+srv)?://)[a-z0-9_.-]+:([a-z0-9_.-]+)@"
keywords = ["mongodb://", "mongodb+srv://"]
entropy = 3.0
secretGroup = 2

# Slack API Token
[[rules]]
description = "Slack API Token"
id = "slack-token"
regex = "(?i)(xox[pboa]-[0-9]{12}-[0-9]{12}-[a-z0-9]{32})"
keywords = ["xoxp-", "xoxb-", "xoxa-", "xoxo-"]
entropy = 3.5
secretGroup = 1

# Generic API Keys/Secrets
[[rules]]
description = "Generic API Key or Secret (variable assignment)"
id = "generic-api-key"
regex = "(?i)(api_key|apikey|secret|passwd|password)[_\\s]*[:=][_\\s]*['\"]?([a-z0-9_-]{16,})['\"\\s]"
keywords = ["api_key", "apikey", "secret", "passwd", "password"]
entropy = 3.5
secretGroup = 2

# Authorization Header Bearer Token
[[rules]]
description = "Authorization Bearer Token"
id = "bearer-token"
regex = "(?i)(authorization[:\\s]*bearer\\s+)([a-z0-9._-]{50,})"
keywords = ["bearer", "authorization"]
entropy = 3.5
secretGroup = 2

# .NET User Secrets (appsettings.json)
[[rules]]
description = ".NET User Secrets in appsettings"
id = "dotnet-user-secrets"
regex = "(?i)(\"[^\"]*key[^\"]*\"\\s*:\\s*\")([a-z0-9-]{36})(\")"
keywords = ["key"]
entropy = 3.0
secretGroup = 2
