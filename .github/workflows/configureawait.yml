name: configureawait
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Pattern #98 detection gate — fails CI when a C# library await is
# missing the ``.ConfigureAwait(false)`` suffix. Library code that
# captures a consumer's SynchronizationContext / TaskScheduler can
# deadlock when consumed from a UI host (Avalonia GUI installer,
# WinUI desktop companion) or thrash on context switches when
# consumed from the Unity main thread.
#
# Companion: scripts/ci/detect_missing_configureawait.py (run with
# --self-test for spec). Allowlist:
# docs/qa/configureawait-allowlist.txt.
# Cross-reference: tasks #274 (ConfigureAwait sweep) /
# #275 (this gate) / #276 (enable CA2007 in
# Directory.Build.props for library projects) / future Roslyn
# analyzer for compile-time enforcement.

on:
  pull_request:
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_missing_configureawait.py"
      - "docs/qa/configureawait-allowlist.txt"
      - ".github/workflows/configureawait.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_missing_configureawait.py"
      - "docs/qa/configureawait-allowlist.txt"
      - ".github/workflows/configureawait.yml"
  workflow_dispatch:
jobs:
  configureawait-check:
    name: Pattern #98 missing-configureawait
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12"

      - name: Self-test the gate
        run: python scripts/ci/detect_missing_configureawait.py --self-test

      - name: Run configureawait gate
        run: python scripts/ci/detect_missing_configureawait.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: configureawait-report
          path: docs/qa/configureawait-report.json
          if-no-files-found: warn
          retention-days: 14
