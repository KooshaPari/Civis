name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build retroactive release for (e.g. v0.9.0)'
        required: true
        type: string

permissions: {}

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-2022
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # For workflow_dispatch retro-runs, check out the specific tag's commit
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      # Install all required SDKs: net8.0 (SDK/Domains/Tests) + net11.0 (Tools/CLI)
      - name: Setup .NET
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.0.0
        with:
          dotnet-version: |
            8.0.x
            11.0.x
          global-json-file: global.json
          include-prerelease: true

      # ---------------------------------------------------------------
      # Extract version metadata from the tag
      # workflow_dispatch: use inputs.tag; tag push: use github.ref_name
      # ---------------------------------------------------------------
      - name: Extract version from tag
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $version = $tag.TrimStart('v')
          $isPreRelease = $false
          if ($version -match '-(rc|beta|alpha)') {
            $isPreRelease = $true
          }
          "VERSION=$version"     | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "TAG=$tag"             | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "IS_PRERELEASE=$isPreRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version: $version | Tag: $tag | Pre-release: $isPreRelease"

      # ---------------------------------------------------------------
      # Restore & build the CI solution (no game DLLs required)
      # ---------------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln /p:RestoreLockedMode=true

      - name: Build dependencies (ordered)
        shell: bash
        run: |
          for p in \
            src/SDK/DINOForge.SDK.csproj \
            src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            src/Bridge/Client/DINOForge.Bridge.Client.csproj \
            src/Domains/Warfare/DINOForge.Domains.Warfare.csproj \
            src/Domains/Economy/DINOForge.Domains.Economy.csproj \
            src/Domains/Scenario/DINOForge.Domains.Scenario.csproj \
            src/Domains/UI/DINOForge.Domains.UI.csproj \
            src/Tools/Installer/InstallerLib/DINOForge.Tools.Installer.csproj; do
            dotnet build "$p" -c Release --no-restore --verbosity minimal || exit 1
          done

      - name: Build CI solution (Release)
        run: dotnet build src/DINOForge.CI.NoRuntime.sln -c Release --no-restore --verbosity minimal /p:BuildInParallel=false

      # ---------------------------------------------------------------
      # Run tests — must pass before packaging
      # ---------------------------------------------------------------
      - name: Run tests
        run: >
          dotnet test src/DINOForge.CI.NoRuntime.sln
          --no-build
          -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results
          --verbosity normal

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 14

      # ---------------------------------------------------------------
      # Build and publish CLI tools (PackCompiler, DumpTools)
      # All platforms: win-x64, linux-x64, linux-arm64, osx-x64, osx-arm64
      # ---------------------------------------------------------------
      - name: Publish PackCompiler (all platforms)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $rids = @('win-x64', 'linux-x64', 'linux-arm64', 'osx-x64', 'osx-arm64')
          foreach ($rid in $rids) {
            Write-Host "Publishing PackCompiler-$rid..."
            dotnet publish src/Tools/PackCompiler -c Release -r $rid `
              -o "staging/cli-tools/PackCompiler-$rid" `
              --no-restore --verbosity minimal || Write-Warning "PackCompiler-$rid publish failed"
          }

      - name: Publish DumpTools (all platforms)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $rids = @('win-x64', 'linux-x64', 'linux-arm64', 'osx-x64', 'osx-arm64')
          foreach ($rid in $rids) {
            Write-Host "Publishing DumpTools-$rid..."
            dotnet publish src/Tools/DumpTools -c Release -r $rid `
              -o "staging/cli-tools/DumpTools-$rid" `
              --no-restore --verbosity minimal || Write-Warning "DumpTools-$rid publish failed"
          }

      # ---------------------------------------------------------------
      # Pack and publish NuGet packages
      # SETUP REQUIRED: Add NUGET_API_KEY secret in GitHub repo Settings → Secrets
      # Get your API key from https://www.nuget.org/account/apikeys
      # ---------------------------------------------------------------
      - name: Pack InstallerLib NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Tools/Installer/InstallerLib/DINOForge.Tools.Installer.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack SDK NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/SDK/DINOForge.SDK.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack Bridge.Protocol NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack Bridge.Client NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Bridge/Client/DINOForge.Bridge.Client.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack Templates NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Templates/DINOForge.Templates.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack Warfare Domain NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Domains/Warfare/DINOForge.Domains.Warfare.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack Economy Domain NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Domains/Economy/DINOForge.Domains.Economy.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack Scenario Domain NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Domains/Scenario/DINOForge.Domains.Scenario.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Pack UI Domain NuGet package
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet pack src/Domains/UI/DINOForge.Domains.UI.csproj -c Release `
            -p:PackageVersion=$env:PACKAGE_VERSION `
            --output staging/nuget/
        shell: pwsh

      - name: Publish to NuGet.org
        if: steps.version.outputs.IS_PRERELEASE != 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push staging/nuget/*.nupkg `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
        shell: pwsh

      - name: Publish pre-release to NuGet.org
        if: ${{ steps.version.outputs.IS_PRERELEASE == 'true' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push staging/nuget/*.nupkg `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
        shell: pwsh

      # ---------------------------------------------------------------
      # Build Desktop Companion (WinUI 3, self-contained folder → zip)
      # XamlCompiler requires VC toolchain (C++ ATL) — build may fail on runners
      # without VS 2022 Build Tools installed. Use continue-on-error so the rest
      # of the release pipeline can proceed even if this step fails.
      # ---------------------------------------------------------------
      - name: Build Desktop Companion
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet publish src/Tools/DesktopCompanion/DesktopCompanion.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -o staging/companion `
            --verbosity minimal

      - name: Package Companion and generate checksum
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env.PACKAGE_VERSION
          $companionDir = "staging/companion"
          if ((Test-Path $companionDir) -and (Get-ChildItem $companionDir -File | Measure-Object).Count -gt 0) {
            $zipName = "staging/DINOForge.Companion-v$version-win-x64.zip"
            Compress-Archive -Path "$companionDir/*" -DestinationPath $zipName -Force
            $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
            "$hash *DINOForge.Companion-v$version-win-x64.zip" | `
              Out-File -FilePath "staging/DINOForge.Companion-v$version-win-x64.zip.sha256" -Encoding utf8
            Write-Host "Companion zip: $zipName ($([math]::Round((Get-Item $zipName).Length/1MB,1)) MB)"
          } else {
            Write-Host "No Desktop Companion files found — skipping Companion zip"
          }

      # Build the GUI Installer (net8.0-windows, self-contained EXE)
      # ---------------------------------------------------------------
      - name: Build Installer EXE
        shell: pwsh
        run: |
          dotnet publish src/Tools/Installer/GUI/DINOForge.Installer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o staging/installer `
            --verbosity minimal

      - name: Copy installer to staging and generate checksum
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:PACKAGE_VERSION
          $installerExe = "staging/installer/DINOForge.Installer.exe"
          $stagingExe = "staging/DINOForge-v$version-Installer.exe"
          $checksumFile = "staging/DINOForge-v$version-Installer.exe.sha256"

          if (Test-Path $installerExe) {
            Copy-Item $installerExe $stagingExe
            $hash = (Get-FileHash $stagingExe -Algorithm SHA256).Hash
            "$hash *DINOForge-v$version-Installer.exe" | Out-File -FilePath $checksumFile -Encoding utf8
            Write-Host "Installer prepared: $stagingExe"
            Write-Host "Checksum: $checksumFile"
          } else {
            Write-Host "ERROR: Installer EXE not found at $installerExe"
            exit 1
          }

      # ---------------------------------------------------------------
      # Publish SDK and Bridge.Protocol to staging/plugin
      # These are the DLLs that go into BepInEx/plugins
      # ---------------------------------------------------------------
      - name: Publish SDK DLL
        shell: pwsh
        run: |
          dotnet build src/SDK/DINOForge.SDK.csproj `
            -c Release `
            --no-restore `
            -p:OutputPath="$((Get-Location).Path)/staging/plugin" `
            -p:AppendTargetFrameworkToOutputPath=false `
            -p:AppendRuntimeIdentifierToOutputPath=false `
            --verbosity minimal

      - name: Publish Bridge.Protocol DLL
        shell: pwsh
        run: |
          dotnet build src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj `
            -c Release `
            --no-restore `
            -p:OutputPath="$((Get-Location).Path)/staging/plugin" `
            -p:AppendTargetFrameworkToOutputPath=false `
            -p:AppendRuntimeIdentifierToOutputPath=false `
            --verbosity minimal

      # ---------------------------------------------------------------
      # Note: DINOForge.Runtime.dll requires the DINO game assemblies
      # (BepInEx, Unity.Entities, DNO.Main, etc.) which are not present
      # in CI. The Runtime DLL must be built locally against a game install.
      # We include a README_RUNTIME.txt in the release explaining this.
      # ---------------------------------------------------------------
      - name: Write runtime build notice
        shell: pwsh
        run: |
          $notice = @"
          DINOForge.Runtime.dll - Local Build Required
          =============================================
          DINOForge.Runtime.dll cannot be built in CI because it depends on
          game assemblies (BepInEx, Unity.Entities, DNO.Main, Assembly-CSharp)
          that are only available in a local DINO game installation.

          To build the Runtime DLL locally:
            1. Install Diplomacy is Not an Option via Steam
            2. Install BepInEx 5.4.23.5 into the game directory
            3. Update Directory.Build.props with your GameDir path
            4. Run: dotnet build src/Runtime/DINOForge.Runtime.csproj -c Release
            5. The DLL will be output to BepInEx/plugins/ in your game directory

          All other DLLs (SDK, Bridge.Protocol) are included in this release
          and should be placed alongside DINOForge.Runtime.dll in BepInEx/plugins/.
          "@
          $notice | Out-File -FilePath staging/plugin/README_RUNTIME.txt -Encoding utf8

      # ---------------------------------------------------------------
      # Build Go DependencyResolver binary
      # ---------------------------------------------------------------
      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.22'

      - name: Build Go DependencyResolver (Windows)
        continue-on-error: true
        shell: bash
        run: |
          cd src/Tools/DependencyResolver
          GOOS=windows GOARCH=amd64 go build -o dinoforge-resolver.exe -ldflags="-s -w"
          mkdir -p ../../../../staging/go-resolver
          cp dinoforge-resolver.exe ../../../../staging/go-resolver/ 2>/dev/null || true

      - name: Build Go DependencyResolver (Linux)
        continue-on-error: true
        shell: bash
        run: |
          cd src/Tools/DependencyResolver
          GOOS=linux GOARCH=amd64 go build -o dinoforge-resolver -ldflags="-s -w"
          mkdir -p ../../../../staging/go-resolver
          cp dinoforge-resolver ../../../../staging/go-resolver/ 2>/dev/null || true

      - name: Generate Go resolver checksums
        shell: pwsh
        run: |
          $checksumFile = "staging/go-resolver/SHA256SUMS.txt"
          $checksumContent = @()
          Get-ChildItem staging/go-resolver -File | ForEach-Object {
            if ($_.Extension -ne '.txt') {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              $checksumContent += "$hash  $($_.Name)"
              Write-Host "Go resolver checksum: $($_.Name) = $hash"
            }
          }
          $checksumContent | Out-File -FilePath $checksumFile -Encoding utf8

      # ---------------------------------------------------------------
      # Build Rust AssetPipeline binary
      # ---------------------------------------------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable

      - name: Build Rust AssetPipeline (Release)
        continue-on-error: true
        shell: bash
        run: |
          cd src/Tools/AssetPipelineRust
          cargo build --release || echo "Rust build skipped (incomplete implementation)"
          mkdir -p ../../../../staging/rust-asset-pipeline
          # Copy the built binary to staging (Windows DLL)
          cp target/release/dinoforge_asset_pipeline.dll ../../../../staging/rust-asset-pipeline/ 2>/dev/null || true
          # Or the .so for Linux
          cp target/release/libdinoforge_asset_pipeline.so ../../../../staging/rust-asset-pipeline/ 2>/dev/null || true

      - name: Generate Rust asset pipeline checksums
        shell: pwsh
        run: |
          $checksumFile = "staging/rust-asset-pipeline/SHA256SUMS.txt"
          $checksumContent = @()
          if (Test-Path staging/rust-asset-pipeline) {
            Get-ChildItem staging/rust-asset-pipeline -File | ForEach-Object {
              if ($_.Extension -ne '.txt') {
                $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
                $checksumContent += "$hash  $($_.Name)"
                Write-Host "Rust asset pipeline checksum: $($_.Name) = $hash"
              }
            }
            if ($checksumContent.Count -gt 0) {
              $checksumContent | Out-File -FilePath $checksumFile -Encoding utf8
            }
          }

      # ---------------------------------------------------------------
      # Assemble the full release package in staging/
      # ---------------------------------------------------------------
      - name: Assemble release staging directory
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:PACKAGE_VERSION

          # Plugin directory is already populated - keep as-is
          Write-Host "Plugin staging contents:"
          Get-ChildItem staging/plugin | Format-Table Name, Length

          # Copy scripts
          New-Item -ItemType Directory -Force -Path staging/scripts | Out-Null
          Copy-Item src/Tools/Installer/Install-DINOForge.ps1 staging/scripts/ -ErrorAction SilentlyContinue
          Copy-Item src/Tools/Installer/install.sh staging/scripts/ -ErrorAction SilentlyContinue
          Copy-Item scripts/install-companion.ps1 staging/scripts/ -ErrorAction SilentlyContinue
          Copy-Item scripts/install-companion.sh staging/scripts/ -ErrorAction SilentlyContinue
          Copy-Item scripts/install/*.ps1 staging/scripts/ -ErrorAction SilentlyContinue
          Copy-Item scripts/install/*.sh staging/scripts/ -ErrorAction SilentlyContinue

          # Copy CLI tools (PackCompiler, DumpTools)
          if (Test-Path staging/cli-tools) {
            New-Item -ItemType Directory -Force -Path staging/tools | Out-Null
            Copy-Item staging/cli-tools staging/tools/cli-tools -Recurse -Force
          }

          # Copy Go DependencyResolver binaries
          if (Test-Path staging/go-resolver) {
            New-Item -ItemType Directory -Force -Path staging/tools | Out-Null
            Copy-Item staging/go-resolver staging/tools/go-resolver -Recurse -Force
          }

          # Copy Rust AssetPipeline binaries
          if (Test-Path staging/rust-asset-pipeline) {
            New-Item -ItemType Directory -Force -Path staging/tools | Out-Null
            Copy-Item staging/rust-asset-pipeline staging/tools/rust-asset-pipeline -Recurse -Force
          }

          # Copy packs directory
          if (Test-Path packs) {
            Copy-Item packs staging/packs -Recurse -Force
          }

          # Copy schemas directory
          if (Test-Path schemas) {
            Copy-Item schemas staging/schemas -Recurse -Force
          }

          # Copy root docs
          Copy-Item README.md staging/ -ErrorAction SilentlyContinue
          Copy-Item CHANGELOG.md staging/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE staging/ -ErrorAction SilentlyContinue

          Write-Host "Staging directory structure:"
          Get-ChildItem staging -Recurse | Select-Object FullName | Format-Table -AutoSize

      # ---------------------------------------------------------------
      # Create ZIP archive
      # ---------------------------------------------------------------
      - name: Create release ZIP
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:PACKAGE_VERSION
          $zipName = "DINOForge-v$version-windows.zip"

          Compress-Archive -Path staging/* -DestinationPath $zipName -Force
          Write-Host "Created archive: $zipName"
          $size = (Get-Item $zipName).Length / 1MB
          Write-Host ("Archive size: {0:F2} MB" -f $size)

          # Save zip name as output via env file
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ---------------------------------------------------------------
      # Generate SHA256 checksums for all release artifacts
      # ---------------------------------------------------------------
      - name: Generate SHA256 checksums
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:PACKAGE_VERSION
          $checksumFile = "staging/SHA256SUMS.txt"
          $checksumContent = @()

          # Generate checksums for all release artifacts
          $artifacts = @(
            "staging/nuget/*.nupkg",
            "staging/DINOForge-v$version-Installer.exe",
            "staging/tools/cli-tools/**/*",
            "staging/tools/go-resolver/dinoforge-resolver.exe",
            "staging/tools/go-resolver/dinoforge-resolver",
            "staging/tools/rust-asset-pipeline/dinoforge_asset_pipeline.dll",
            "staging/tools/rust-asset-pipeline/libdinoforge_asset_pipeline.so",
            $env:ZIP_NAME
          )

          foreach ($pattern in $artifacts) {
            $files = Get-ChildItem $pattern -ErrorAction SilentlyContinue
            foreach ($file in $files) {
              $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
              $checksumContent += "$hash  $($file.Name)"
              Write-Host "Checksum for $($file.Name): $hash"
            }
          }

          # Write checksums to file
          $checksumContent | Out-File -FilePath $checksumFile -Encoding utf8
          Write-Host "Generated checksums for $($checksumContent.Count) artifacts"
          Write-Host "SHA256SUMS.txt contents:"
          Get-Content $checksumFile

      # ---------------------------------------------------------------
      # Extract CHANGELOG section for the release body
      # ---------------------------------------------------------------
      - name: Extract changelog section
        id: changelog
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:PACKAGE_VERSION
          $changelogPath = "CHANGELOG.md"
          $body = ""

          if (Test-Path $changelogPath) {
            $lines = Get-Content $changelogPath
            $inSection = $false
            $sectionLines = [System.Collections.Generic.List[string]]::new()

            foreach ($line in $lines) {
              # Match heading like ## [0.5.0] or ## [0.5.0] - 2026-03-11
              # Also match ## [Unreleased] when version matches a dev/pre-release tag
              if ($line -match "^## \[$([regex]::Escape($version))\]") {
                $inSection = $true
                continue
              }
              if ($inSection -and $line -match "^## \[") {
                break
              }
              if ($inSection) {
                $sectionLines.Add($line)
              }
            }

            if ($sectionLines.Count -eq 0) {
              # Fallback: use the [Unreleased] section
              $inSection = $false
              $sectionLines = [System.Collections.Generic.List[string]]::new()
              foreach ($line in $lines) {
                if ($line -match "^## \[Unreleased\]") {
                  $inSection = $true
                  continue
                }
                if ($inSection -and $line -match "^## \[") {
                  break
                }
                if ($inSection) {
                  $sectionLines.Add($line)
                }
              }
              if ($sectionLines.Count -gt 0) {
                $sectionLines.Insert(0, "_Release notes from [Unreleased] section — version heading not yet updated in CHANGELOG._")
                $sectionLines.Insert(1, "")
              }
            }

            $body = ($sectionLines | Where-Object { $_ -ne $null }) -join "`n"
          }

          if ([string]::IsNullOrWhiteSpace($body)) {
            $body = "See [CHANGELOG.md](CHANGELOG.md) for full details."
          }

          # Write to a temp file to avoid multiline env var issues
          $body | Out-File -FilePath release-notes.md -Encoding utf8
          Write-Host "Release notes extracted ($($body.Length) chars)"

      # ---------------------------------------------------------------
      # Verify all required release artifacts exist before publishing.
      # This is the hard gate — if any file is missing the release fails
      # with a clear list of what's absent rather than a cryptic error.
      # Required set: Installer EXE, EXE checksum, Windows ZIP,
      #               SDK NuGet, Templates NuGet, SHA256SUMS.txt
      # ---------------------------------------------------------------
      - name: Verify required release artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:PACKAGE_VERSION
          $required = @(
            "staging/DINOForge-v$version-Installer.exe",
            "staging/DINOForge-v$version-Installer.exe.sha256",
            "staging/SHA256SUMS.txt",
            "DINOForge-v$version-windows.zip"
          )
          # Desktop Companion is optional — may be skipped if VS Build Tools are unavailable
          $companionZip = "staging/DINOForge.Companion-v$version-win-x64.zip"
          if (Test-Path $companionZip) {
            $required += $companionZip
            $sha256File = "$companionZip.sha256"
            if (Test-Path $sha256File) { $required += $sha256File }
          }
          # NuGet packages — at least one SDK, Bridge.Protocol, Templates, and domain nupkgs must exist
          $nugetFiles = Get-ChildItem "staging/nuget/*.nupkg" -ErrorAction SilentlyContinue
          $hasSdk       = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.SDK\." }
          $hasProtocol  = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.Bridge\.Protocol\." }
          $hasClient    = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.Bridge\.Client\." }
          $hasTemplates = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.Templates\." }
          $hasWarfare   = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.Domains\.Warfare\." }
          $hasEconomy   = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.Domains\.Economy\." }
          $hasScenario  = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.Domains\.Scenario\." }
          $hasUI        = $nugetFiles | Where-Object { $_.Name -match "DINOForge\.Domains\.UI\." }

          $missing = @()
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { $missing += $path }
          }
          if (-not $hasSdk)       { $missing += "staging/nuget/DINOForge.SDK.*.nupkg" }
          if (-not $hasProtocol)  { $missing += "staging/nuget/DINOForge.Bridge.Protocol.*.nupkg" }
          if (-not $hasClient)    { $missing += "staging/nuget/DINOForge.Bridge.Client.*.nupkg" }
          if (-not $hasTemplates) { $missing += "staging/nuget/DINOForge.Templates.*.nupkg" }
          if (-not $hasWarfare)   { $missing += "staging/nuget/DINOForge.Domains.Warfare.*.nupkg" }
          if (-not $hasEconomy)   { $missing += "staging/nuget/DINOForge.Domains.Economy.*.nupkg" }
          if (-not $hasScenario)  { $missing += "staging/nuget/DINOForge.Domains.Scenario.*.nupkg" }
          if (-not $hasUI)        { $missing += "staging/nuget/DINOForge.Domains.UI.*.nupkg" }

          if ($missing.Count -gt 0) {
            Write-Host "::error::Release artifact check FAILED. Missing files:"
            $missing | ForEach-Object { Write-Host "::error::  - $_" }
            exit 1
          }

          Write-Host "All required release artifacts present:"
          $required | ForEach-Object { Write-Host "  [OK] $_" }
          $nugetFiles | ForEach-Object { Write-Host "  [OK] staging/nuget/$($_.Name)" }

      # ---------------------------------------------------------------
      # Publish GitHub Release
      # ---------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: DINOForge ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
          draft: false
          files: |
            ${{ env.ZIP_NAME }}
            staging/nuget/*.nupkg
            staging/DINOForge-v${{ steps.version.outputs.VERSION }}-Installer.exe
            staging/DINOForge-v${{ steps.version.outputs.VERSION }}-Installer.exe.sha256
            staging/DINOForge.Companion-v${{ steps.version.outputs.VERSION }}-win-x64.zip
            staging/DINOForge.Companion-v${{ steps.version.outputs.VERSION }}-win-x64.zip.sha256
            staging/tools/cli-tools/PackCompiler-win-x64/**
            staging/tools/cli-tools/PackCompiler-linux-x64/**
            staging/tools/cli-tools/PackCompiler-linux-arm64/**
            staging/tools/cli-tools/PackCompiler-osx-x64/**
            staging/tools/cli-tools/PackCompiler-osx-arm64/**
            staging/tools/cli-tools/DumpTools-win-x64/**
            staging/tools/cli-tools/DumpTools-linux-x64/**
            staging/tools/cli-tools/DumpTools-linux-arm64/**
            staging/tools/cli-tools/DumpTools-osx-x64/**
            staging/tools/cli-tools/DumpTools-osx-arm64/**
            staging/tools/go-resolver/dinoforge-resolver.exe
            staging/tools/go-resolver/dinoforge-resolver
            staging/tools/go-resolver/SHA256SUMS.txt
            staging/tools/rust-asset-pipeline/dinoforge_asset_pipeline.dll
            staging/tools/rust-asset-pipeline/libdinoforge_asset_pipeline.so
            staging/tools/rust-asset-pipeline/SHA256SUMS.txt
            staging/SHA256SUMS.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload Desktop Companion (optional — skipped if VS Build Tools unavailable)
      - name: Upload Desktop Companion
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: desktop-companion
          path: |
            staging/DINOForge.Companion-v${{ steps.version.outputs.VERSION }}-win-x64.zip
            staging/DINOForge.Companion-v${{ steps.version.outputs.VERSION }}-win-x64.zip.sha256
          if-no-files-found: ignore

      # ---------------------------------------------------------------
      # Generate SLSA L2 build provenance attestations
      # ---------------------------------------------------------------
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            staging/DINOForge-v${{ steps.version.outputs.VERSION }}-Installer.exe
            staging/nuget/*.nupkg
            ${{ env.ZIP_NAME }}
