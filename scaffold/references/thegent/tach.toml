# Tach Configuration — Architecture Enforcement
# https://github.com/tach-org/tach

source_roots = ["src"]

exclude = [
  "**/__pycache__",
  "**/.pytest_cache",
  "**/.venv",
  "**/tests",
  "build",
  "dist",
  "docs",
]

exact = true
forbid_circular_dependencies = false
root_module = "ignore"

[rules]
unused_ignore_directives = "error"
require_ignore_directive_reasons = "error"

[[modules]]
path = "thegent.config"
depends_on = []

[[modules]]
path = "thegent.exit_codes"
depends_on = []

[[modules]]
path = "thegent.output_parser"
depends_on = ["thegent.contracts"]

[[modules]]
path = "thegent.contracts"
depends_on = ["thegent.output_parser"]

[[modules]]
path = "thegent.models"
depends_on = ["thegent.config", "thegent.agents"]

[[modules]]
path = "thegent.execution"
depends_on = [ "thegent.contracts", "thegent.cli_impl"]

[[modules]]
path = "thegent.agents"
depends_on = ["thegent.config", "thegent.contracts", "thegent.observability"]

[[modules]]
path = "thegent.operations"
depends_on = []

[[modules]]
path = "thegent.orchestration_modes"
depends_on = []

[[modules]]
path = "thegent.planning"
depends_on = []

[[modules]]
path = "thegent.routing"
depends_on = [ "thegent.execution"]

[[modules]]
path = "thegent.observability"
depends_on = []

[[modules]]
path = "thegent.cli_impl"
depends_on = [
    "thegent.config",
    "thegent.contracts",
    "thegent.models",
    "thegent.execution",
    "thegent.agents",
    "thegent.output_parser",
    "thegent.operations",
    "thegent.orchestration_modes",
    "thegent.observability"]

[[modules]]
path = "thegent.cli"
depends_on = [
    "thegent.config",
    "thegent.contracts",
    "thegent.models",
    "thegent.execution",
    "thegent.agents",
    "thegent.cli_impl",
    "thegent.operations",
    "thegent.orchestration_modes",
    "thegent.planning",
    "thegent.exit_codes",
    "thegent.routing"
]

[[modules]]
path = "thegent.mcp_server"
depends_on = [
    "thegent.config",
    "thegent.models",
    "thegent.agents",
    "thegent.operations",
    "thegent.orchestration_modes",
    "thegent.cli_impl"
, "thegent.output_parser"]

[[modules]]
path = "thegent.main"
depends_on = [
    "thegent.config",
    "thegent.models",
    "thegent.agents",
    "thegent.cli_impl",
    "thegent.cli",
    "thegent.mcp_server"
, "thegent.contracts"]
