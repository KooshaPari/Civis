<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Violet faction: The Veil Sigil — arcane eye over a crescent, mystic geometry -->
  <defs>
    <filter id="violetGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="violetAmbient" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ambient -->
  <circle cx="64" cy="68" r="50" fill="url(#violetAmbient)"/>
  <!-- outer rotated-square ring (arcane) -->
  <polygon points="64,12 116,64 64,116 12,64"
    fill="none" stroke="#9b59b6" stroke-width="2" opacity="0.45"/>
  <polygon points="64,24 104,64 64,104 24,64"
    fill="none" stroke="#9b59b6" stroke-width="1.2" opacity="0.3"/>
  <!-- crescent moon base -->
  <path d="M44 92 A26 26 0 1 0 84 92 A20 20 0 1 1 44 92 Z"
    fill="#1a0e23" stroke="#9b59b6" stroke-width="2.5" filter="url(#violetGlow)"/>
  <!-- central arcane eye -->
  <ellipse cx="64" cy="58" rx="26" ry="15"
    fill="#150a1d" stroke="#9b59b6" stroke-width="3" filter="url(#violetGlow)"/>
  <ellipse cx="64" cy="58" rx="11" ry="11" fill="#2a1538" stroke="#c08fd6" stroke-width="2"/>
  <circle cx="64" cy="58" r="4.5" fill="#c08fd6" filter="url(#violetGlow)"/>
  <!-- upper rays -->
  <line x1="64" y1="40" x2="64" y2="22" stroke="#9b59b6" stroke-width="2.5" stroke-linecap="round" filter="url(#violetGlow)"/>
  <line x1="48" y1="44" x2="38" y2="32" stroke="#9b59b6" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="80" y1="44" x2="90" y2="32" stroke="#9b59b6" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- apex + flank nodes -->
  <circle cx="64" cy="18" r="4" fill="#9b59b6" filter="url(#violetGlow)"/>
  <circle cx="38" cy="28" r="2.5" fill="#9b59b6" opacity="0.7"/>
  <circle cx="90" cy="28" r="2.5" fill="#9b59b6" opacity="0.7"/>
</svg>
