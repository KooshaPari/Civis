<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | loading-enemy.svg | 1920x1080 Classic Enemy loading background -->
<!-- Palette: #141A18 base, #8B1A1A OPFOR red, #3D4145 gunmetal, #D42B2B crimson, #E0DDD5 cold paper -->
<!-- Layout: dossier/folder-desk briefing aesthetic (Classic Enemy perspective) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Enemy background: darker, slightly reddish center glow -->
    <radialGradient id="enemy-bg" cx="50%" cy="50%" r="65%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1A1010" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080A0A" stop-opacity="1"/>
    </radialGradient>
    <!-- Woodland camo texture pattern -->
    <pattern id="woodland-marks" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <ellipse cx="60" cy="50" rx="40" ry="22" fill="#3A4A2E" fill-opacity="0.2"/>
      <ellipse cx="150" cy="120" rx="50" ry="18" fill="#252E22" fill-opacity="0.18"/>
      <ellipse cx="30" cy="160" rx="28" ry="35" fill="#2E3528" fill-opacity="0.15"/>
      <ellipse cx="170" cy="40" rx="30" ry="15" fill="#3A4A2E" fill-opacity="0.12"/>
      <ellipse cx="110" cy="170" rx="35" ry="16" fill="#252E22" fill-opacity="0.15"/>
    </pattern>
    <!-- Tactical grid for enemy: slightly larger cells -->
    <pattern id="enemy-grid" x="0" y="0" width="160" height="120" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="160" y2="0" stroke="#E0DDD5" stroke-width="0.5" stroke-opacity="0.04"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#E0DDD5" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- === LAYER 1: Base background === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#enemy-bg)"/>

  <!-- === LAYER 2: Woodland texture === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#woodland-marks)"/>

  <!-- === LAYER 3: Tactical grid === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#enemy-grid)"/>

  <!-- === LAYER 4: Red diagonal scan overlay (enemy radar feel) === -->
  <line x1="0" y1="360" x2="1920" y2="360" stroke="#D42B2B" stroke-width="0.5" stroke-opacity="0.06"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#D42B2B" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- === LAYER 5: Edge vignettes === -->
  <defs>
    <linearGradient id="e-left-v" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060404" stop-opacity="0.8"/>
      <stop offset="25%" stop-color="#060404" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="e-right-v" x1="0" y1="0" x2="1" y2="0">
      <stop offset="75%" stop-color="#060404" stop-opacity="0"/>
      <stop offset="100%" stop-color="#060404" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="e-top-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040202" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#040202" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="e-bot-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="80%" stop-color="#040202" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040202" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="480" height="1080" fill="url(#e-left-v)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#e-right-v)"/>
  <rect x="0" y="0" width="1920" height="216" fill="url(#e-top-v)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#e-bot-v)"/>

  <!-- === LAYER 6: Corner bracket marks (enemy style — crimson) === -->
  <polyline points="40,40 40,100 100,100" fill="none" stroke="#3D4145" stroke-width="1.5" stroke-opacity="0.6"/>
  <polyline points="1880,40 1880,100 1820,100" fill="none" stroke="#3D4145" stroke-width="1.5" stroke-opacity="0.6"/>
  <polyline points="40,1040 40,980 100,980" fill="none" stroke="#3D4145" stroke-width="1.5" stroke-opacity="0.6"/>
  <polyline points="1880,1040 1880,980 1820,980" fill="none" stroke="#3D4145" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Crimson tick marks -->
  <line x1="40" y1="70" x2="56" y2="70" stroke="#D42B2B" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="70" y1="40" x2="70" y2="56" stroke="#D42B2B" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="1880" y1="70" x2="1864" y2="70" stroke="#D42B2B" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="1850" y1="40" x2="1850" y2="56" stroke="#D42B2B" stroke-width="1" stroke-opacity="0.5"/>

  <!-- === LAYER 7: CENTRAL BRIEFING PANEL (860x480 centered) === -->
  <!-- Panel shadow -->
  <rect x="526" y="298" width="868" height="488" fill="#000000" fill-opacity="0.5"/>
  <!-- Panel body: gunmetal #3D4145 @ 88% with dark edge -->
  <rect x="524" y="296" width="868" height="484" fill="#1A1010" fill-opacity="0.94"/>
  <!-- Panel border: 1px OPFOR red -->
  <rect x="524" y="296" width="868" height="484" fill="none" stroke="#8B1A1A" stroke-width="1"/>
  <!-- Panel left accent strip: 3px crimson (enemy) -->
  <rect x="524" y="296" width="3" height="484" fill="#D42B2B"/>

  <!-- TOP STRIP: faction designations -->
  <rect x="527" y="299" width="430" height="55" fill="#8B1A1A" fill-opacity="0.7"/>
  <rect x="957" y="299" width="432" height="55" fill="#3D4145" fill-opacity="0.7"/>
  <line x1="957" y1="299" x2="957" y2="354" stroke="#E0DDD5" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Labels -->
  <text x="680" y="332" font-family="Oswald, sans-serif" font-size="14" font-weight="700" fill="#E0DDD5" text-anchor="middle" letter-spacing="3">CLASSIC ENEMY</text>
  <text x="1175" y="332" font-family="Oswald, sans-serif" font-size="14" font-weight="700" fill="#E0DDD5" text-anchor="middle" letter-spacing="3" fill-opacity="0.6">WESTERN ALLIANCE</text>
  <!-- Enemy star icon -->
  <polygon points="580,315 582.4,322.6 590,322.6 584,327.4 586.4,335 580,330.3 573.6,335 576,327.4 570,322.6 577.6,322.6" fill="#E0DDD5"/>
  <!-- Alliance icon (muted) -->
  <circle cx="1085" cy="327" r="12" fill="none" stroke="#E0DDD5" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1085" y1="315" x2="1085" y2="339" stroke="#E0DDD5" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1073" y1="327" x2="1097" y2="327" stroke="#E0DDD5" stroke-width="1" stroke-opacity="0.4"/>

  <line x1="527" y1="354" x2="1391" y2="354" stroke="#8B1A1A" stroke-width="1"/>

  <!-- CENTER ZONE: dossier/folder aesthetic -->
  <!-- Folder tab strip above map placeholder -->
  <rect x="539" y="360" width="80" height="12" rx="2" fill="#3D4145"/>
  <text x="579" y="371" font-family="Share Tech Mono, monospace" font-size="9" fill="#887060" text-anchor="middle" letter-spacing="1">DOC-774</text>
  <!-- Map placeholder (same position) -->
  <rect x="539" y="372" width="256" height="256" fill="#0A0808"/>
  <rect x="539" y="372" width="256" height="256" fill="none" stroke="#8B1A1A" stroke-width="4"/>
  <!-- Enemy map markers -->
  <line x1="539" y1="415" x2="795" y2="415" stroke="#252829" stroke-width="0.8"/>
  <line x1="539" y1="458" x2="795" y2="458" stroke="#252829" stroke-width="0.8"/>
  <line x1="539" y1="501" x2="795" y2="501" stroke="#252829" stroke-width="0.8"/>
  <line x1="539" y1="544" x2="795" y2="544" stroke="#252829" stroke-width="0.8"/>
  <line x1="582" y1="372" x2="582" y2="628" stroke="#252829" stroke-width="0.8"/>
  <line x1="625" y1="372" x2="625" y2="628" stroke="#252829" stroke-width="0.8"/>
  <line x1="668" y1="372" x2="668" y2="628" stroke="#252829" stroke-width="0.8"/>
  <line x1="711" y1="372" x2="711" y2="628" stroke="#252829" stroke-width="0.8"/>
  <line x1="754" y1="372" x2="754" y2="628" stroke="#252829" stroke-width="0.8"/>
  <!-- Enemy unit markers on map -->
  <rect x="590" y="410" width="8" height="8" fill="#D42B2B" fill-opacity="0.8"/>
  <rect x="630" y="450" width="6" height="6" fill="#D42B2B" fill-opacity="0.6"/>
  <circle cx="700" cy="510" r="4" fill="#6AACCC" fill-opacity="0.5"/>
  <text x="667" y="640" font-family="Share Tech Mono, monospace" font-size="10" fill="#887060" text-anchor="middle" letter-spacing="2">SECTOR ALPHA</text>

  <!-- Redaction bars (3 bars per identity doc, left of map) -->
  <!-- These bars appear to the right of map placeholder, dossier style -->
  <rect x="811" y="372" width="390" height="9" rx="1" fill="#0A0A0A"/>
  <!-- Top bar: contains enemy faction icon as negative-space cutout (simulated) -->
  <text x="1020" y="379" font-family="Share Tech Mono, monospace" font-size="8" fill="#887060" text-anchor="middle" letter-spacing="3">■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■</text>

  <!-- Mission title (enemy style) -->
  <text x="811" y="406" font-family="Oswald, sans-serif" font-size="28" font-weight="700" fill="#D42B2B" letter-spacing="2">ОПЕРАЦИЯ: КРАСНЫЙ РУБЕЖ</text>
  <text x="811" y="428" font-family="Oswald, sans-serif" font-size="14" font-weight="400" fill="#887060" letter-spacing="2">OPERATION: RED THRESHOLD</text>
  <!-- Sub-header -->
  <text x="811" y="450" font-family="Share Tech Mono, monospace" font-size="11" fill="#887060" letter-spacing="3">VECTOR-03  //  PHASE 01  //  H+48</text>
  <line x1="811" y1="460" x2="1375" y2="460" stroke="#8B1A1A" stroke-width="1"/>

  <!-- Briefing text (Cold Paper) -->
  <text x="811" y="486" font-family="Special Elite, serif" font-size="13" fill="#C9A96E" xml:space="preserve">Forward armor elements have secured the Borova crossing.</text>
  <text x="811" y="506" font-family="Special Elite, serif" font-size="13" fill="#C9A96E" xml:space="preserve">Alliance air cover has been suppressed. Ground superiority</text>
  <text x="811" y="526" font-family="Special Elite, serif" font-size="13" fill="#C9A96E" xml:space="preserve">is achievable — sustain pressure on the northern salient.</text>

  <!-- Redaction bars (dossier flavor) -->
  <rect x="811" y="548" width="308" height="8" rx="1" fill="#0A0A0A"/>
  <rect x="811" y="562" width="242" height="8" rx="1" fill="#0A0A0A"/>
  <rect x="811" y="576" width="385" height="8" rx="1" fill="#0A0A0A"/>

  <!-- Steel Ice comms indicator -->
  <text x="811" y="604" font-family="Share Tech Mono, monospace" font-size="11" fill="#6AACCC" letter-spacing="1">COMMS: SECURE  //  CHANNEL: 14.7 MHz</text>
  <text x="811" y="621" font-family="Share Tech Mono, monospace" font-size="11" fill="#606050" letter-spacing="1">AUTH: YENISEI-PRIME  //  CLEARANCE: OMEGA</text>

  <!-- BOTTOM STRIP: progress bar -->
  <line x1="527" y1="715" x2="1391" y2="715" stroke="#8B1A1A" stroke-width="1"/>
  <rect x="539" y="724" width="840" height="6" rx="3" fill="#252829"/>
  <!-- Progress at 42% (enemy-side slower aesthetically) -->
  <rect x="539" y="724" width="353" height="6" rx="3" fill="#D42B2B"/>
  <text x="539" y="749" font-family="Share Tech Mono, monospace" font-size="12" fill="#887060" letter-spacing="2">ЗАГРУЗКА РЕСУРСОВ... 42%</text>
  <circle cx="1381" cy="745" r="4" fill="#D42B2B"/>

  <!-- === LAYER 8: LOGO PLACEHOLDER (top-center) === -->
  <rect x="720" y="140" width="480" height="96" fill="none" stroke="#8B1A1A" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.4"/>
  <text x="960" y="200" font-family="Bebas Neue, Oswald, sans-serif" font-size="48" font-weight="400" fill="#E0DDD5" text-anchor="middle" letter-spacing="12">WARFARE: MODERN</text>
  <line x1="720" y1="212" x2="1244" y2="212" stroke="#E0DDD5" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- === LAYER 9: TIP STRIP === -->
  <rect x="0" y="1032" width="1920" height="48" fill="#0A0606" fill-opacity="0.98"/>
  <line x1="0" y1="1032" x2="1920" y2="1032" stroke="#252829" stroke-width="1"/>
  <text x="48" y="1062" font-family="Barlow Condensed, sans-serif" font-size="14" fill="#887060" letter-spacing="1.5">TACTICAL TIP &gt;&gt;  Armored columns advancing past the ridge line draw defensive fire — use forward infantry to pin fortified positions first.</text>

  <!-- === LAYER 10: Scan lines === -->
  <defs>
    <pattern id="e-scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="1" fill="#000000" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#e-scanlines)"/>
</svg>
