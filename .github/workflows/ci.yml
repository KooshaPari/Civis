name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@6bd8b7f7c1bea521e4b6fd673d2a96b6afc12c3d # v4.1.0
        with:
          dotnet-version: |
            11.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln
        env:
          CI: 'true'

      - name: Build dependencies (ordered)
        run: |
          for p in \
            src/SDK/DINOForge.SDK.csproj \
            src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            src/Bridge/Client/DINOForge.Bridge.Client.csproj \
            src/Domains/Warfare/DINOForge.Domains.Warfare.csproj \
            src/Domains/Economy/DINOForge.Domains.Economy.csproj \
            src/Domains/Scenario/DINOForge.Domains.Scenario.csproj \
            src/Domains/UI/DINOForge.Domains.UI.csproj \
            src/Tools/Installer/InstallerLib/DINOForge.Tools.Installer.csproj; do
            dotnet build "$p" -c Release --no-restore --verbosity minimal || exit 1
          done
        # Note: Runtime excluded - requires Unity which is only available locally

      - name: Build
        run: dotnet build src/DINOForge.CI.NoRuntime.sln --no-restore --configuration Release /p:BuildInParallel=false

      # Unit tests run in CI — they don't require Unity/Runtime (excluded from NoRuntime.sln)
      - name: Test (Unit)
        run: dotnet test src/Tests/DINOForge.Tests.csproj --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Test (Integration)
        run: dotnet test src/Tests/Integration/DINOForge.Tests.Integration.csproj --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@30eadd5010312f995f0d3b3cff7fe2984f69409e # v2.16.1
        if: always()
        with:
          files: |
            **/*.trx
          check_name: Unit & Integration Tests
          compare_to_earlier_commit: false
