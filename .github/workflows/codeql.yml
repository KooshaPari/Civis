name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@6bd8b7f7c1bea521e4b6fd673d2a96b6afc12c3d # v4.1.0 
        with:
          dotnet-version: 11.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln

      - name: Build
        run: |
          for p in \
            src/SDK/DINOForge.SDK.csproj \
            src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            src/Bridge/Client/DINOForge.Bridge.Client.csproj \
            src/Domains/Warfare/DINOForge.Domains.Warfare.csproj \
            src/Domains/Economy/DINOForge.Domains.Economy.csproj \
            src/Domains/Scenario/DINOForge.Domains.Scenario.csproj \
            src/Domains/UI/DINOForge.Domains.UI.csproj \
            src/Tools/Installer/InstallerLib/DINOForge.Tools.Installer.csproj; do
            dotnet build "$p" -c Release --no-restore --verbosity minimal || exit 1
          done
          dotnet build src/DINOForge.CI.NoRuntime.sln -c Release --no-restore /p:BuildInParallel=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
