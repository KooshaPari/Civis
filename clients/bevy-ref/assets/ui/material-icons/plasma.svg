<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Plasma: arcing energy bolt. Palette: arcane #9B7BF0 + holo-cyan core. Emits. -->
  <defs>
    <filter id="plasmaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <polyline points="18,6 26,20 18,24 30,42" fill="none" stroke="#9B7BF0"
            stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
            filter="url(#plasmaGlow)"/>
  <polyline points="18,6 26,20 18,24 30,42" fill="none" stroke="#7FE9FF"
            stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
