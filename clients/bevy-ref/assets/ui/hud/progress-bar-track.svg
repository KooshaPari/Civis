<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 20">
  <!--
    Progress bar track (empty). Horizontal, 9-slice at x=10/230.
    Fill with progress-bar-fill.svg overlay at desired width %.
  -->
  <defs>
    <linearGradient id="trackBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080e1c"/>
      <stop offset="100%" stop-color="#050a14"/>
    </linearGradient>
  </defs>
  <!-- track body -->
  <rect x="0" y="0" width="240" height="20" rx="10" ry="10" fill="url(#trackBg)"/>
  <!-- track border -->
  <rect x="0.75" y="0.75" width="238.5" height="18.5" rx="9.5" ry="9.5"
    fill="none" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
  <!-- inner shadow rim -->
  <rect x="2" y="2" width="236" height="16" rx="8" ry="8"
    fill="none" stroke="#000" stroke-width="1" opacity="0.35"/>
  <!-- tick marks (every 25%) -->
  <line x1="60" y1="4" x2="60" y2="16" stroke="#50C8F0" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="2" x2="120" y2="18" stroke="#50C8F0" stroke-width="1.5" opacity="0.4"/>
  <line x1="180" y1="4" x2="180" y2="16" stroke="#50C8F0" stroke-width="1" opacity="0.3"/>
</svg>
