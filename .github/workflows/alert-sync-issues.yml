# Alert sync to issues. Calls the phenoShared reusable (caller body is tiny;
# the heavy work is in phenoShared). Cron downshifted from hourly to weekly
# to stop the pr-billing drift the reused reusable's transitive work caused.
name: Alert sync issues
on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  security-events: read

jobs:
  sync:
    uses: KooshaPari/phenoShared/.github/workflows/alert-sync-issues.yml@main
    with:
      auto-label: auto-alert-sync
