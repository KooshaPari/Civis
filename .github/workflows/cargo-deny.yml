# Local-first: PRs use quality.yml + pr-governance only.
# Heavy gate (cargo-deny) runs locally via lefthook pre-push and is attested
# in `.ci/quality-manifest.json`; this workflow is dispatch-only.
name: cargo-deny

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  cargo-deny:
    # Manual escape hatch: run heavy deny on the runner when explicitly asked.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable
