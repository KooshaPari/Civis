<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Ice: crystalline hexagonal structure -->
  <defs>
    <filter id="iceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="iceFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#c8e8f8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4080a0" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- hexagon body -->
  <polygon points="24,4 40,14 40,34 24,44 8,34 8,14"
    fill="url(#iceFill)" stroke="#a0d0f0" stroke-width="2" filter="url(#iceGlow)"/>
  <!-- inner hex -->
  <polygon points="24,12 34,18 34,30 24,36 14,30 14,18"
    fill="none" stroke="#a0d0f0" stroke-width="1" opacity="0.6"/>
  <!-- snowflake arms (6 radial lines from center) -->
  <line x1="24" y1="24" x2="24" y2="4" stroke="#e0f4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="24" x2="24" y2="44" stroke="#e0f4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="24" x2="8" y2="14" stroke="#e0f4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="24" x2="40" y2="34" stroke="#e0f4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="24" x2="40" y2="14" stroke="#e0f4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="24" x2="8" y2="34" stroke="#e0f4ff" stroke-width="1.5" opacity="0.7"/>
  <!-- center crystal dot -->
  <circle cx="24" cy="24" r="3.5" fill="#e0f4ff" filter="url(#iceGlow)"/>
  <!-- small cross-tick on each arm -->
  <line x1="22" y1="14" x2="26" y2="14" stroke="#a0d0f0" stroke-width="1" opacity="0.8"/>
  <line x1="22" y1="34" x2="26" y2="34" stroke="#a0d0f0" stroke-width="1" opacity="0.8"/>
</svg>
