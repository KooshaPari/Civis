name: Security Guard

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions: {}

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3
        with:
          languages: csharp
          build-mode: manual

      - name: Setup .NET
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln /p:RestoreLockedMode=true

      - name: Build
        run: dotnet build src/DINOForge.CI.NoRuntime.sln --configuration Release --no-restore /p:BuildProjectReferences=true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@75add79b929b263dae147d2e5bcf0daf292165cf # v-latest
        with:
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.0.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln /p:RestoreLockedMode=true

      - name: Run vulnerability scan
        run: |
          # dotnet list package --vulnerable requires a project/solution path
          dotnet list src/DINOForge.CI.NoRuntime.sln package --vulnerable --include-transitive 2>&1 | tee audit-output.txt
          # Fail if any critical/high vulnerabilities are found
          if grep -qi "has the following vulnerable packages" audit-output.txt; then
            echo "::warning::Vulnerable packages detected. Review the output above."
          fi
