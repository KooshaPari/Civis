<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- isometric block: top face -->
  <polygon points="32,8 52,20 32,32 12,20"
    fill="#112240" stroke="#50C8F0" stroke-width="2" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- left face -->
  <polygon points="12,20 32,32 32,52 12,40"
    fill="#0a1628" stroke="#50C8F0" stroke-width="2" stroke-linejoin="round"/>
  <!-- right face -->
  <polygon points="52,20 32,32 32,52 52,40"
    fill="#0d1e36" stroke="#50C8F0" stroke-width="2" stroke-linejoin="round"/>
  <!-- top face center cross -->
  <line x1="32" y1="8" x2="32" y2="32" stroke="#50C8F0" stroke-width="0.8" opacity="0.4"/>
  <line x1="12" y1="20" x2="52" y2="20" stroke="#50C8F0" stroke-width="0.8" opacity="0.4"/>
  <!-- gold accent dot on top-center -->
  <circle cx="32" cy="20" r="2.5" fill="#E8B84B" opacity="0.85" filter="url(#glow)"/>
  <!-- small plus icon indicating "spawn/place" -->
  <line x1="32" y1="14" x2="32" y2="10" stroke="#E8B84B" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="12" x2="34" y2="12" stroke="#E8B84B" stroke-width="1.5" opacity="0.7"/>
</svg>
