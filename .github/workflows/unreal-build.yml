# Local-first: PRs use quality.yml + pr-governance only.
# Optional Unreal compile check on Windows. The full UBT run only ever succeeded
# on a Windows self-hosted runner with UE 5.4 installed; on the GitHub-hosted
# ubuntu/windows runner it always exits with code 2 (engine not found). The
# real compile path is the developer machine via `.\clients\unreal-show\scripts\build.ps1`
# (or with `CIVIS_QUALITY_UNREAL=1 lefthook run pre-push`, which records
# `unreal_preflight` / `unreal_build` into the manifest).
name: Unreal build (optional)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  unreal-show:
    # Manual escape hatch: rerun the rust-shim + UE build (windows-latest).
    if: github.event_name == 'workflow_dispatch'
    name: civ-show (rust-shim + UE if present)
    runs-on: windows-2022
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Run automated build script
        shell: pwsh
        working-directory: clients/unreal-show
        run: |
          $out = & ./scripts/build.ps1 2>&1
          $code = $LASTEXITCODE
          $out | Write-Host
          switch ($code) {
            0 { Write-Host 'UE build succeeded (runner had engine installed).' }
            2 {
              Write-Host '::notice::UE 5.4 not on runner — rust-shim built; UE step skipped (expected on GitHub-hosted).'
            }
            default { exit $code }
          }
