# SonarCloud configuration for DINOForge (KooshaPari/Dino on SonarCloud)
# Retrigger Sonar scan PR188
# See: https://docs.sonarcloud.io/enriching/test-coverage/test-coverage-parameters/

# GitHub App PR analysis uses KooshaPari_Dino; CI SONAR_TOKEN must target the same project.
sonar.projectKey=KooshaPari_Dino
sonar.organization=kooshapari

# Source directories
sonar.sources=src/SDK,src/Bridge,src/Domains,src/Tools

# Test directories
sonar.tests=src/Tests,src/Tests/Integration,src/Tools/DinoforgeMcp/tests,src/Tools/PackCompiler/Tests
sonar.test.inclusions=**/*.Tests.cs

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.cs.opencover.reportsPaths=src/Tests/coverage.cobertura.xml
sonar.cs.xunit.reportsPaths=**/*.trx

# Exclusions — generated code, tests, CI-only, Runtime (needs Unity)
sonar.exclusions=\
  **/*.generated.cs,\
  **/obj/**,\
  **/bin/**,\
  **/packages/**,\
  **/Runtime/**,\
  **/*Tests*.cs,\
  **/Mocks/**,\
  **/Fixtures/**,\
  scripts/**,\
  packs/**,\
  tools/**,\
  .claude/**,\
  *.ps1,\
  **/BenchmarkDotNet.Artifacts/**,\
  docs/.vitepress/**,\
  docs/qa/**

# Coverage exclusions (test files, generated, CI-only)
sonar.coverage.exclusions=\
  **/*.Tests.cs,\
  **/Test*.cs,\
  **/Mock*.cs,\
  **/obj/**,\
  **/bin/**,\
  **/packages/**,\
  **/Runtime/**

# CPD exclusions (duplication detection off for tests, fixtures, CI/QA artifacts, analyzers)
sonar.cpd.exclusions=\
  **/Tests/**,\
  **/tests/**,\
  **/Fixtures/**,\
  src/Analyzers/**,\
  src/Tools/MockSteamworksNet/**,\
