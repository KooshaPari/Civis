name: MCP Server Pytest Suite

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/Tools/DinoforgeMcp/**'
      - '.github/workflows/mcp-pytest.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/Tools/DinoforgeMcp/**'
      - '.github/workflows/mcp-pytest.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Pytest Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: src/Tools/DinoforgeMcp
        run: |
          python -m pip install --upgrade "pip==25.0.1"
          pip install -e ".[dev]" -q
          pip install "pytest==8.3.5" "pytest-asyncio==0.25.0" "pytest-cov==6.0.0" "pytest-timeout==2.3.1" "pytest-xdist==3.6.1"

      - name: Run pytest
        working-directory: src/Tools/DinoforgeMcp
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=dinoforge_mcp \
            --cov-report=term-missing \
            --cov-report=json \
            --cov-report=html \
            --junit-xml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@eaaf4bedf32dbdc6b720b63067d99c4d77d6047d # v3.1.4
        with:
          files: ./src/Tools/DinoforgeMcp/coverage.json
          flags: mcp-server
          name: mcp-server-coverage
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            src/Tools/DinoforgeMcp/test-results.xml
            src/Tools/DinoforgeMcp/htmlcov/

      - name: Publish test report
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5 # v1.9.1
        if: always()
        with:
          name: Pytest Results (Python ${{ matrix.python-version }})
          path: src/Tools/DinoforgeMcp/test-results.xml
          reporter: java-junit

      - name: Check coverage threshold
        working-directory: src/Tools/DinoforgeMcp
        run: |
          python -c "
          import json
          with open('coverage.json') as f:
              coverage = json.load(f)
          total_coverage = coverage['totals']['percent_covered']
          print(f'Total coverage: {total_coverage}%')
          if total_coverage < 70:
              exit(1)
          "
        continue-on-error: true

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: src/Tools/DinoforgeMcp
        run: |
          python -m pip install --upgrade "pip==25.0.1"
          pip install -e ".[dev]" -q
          pip install "flake8==7.1.1" "black==24.10.0" "isort==5.13.2" "mypy==1.14.1"

      - name: Run Black
        working-directory: src/Tools/DinoforgeMcp
        run: black --check tests/
        continue-on-error: true

      - name: Run isort
        working-directory: src/Tools/DinoforgeMcp
        run: isort --check-only tests/
        continue-on-error: true

      - name: Run flake8
        working-directory: src/Tools/DinoforgeMcp
        run: flake8 tests/ --max-line-length=120
        continue-on-error: true

      - name: Run mypy
        working-directory: src/Tools/DinoforgeMcp
        run: mypy tests/ --ignore-missing-imports
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: src/Tools/DinoforgeMcp
        run: |
          python -m pip install --upgrade "pip==25.0.1"
          pip install -e ".[dev]" -q
          pip install "pytest==8.3.5" "pytest-asyncio==0.25.0" "pytest-timeout==2.3.1"

      - name: Run integration tests
        working-directory: src/Tools/DinoforgeMcp
        run: |
          pytest tests/ -v -m integration --tb=short
        continue-on-error: true

  summary:
    name: Test Summary
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8

      - name: Generate summary
        run: |
          echo "## MCP Server Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test artifacts available in workflow run." >> $GITHUB_STEP_SUMMARY
