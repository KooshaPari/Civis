<?xml version="1.0" encoding="UTF-8"?>
<!--
  DINOForge — warfare-starwars
  Role Icon: Vehicle (ground walker / tank)
  Motif: Stylised bipedal walker silhouette — trapezoidal body, two angular leg struts,
         turret dome on top. Reads as "walker" at 16px. Original geometry.
  64×64, monochrome white.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Vehicle</title>
  <!-- Turret dome -->
  <ellipse cx="32" cy="14" rx="10" ry="7" fill="#F5F7FA"/>
  <!-- Cannon barrel from turret -->
  <rect x="38" y="11" width="16" height="4" rx="1" fill="#F5F7FA"/>
  <!-- Main body: trapezoid (wider at bottom) -->
  <polygon points="14,22 50,22 46,40 18,40" fill="#F5F7FA"/>
  <!-- Left leg upper strut -->
  <rect x="15" y="40" width="7" height="12" rx="2"
    transform="rotate(-10 18.5 40)" fill="#F5F7FA"/>
  <!-- Right leg upper strut -->
  <rect x="42" y="40" width="7" height="12" rx="2"
    transform="rotate(10 45.5 40)" fill="#F5F7FA"/>
  <!-- Left foot / ankle joint -->
  <rect x="9"  y="52" width="14" height="6" rx="2" fill="#F5F7FA"/>
  <!-- Right foot -->
  <rect x="41" y="52" width="14" height="6" rx="2" fill="#F5F7FA"/>
  <!-- Viewport slit on body -->
  <rect x="22" y="27" width="20" height="4" rx="1" fill="#05060A"/>
  <!-- Neck joint -->
  <rect x="28" y="20" width="8" height="4" rx="1" fill="#C5CCD6"/>
</svg>
