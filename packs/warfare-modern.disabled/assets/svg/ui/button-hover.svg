<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | button-hover.svg | 256x96 angular military button (hover state) -->
<!-- State: Hover | Fill: #243347 | Border: #F5A623 1px | Text: #F5A623 -->
<!-- 9-slice insets: left=20, top=16, right=20, bottom=16
     Same chamfer corners as button-normal (12px TL + BR).
     >> chevron glyph (Share Tech Mono) is in left non-stretch zone (x=6..20). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 96" width="256" height="96">

  <!-- === BUTTON BODY (chamfered TL + BR 12px) === -->
  <polygon
    points="12,0 256,0 256,84 244,96 0,96 0,12"
    fill="#243347"/>

  <!-- === OUTER BORDER: 1px #F5A623 (amber — hover state) === -->
  <polygon
    points="12,0.5 255.5,0.5 255.5,83.5 243.5,95.5 0.5,95.5 0.5,12"
    fill="none"
    stroke="#F5A623"
    stroke-width="1"/>

  <!-- === CHAMFER EDGE LINES: amber on hover === -->
  <line x1="0" y1="12" x2="12" y2="0" stroke="#F5A623" stroke-width="1"/>
  <line x1="256" y1="84" x2="244" y2="96" stroke="#F5A623" stroke-width="1"/>

  <!-- === LEFT ACCENT BAR: 3px #F5A623 full-height === -->
  <rect x="0" y="14" width="3" height="82" fill="#F5A623"/>

  <!-- === AMBER GLOW INNER FILL (subtle) === -->
  <!-- Very faint amber inner shadow on left and top -->
  <polygon
    points="12,0 256,0 256,84 244,96 0,96 0,12"
    fill="#F5A623"
    fill-opacity="0.04"/>

  <!-- === INNER BORDER: second pass slightly inset === -->
  <polygon
    points="14,2 253,2 253,81 241,93 2,93 2,14"
    fill="none"
    stroke="#F5A623"
    stroke-width="0.4"
    stroke-opacity="0.3"/>

  <!-- === >> CHEVRON PREFIX (slides in on hover — shown at resting position) === -->
  <!-- Per spec: 4px left-pad >> glyph in Share Tech Mono, slides in 80ms -->
  <text x="10" y="54" font-family="Share Tech Mono, monospace" font-size="14" font-weight="400"
    fill="#F5A623">&gt;&gt;</text>

  <!-- === BUTTON LABEL (amber on hover) === -->
  <text x="144" y="54" font-family="Oswald, sans-serif" font-size="14" font-weight="600"
    fill="#F5A623" text-anchor="middle" letter-spacing="3">COMMAND LABEL</text>

  <!-- === CORNER TICK MARKS (amber) === -->
  <polyline points="16,6 16,14 24,14" fill="none" stroke="#F5A623" stroke-width="0.8"/>
  <polyline points="240,6 240,14 232,14" fill="none" stroke="#F5A623" stroke-width="0.8"/>
  <polyline points="16,90 16,82 24,82" fill="none" stroke="#F5A623" stroke-width="0.8"/>
  <polyline points="236,90 236,84 244,84" fill="none" stroke="#F5A623" stroke-width="0.8"/>

  <!-- === TOP EDGE HIGHLIGHT (brighter line at top for pressed-light feel) === -->
  <line x1="13" y1="1" x2="254" y2="1" stroke="#F5A623" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- === BOTTOM AMBER SCAN LINE === -->
  <line x1="4" y1="88" x2="240" y2="88" stroke="#F5A623" stroke-width="0.5" stroke-opacity="0.3"/>

</svg>
