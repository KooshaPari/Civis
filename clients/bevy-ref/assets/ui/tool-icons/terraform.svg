<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- terrain ground line -->
  <path d="M6,44 Q14,36 22,40 Q28,44 32,34 Q36,24 44,28 Q52,32 58,26"
    stroke="#50C8F0" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- raise arrow -->
  <line x1="32" y1="34" x2="32" y2="18" stroke="#E8B84B" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="32,12 27,20 37,20" fill="#E8B84B" filter="url(#glow)"/>
  <!-- lower arrow (mirrored, smaller) -->
  <line x1="14" y1="42" x2="14" y2="52" stroke="#50C8F0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <polygon points="14,56 10,50 18,50" fill="#50C8F0" opacity="0.5"/>
</svg>
