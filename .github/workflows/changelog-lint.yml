name: changelog-lint
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Pattern #92 ledger-discipline gate — fails CI when CHANGELOG.md regresses
# into duplicate version headers, missing tag rows, non-Keep-a-Changelog
# `### X` sections, or duplicate `### Section` blocks within a single
# version. Stale-TODO sweep is a soft warning by default; pass --strict
# to promote it to a hard gate.
#
# Companion: scripts/ci/changelog_lint.py (run with --self-test for spec).
# Cross-reference: tasks #92/#250/#251/#252.

on:
  pull_request:
    paths:
      - "CHANGELOG.md"
      - "scripts/ci/changelog_lint.py"
      - "docs/qa/changelog-lint-allowlist.txt"
      - "docs/qa/closed-tasks.txt"
      - ".github/workflows/changelog-lint.yml"
  push:
    branches: [main, "release/**"]
    paths:
      - "CHANGELOG.md"
      - "scripts/ci/changelog_lint.py"
      - "docs/qa/changelog-lint-allowlist.txt"
      - "docs/qa/closed-tasks.txt"
      - ".github/workflows/changelog-lint.yml"
  workflow_dispatch:
jobs:
  changelog-lint-check:
    name: Pattern #92 ledger-discipline
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          # fetch all tags so the tag-coverage parity check has the full set
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12"

      - name: Self-test the gate
        run: python scripts/ci/changelog_lint.py --self-test

      - name: Run changelog-lint gate
        run: python scripts/ci/changelog_lint.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: changelog-lint-report
          path: docs/qa/changelog-lint-report.json
          if-no-files-found: warn
          retention-days: 14
