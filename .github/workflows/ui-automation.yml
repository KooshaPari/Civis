name: UI Automation (Desktop Companion)

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 04:00 UTC
    - cron: "0 4 * * 1"
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions: {}

jobs:
  companion-ui-automation:
    name: Companion UI Automation (FlaUI)
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.0.0
        with:
          dotnet-version: 11.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore & build DesktopCompanion
        run: |
          dotnet restore src/Tools/DesktopCompanion/DesktopCompanion.csproj /p:RestoreLockedMode=true
          dotnet build src/Tools/DesktopCompanion/DesktopCompanion.csproj `
            --configuration Release --no-restore

      - name: Restore & build UI Automation tests
        run: |
          dotnet restore src/Tests/UiAutomation/DINOForge.Tests.UiAutomation.csproj /p:RestoreLockedMode=true
          dotnet build src/Tests/UiAutomation/DINOForge.Tests.UiAutomation.csproj `
            --configuration Release --no-restore

      - name: Run UI Automation tests
        env:
          COMPANION_EXE: ${{ github.workspace }}\src\Tools\DesktopCompanion\bin\Release\net8.0-windows10.0.19041.0\DINOForge.DesktopCompanion.exe
        run: |
          dotnet test src/Tests/UiAutomation/DINOForge.Tests.UiAutomation.csproj `
            --configuration Release `
            --no-build `
            --filter "Category=UiAutomation" `
            --logger "trx;LogFileName=ui-automation-results.trx" `
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        if: always()
        with:
          name: ui-automation-results
          path: ./test-results/*.trx
          retention-days: 14

      - name: Publish test report
        uses: dorny/test-reporter@2dcf091ad558da2cabf16f6b423e02cd078c937a
        if: always()
        with:
          name: UI Automation Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx
