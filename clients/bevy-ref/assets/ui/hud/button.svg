<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!--
    Button normal state. 9-slice: corners at x=16/104, y=12/28.
    Size: 120x40. Corner radius: 6.
  -->
  <defs>
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#152040"/>
      <stop offset="100%" stop-color="#0a1228"/>
    </linearGradient>
    <linearGradient id="btnSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#50C8F0" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#50C8F0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="120" height="40" rx="6" ry="6" fill="url(#btnBg)"/>
  <rect x="0" y="0" width="120" height="22" rx="6" ry="6" fill="url(#btnSheen)"/>
  <rect x="0.75" y="0.75" width="118.5" height="38.5" rx="5.5" ry="5.5"
    fill="none" stroke="#50C8F0" stroke-width="1.5" opacity="0.7"/>
  <!-- bottom edge shadow line -->
  <line x1="6" y1="38.5" x2="114" y2="38.5" stroke="#000" stroke-width="1" opacity="0.3"/>
  <!-- corner accent marks -->
  <line x1="6" y1="0" x2="12" y2="0" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
  <line x1="108" y1="0" x2="114" y2="0" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
</svg>
