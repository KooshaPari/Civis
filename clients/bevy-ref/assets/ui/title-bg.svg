<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440">
  <defs>
    <!-- Sky gradient: deep blue at top → warm amber horizon -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#04091a;stop-opacity:1" />
      <stop offset="28%"  style="stop-color:#091428;stop-opacity:1" />
      <stop offset="55%"  style="stop-color:#0f1e3a;stop-opacity:1" />
      <stop offset="78%"  style="stop-color:#1a2c50;stop-opacity:1" />
      <stop offset="88%"  style="stop-color:#2e3a20;stop-opacity:1" />
      <stop offset="95%"  style="stop-color:#4a3a18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c3e10;stop-opacity:1" />
    </linearGradient>

    <!-- Horizon glow: warm golden light at horizon line -->
    <radialGradient id="horizonGlow" cx="62%" cy="100%" r="70%">
      <stop offset="0%"  style="stop-color:#E8B84B;stop-opacity:0.35" />
      <stop offset="35%" style="stop-color:#c07020;stop-opacity:0.18" />
      <stop offset="65%" style="stop-color:#50C8F0;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#04091a;stop-opacity:0" />
    </radialGradient>

    <!-- Distant mist/atmosphere -->
    <linearGradient id="mistGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#1a3060;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#304060;stop-opacity:0.5" />
    </linearGradient>

    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#c8e0f8;stop-opacity:0.9" />
      <stop offset="70%" style="stop-color:#50C8F0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#50C8F0;stop-opacity:0" />
    </radialGradient>

    <!-- Water reflection gradient -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#0d2440;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#081828;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060e18;stop-opacity:1" />
    </linearGradient>

    <!-- Far mountain gradient -->
    <linearGradient id="farMtnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#162845;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3460;stop-opacity:1" />
    </linearGradient>

    <!-- Mid hill gradient -->
    <linearGradient id="midHillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#1a3a28;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2018;stop-opacity:1" />
    </linearGradient>

    <!-- Near ground gradient -->
    <linearGradient id="nearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#0e2014;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080e0c;stop-opacity:1" />
    </linearGradient>

    <!-- Star glow filter -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Settlement glow -->
    <filter id="settleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft fog filter -->
    <filter id="fogFilter">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <!-- ── SKY ── -->
  <rect width="2560" height="1440" fill="url(#skyGrad)" />
  <!-- Horizon warmth overlay -->
  <rect width="2560" height="1440" fill="url(#horizonGlow)" />

  <!-- ── STARS (upper sky) ── -->
  <g filter="url(#starGlow)" fill="white">
    <!-- Scattered stars, denser near top -->
    <circle cx="120"  cy="60"  r="1.2" opacity="0.9" />
    <circle cx="280"  cy="40"  r="1.5" opacity="0.95" />
    <circle cx="450"  cy="90"  r="1.0" opacity="0.7" />
    <circle cx="620"  cy="30"  r="1.8" opacity="1.0" />
    <circle cx="780"  cy="75"  r="1.2" opacity="0.8" />
    <circle cx="960"  cy="45"  r="1.5" opacity="0.9" />
    <circle cx="1150" cy="20"  r="1.0" opacity="0.75" />
    <circle cx="1380" cy="55"  r="2.0" opacity="1.0" />  <!-- brighter star -->
    <circle cx="1560" cy="35"  r="1.2" opacity="0.85" />
    <circle cx="1720" cy="80"  r="1.5" opacity="0.9" />
    <circle cx="1900" cy="25"  r="1.0" opacity="0.7" />
    <circle cx="2080" cy="65"  r="1.8" opacity="0.95" />
    <circle cx="2250" cy="40"  r="1.2" opacity="0.8" />
    <circle cx="2440" cy="70"  r="1.5" opacity="0.9" />
    <circle cx="200"  cy="130" r="1.0" opacity="0.6" />
    <circle cx="390"  cy="150" r="1.2" opacity="0.65" />
    <circle cx="570"  cy="115" r="0.9" opacity="0.55" />
    <circle cx="740"  cy="160" r="1.5" opacity="0.7" />
    <circle cx="900"  cy="105" r="1.0" opacity="0.6" />
    <circle cx="1080" cy="140" r="1.2" opacity="0.65" />
    <circle cx="1260" cy="95"  r="0.9" opacity="0.55" />
    <circle cx="1440" cy="135" r="1.5" opacity="0.7" />
    <circle cx="1640" cy="100" r="1.0" opacity="0.6" />
    <circle cx="1820" cy="155" r="1.2" opacity="0.65" />
    <circle cx="2000" cy="110" r="0.9" opacity="0.55" />
    <circle cx="2180" cy="130" r="1.5" opacity="0.7" />
    <circle cx="2380" cy="95"  r="1.0" opacity="0.6" />
    <!-- Cyan-tinted accent stars -->
    <circle cx="340"  cy="55"  r="1.5" opacity="0.7" fill="#a0e0f8" />
    <circle cx="1200" cy="80"  r="1.5" opacity="0.65" fill="#a0e0f8" />
    <circle cx="2100" cy="45"  r="1.5" opacity="0.7" fill="#a0e0f8" />
  </g>

  <!-- Moon (right side, upper sky) -->
  <circle cx="1980" cy="160" r="55" fill="url(#moonGlow)" opacity="0.9" />
  <circle cx="1980" cy="160" r="42" fill="#d8ecff" opacity="0.95" />
  <!-- Moon craters/texture suggestion -->
  <circle cx="1965" cy="148" r="8" fill="#c0d8f0" opacity="0.4" />
  <circle cx="1992" cy="168" r="5" fill="#c0d8f0" opacity="0.3" />
  <circle cx="1978" cy="175" r="6" fill="#c0d8f0" opacity="0.35" />

  <!-- ── ATMOSPHERIC HAZE BANDS (parallax) ── -->
  <rect x="0" y="580" width="2560" height="120" fill="#1a3060" opacity="0.12" filter="url(#fogFilter)" />
  <rect x="0" y="650" width="2560" height="80"  fill="#304070" opacity="0.1" filter="url(#fogFilter)" />

  <!-- ── FAR MOUNTAIN RIDGE (horizon, ~y=580-720) ── -->
  <!-- Right side mountains (intentionally heavier right, leave left clearer for menu) -->
  <path d="
    M 1400,720
    L 1480,580 L 1520,610 L 1560,540 L 1600,570
    L 1650,495 L 1700,530 L 1740,510 L 1780,545
    L 1820,470 L 1870,505 L 1910,480 L 1960,520
    L 2000,455 L 2050,490 L 2090,465 L 2140,500
    L 2180,440 L 2230,475 L 2280,455 L 2340,490
    L 2380,430 L 2430,465 L 2480,445 L 2560,490
    L 2560,720
    Z"
    fill="url(#farMtnGrad)" opacity="0.9" />

  <!-- Smaller far peaks, left side (gentler, softer) -->
  <path d="
    M 0,720
    L 0,660
    L 80,610 L 140,640 L 200,595 L 260,625
    L 340,580 L 390,605 L 450,590 L 500,615
    L 560,600 L 620,635 L 700,620 L 760,650
    L 850,640 L 920,660 L 1000,645 L 1080,665
    L 1160,650 L 1260,680 L 1400,720
    Z"
    fill="url(#farMtnGrad)" opacity="0.75" />

  <!-- Snow caps on right peaks -->
  <g fill="#c8e0f8" opacity="0.6">
    <polygon points="1820,470 1840,490 1800,490" />
    <polygon points="2000,455 2020,478 1980,478" />
    <polygon points="2180,440 2202,464 2158,464" />
    <polygon points="2380,430 2402,455 2358,455" />
    <polygon points="1650,495 1668,515 1632,515" />
  </g>

  <!-- Mountain mist overlay -->
  <rect x="0" y="600" width="2560" height="130" fill="#1a2848" opacity="0.25" filter="url(#fogFilter)" />

  <!-- ── MID HILLS (y=720-900) ── -->
  <!-- Right-heavy rolling hills -->
  <path d="
    M 1300,900
    L 1350,780 L 1420,820 L 1500,760 L 1580,800
    L 1660,740 L 1740,770 L 1820,730 L 1900,765
    L 1980,720 L 2060,755 L 2140,720 L 2220,755
    L 2300,715 L 2400,745 L 2480,720 L 2560,750
    L 2560,900
    Z"
    fill="url(#midHillGrad)" opacity="0.95" />

  <!-- Left mid hills, less imposing -->
  <path d="
    M 0,900
    L 0,840
    L 100,800 L 200,830 L 300,790 L 400,820
    L 500,800 L 600,835 L 700,815 L 800,845
    L 900,830 L 1000,855 L 1100,840 L 1200,860
    L 1300,850 L 1300,900
    Z"
    fill="url(#midHillGrad)" opacity="0.85" />

  <!-- Hill detail: treeline suggestion on mid hills -->
  <g fill="#142818" opacity="0.7">
    <!-- Tree silhouettes right hills -->
    <path d="M1500,760 L1503,745 L1506,760 Z" />
    <path d="M1520,758 L1524,742 L1528,758 Z" />
    <path d="M1540,755 L1544,738 L1548,755 Z" />
    <path d="M1660,740 L1664,724 L1668,740 Z" />
    <path d="M1680,738 L1684,722 L1688,738 Z" />
    <path d="M1820,730 L1825,712 L1830,730 Z" />
    <path d="M1840,728 L1845,710 L1850,728 Z" />
    <!-- More dense groupings -->
    <path d="M1900,765 L1905,748 L1910,765 L1915,750 L1920,765 Z" />
    <path d="M2060,755 L2065,738 L2070,755 L2075,740 L2080,755 Z" />
  </g>

  <!-- ── SETTLEMENT / TOWER SILHOUETTE (right-center area, ~x=1600-1850) ── -->
  <!-- Settlement base/walls -->
  <g filter="url(#settleGlow)">
    <!-- Main fortress/town wall -->
    <rect x="1620" y="810" width="180" height="70" fill="#0a1a0e" />
    <!-- Wall battlements -->
    <rect x="1618" y="800" width="16" height="18" fill="#0a1a0e" />
    <rect x="1642" y="800" width="16" height="18" fill="#0a1a0e" />
    <rect x="1666" y="800" width="16" height="18" fill="#0a1a0e" />
    <rect x="1690" y="800" width="16" height="18" fill="#0a1a0e" />
    <rect x="1714" y="800" width="16" height="18" fill="#0a1a0e" />
    <rect x="1738" y="800" width="16" height="18" fill="#0a1a0e" />
    <rect x="1762" y="800" width="16" height="18" fill="#0a1a0e" />
    <rect x="1782" y="800" width="16" height="18" fill="#0a1a0e" />

    <!-- Central keep/tower -->
    <rect x="1690" y="730" width="40" height="82" fill="#0c1e10" />
    <!-- Tower battlements -->
    <rect x="1688" y="720" width="10" height="14" fill="#0c1e10" />
    <rect x="1702" y="720" width="10" height="14" fill="#0c1e10" />
    <rect x="1716" y="720" width="10" height="14" fill="#0c1e10" />
    <!-- Tower peak flag -->
    <line x1="1710" y1="720" x2="1710" y2="696" stroke="#E8B84B" stroke-width="2" />
    <polygon points="1710,696 1728,703 1710,710" fill="#E8B84B" opacity="0.9" />

    <!-- Side tower left -->
    <rect x="1640" y="760" width="26" height="52" fill="#0b1c0f" />
    <polygon points="1653,760 1640,760 1640,750 1653,745 1666,750 1666,760" fill="#0b1c0f" />

    <!-- Side tower right -->
    <rect x="1754" y="760" width="26" height="52" fill="#0b1c0f" />
    <polygon points="1767,760 1754,760 1754,750 1767,745 1780,750 1780,760" fill="#0b1c0f" />

    <!-- Settlement glow: warm interior light windows -->
    <rect x="1698" y="755" width="8" height="10" fill="#E8B84B" opacity="0.65" rx="1" />
    <rect x="1714" y="755" width="8" height="10" fill="#E8B84B" opacity="0.5" rx="1" />
    <rect x="1648" y="775" width="6" height="8"  fill="#E8B84B" opacity="0.45" rx="1" />
    <rect x="1760" y="775" width="6" height="8"  fill="#E8B84B" opacity="0.45" rx="1" />
    <!-- Gate arch -->
    <path d="M1698,880 L1698,840 Q1710,828 1722,840 L1722,880 Z" fill="#070f09" />
  </g>

  <!-- Settlement warm ground glow -->
  <ellipse cx="1710" cy="882" rx="120" ry="18" fill="#E8B84B" opacity="0.12" filter="url(#fogFilter)" />

  <!-- ── FOREGROUND NEAR GROUND (y=900-1440) ── -->
  <path d="
    M 0,1440 L 0,920
    L 80,910 L 160,925 L 240,908 L 320,918
    L 400,905 L 480,915 L 560,900 L 640,912
    L 720,905 L 800,918 L 880,908 L 960,920
    L 1040,910 L 1120,922 L 1200,912 L 1280,925
    L 1360,915 L 1440,928 L 1520,918 L 1600,930
    L 1680,920 L 1760,932 L 1840,922 L 1920,935
    L 2000,925 L 2080,938 L 2160,928 L 2240,940
    L 2320,930 L 2400,942 L 2480,932 L 2560,945
    L 2560,1440
    Z"
    fill="url(#nearGrad)" />

  <!-- Foreground detail: scattered low rocks/earth mounds -->
  <g fill="#0c1a10" opacity="0.6">
    <ellipse cx="300"  cy="950" rx="60" ry="18" />
    <ellipse cx="700"  cy="965" rx="45" ry="14" />
    <ellipse cx="1100" cy="948" rx="70" ry="20" />
    <ellipse cx="2100" cy="958" rx="55" ry="16" />
    <ellipse cx="2450" cy="952" rx="65" ry="18" />
  </g>

  <!-- Foreground tall grass/reeds (left side, keeps it open for menu) -->
  <g stroke="#1a3020" stroke-width="2" opacity="0.5" fill="none">
    <path d="M50,1000 Q55,940 48,920" />
    <path d="M62,1005 Q70,942 65,918" />
    <path d="M78,998 Q82,936 74,914" />
  </g>
  <!-- Right side foreground grass -->
  <g stroke="#1a3020" stroke-width="2" opacity="0.5" fill="none">
    <path d="M2200,995 Q2205,938 2198,916" />
    <path d="M2215,1000 Q2222,940 2216,916" />
    <path d="M2230,992 Q2235,935 2226,912" />
    <path d="M2245,998 Q2250,940 2242,916" />
  </g>

  <!-- ── WATER/RIVER STRIP (mid ground, subtle) ── -->
  <path d="
    M 800,882 Q 900,870 1000,878 Q 1100,886 1200,874 Q 1300,862 1400,870 L 1400,900 Q 1300,890 1200,902 Q 1100,914 1000,906 Q 900,898 800,910 Z"
    fill="url(#waterGrad)" opacity="0.5" />
  <!-- Water shimmer -->
  <path d="M 840,888 Q 920,882 1000,888" stroke="#50C8F0" stroke-width="1" fill="none" opacity="0.3" />
  <path d="M 1100,878 Q 1200,872 1300,878" stroke="#50C8F0" stroke-width="1" fill="none" opacity="0.25" />

  <!-- Moon reflection in water -->
  <ellipse cx="1000" cy="892" rx="30" ry="5" fill="#c8e0f8" opacity="0.15" />

  <!-- ── PARALLAX ATMOSPHERE BAND (sky/ground transition) ── -->
  <rect x="0" y="700" width="2560" height="200" fill="url(#mistGrad)" opacity="0.3" />

  <!-- ── CYAN ACCENT: horizon aurora-like glow ── -->
  <rect x="0" y="680" width="2560" height="60" fill="#50C8F0" opacity="0.04" filter="url(#fogFilter)" />

  <!-- ── VIGNETTE: darken all four edges, keep center open ── -->
  <!-- Top vignette -->
  <rect x="0" y="0" width="2560" height="200" fill="#04091a" opacity="0.5" />
  <!-- Bottom vignette -->
  <rect x="0" y="1240" width="2560" height="200" fill="#060e0a" opacity="0.6" />
  <!-- Right vignette (settlement side) -->
  <rect x="1900" y="0" width="660" height="1440" fill="#04091a" opacity="0.25" />
  <!-- Left vignette LIGHTER — keeps menu area open -->
  <rect x="0" y="0" width="300" height="1440" fill="#04091a" opacity="0.15" />

  <!-- ── GOLD ACCENT: horizon shimmer line ── -->
  <line x1="0" y1="718" x2="2560" y2="718" stroke="#E8B84B" stroke-width="0.8" opacity="0.12" />

  <!-- ── CYAN ACCENT: subtle atmospheric haze line at hills ── -->
  <line x1="0" y1="730" x2="2560" y2="730" stroke="#50C8F0" stroke-width="0.5" opacity="0.08" />
</svg>
