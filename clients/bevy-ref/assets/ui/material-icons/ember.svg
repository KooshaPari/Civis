        filter="url(#emberGlow)"/>
  <path d="M24,20 Q28,26 26,32 A6,6 0 0 1 20,32 Q19,27 24,20 Z"
        fill="none" stroke="#FFAA4A" stroke-width="1.8" stroke-linejoin="round"/>
</svg>
