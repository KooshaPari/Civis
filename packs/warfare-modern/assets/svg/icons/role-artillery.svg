<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | role-artillery.svg | 64x64 monochrome glyph -->
<!-- Self-propelled howitzer side view: long elevated barrel + tracked chassis -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Track / chassis -->
  <rect x="4" y="42" width="56" height="10" rx="4" fill="#EDE8DC"/>
  <!-- Road wheels -->
  <circle cx="12" cy="47" r="4" fill="#1C2B3A"/>
  <circle cx="12" cy="47" r="2" fill="#EDE8DC"/>
  <circle cx="22" cy="47" r="4" fill="#1C2B3A"/>
  <circle cx="22" cy="47" r="2" fill="#EDE8DC"/>
  <circle cx="32" cy="47" r="4" fill="#1C2B3A"/>
  <circle cx="32" cy="47" r="2" fill="#EDE8DC"/>
  <circle cx="42" cy="47" r="4" fill="#1C2B3A"/>
  <circle cx="42" cy="47" r="2" fill="#EDE8DC"/>
  <circle cx="52" cy="47" r="4" fill="#1C2B3A"/>
  <circle cx="52" cy="47" r="2" fill="#EDE8DC"/>
  <!-- Hull top slope -->
  <polygon points="6,42 10,34 54,34 58,42" fill="#EDE8DC"/>
  <!-- Gun mantlet / turret ring (box, sits on hull) -->
  <rect x="18" y="26" width="18" height="10" rx="1" fill="#EDE8DC"/>
  <!-- Barrel mount pivot -->
  <circle cx="27" cy="30" r="3" fill="#1C2B3A"/>
  <!-- Elevated long barrel (angled ~40 degrees upward to the right) -->
  <!-- Barrel: rotated rect from pivot up-right -->
  <rect x="26" y="8" width="5" height="26" rx="1" transform="rotate(40 28 30)" fill="#EDE8DC"/>
  <!-- Muzzle brake (flat notch at barrel end) -->
  <!-- Blast shield (left side of mantlet) -->
  <rect x="14" y="28" width="6" height="8" rx="1" fill="#EDE8DC"/>
  <!-- Shell ejection port (small rect) -->
  <rect x="34" y="30" width="4" height="4" fill="#1C2B3A"/>
</svg>
