<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | role-sniper.svg | 64x64 monochrome glyph -->
<!-- Sniper: prone silhouette with long-barrel rifle and scope crosshair -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Crosshair scope overlay (top half of icon) -->
  <circle cx="48" cy="14" r="10" fill="none" stroke="#EDE8DC" stroke-width="1.5"/>
  <!-- Crosshair ticks -->
  <line x1="48" y1="4" x2="48" y2="8" stroke="#EDE8DC" stroke-width="1.5"/>
  <line x1="48" y1="20" x2="48" y2="24" stroke="#EDE8DC" stroke-width="1.5"/>
  <line x1="38" y1="14" x2="42" y2="14" stroke="#EDE8DC" stroke-width="1.5"/>
  <line x1="54" y1="14" x2="58" y2="14" stroke="#EDE8DC" stroke-width="1.5"/>
  <!-- Center dot -->
  <circle cx="48" cy="14" r="1.5" fill="#EDE8DC"/>
  <!-- Prone body (elongated horizontal) -->
  <!-- Head -->
  <ellipse cx="10" cy="38" rx="6" ry="5.5" fill="#EDE8DC"/>
  <!-- Ghillie cape suggestion (jagged blob behind head) -->
  <path d="M14,35 Q18,32 22,34 Q20,36 18,35 Q22,38 16,39 Z" fill="#EDE8DC"/>
  <!-- Torso (prone) -->
  <rect x="14" y="36" width="30" height="8" rx="3" fill="#EDE8DC"/>
  <!-- Rifle long barrel -->
  <rect x="16" y="32" width="46" height="3" rx="1" fill="#EDE8DC"/>
  <!-- Bipod (two thin legs down from mid-barrel) -->
  <line x1="36" y1="35" x2="33" y2="42" stroke="#EDE8DC" stroke-width="1.5"/>
  <line x1="36" y1="35" x2="39" y2="42" stroke="#EDE8DC" stroke-width="1.5"/>
  <!-- Legs (trailing back) -->
  <rect x="38" y="42" width="12" height="5" rx="2" fill="#EDE8DC"/>
  <rect x="42" y="46" width="12" height="5" rx="2" fill="#EDE8DC"/>
</svg>
