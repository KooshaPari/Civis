<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Gold faction: The Solar Compass — radial sun-wheel with cardinal marks, ordered symmetry -->
  <defs>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="goldAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8B84B" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#E8B84B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="64" cy="64" r="58" fill="url(#goldAmbient)"/>
  <!-- outer ring -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#E8B84B" stroke-width="2.5" opacity="0.5" filter="url(#goldGlow)"/>
  <!-- inner ring -->
  <circle cx="64" cy="64" r="36" fill="#0c0e08" stroke="#E8B84B" stroke-width="3" filter="url(#goldGlow)"/>
  <!-- innermost ring -->
  <circle cx="64" cy="64" r="18" fill="#0c0e08" stroke="#E8B84B" stroke-width="2" opacity="0.8"/>
  <!-- 8 primary ray spikes (alternating long/short) -->
  <line x1="64" y1="12" x2="64" y2="28" stroke="#E8B84B" stroke-width="4" stroke-linecap="round" filter="url(#goldGlow)"/>
  <line x1="64" y1="100" x2="64" y2="116" stroke="#E8B84B" stroke-width="4" stroke-linecap="round" filter="url(#goldGlow)"/>
  <line x1="12" y1="64" x2="28" y2="64" stroke="#E8B84B" stroke-width="4" stroke-linecap="round" filter="url(#goldGlow)"/>
  <line x1="100" y1="64" x2="116" y2="64" stroke="#E8B84B" stroke-width="4" stroke-linecap="round" filter="url(#goldGlow)"/>
  <!-- diagonal shorter rays -->
  <line x1="27" y1="27" x2="37" y2="37" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="91" y1="27" x2="101" y2="37" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" opacity="0.8" transform="rotate(90 64 64)"/>
  <line x1="27" y1="101" x2="37" y2="91" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" opacity="0.8" transform="rotate(180 64 64)"/>
  <line x1="91" y1="101" x2="101" y2="91" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" opacity="0.8" transform="rotate(270 64 64)"/>
  <!-- compass interior diamond needle -->
  <polygon points="64,46 70,64 64,82 58,64"
    fill="#1a1400" stroke="#E8B84B" stroke-width="2" filter="url(#goldGlow)"/>
  <!-- compass N accent -->
  <polygon points="64,46 69,58 59,58"
    fill="#E8B84B" opacity="0.9"/>
  <!-- center hub -->
  <circle cx="64" cy="64" r="7" fill="#E8B84B" filter="url(#goldGlow)"/>
  <circle cx="64" cy="64" r="3.5" fill="#0c0e08"/>
  <!-- outer cardinal tick dots -->
  <circle cx="64" cy="14" r="3" fill="#E8B84B" filter="url(#goldGlow)"/>
  <circle cx="64" cy="114" r="3" fill="#E8B84B" filter="url(#goldGlow)"/>
  <circle cx="14" cy="64" r="3" fill="#E8B84B" filter="url(#goldGlow)"/>
  <circle cx="114" cy="64" r="3" fill="#E8B84B" filter="url(#goldGlow)"/>
</svg>
