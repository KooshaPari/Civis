name: Security Guard

# Local-first: PRs use quality.yml + pr-governance-gate only.
# Run heavy gates locally: lefthook run pre-push
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Run pre-commit guard checks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
        with:
          extra_args: --hook-stage pre-commit --config .pre-commit-config.yaml --show-diff-on-failure
