# thegent Unified Multi-Tenant Server — process-compose
#
# Optimized: MCP + cliproxyapi++ bundled in a single process tree.
# Replaces isolated mcp/proxy/workers with a single 'thegent serve' daemon.
#
# Usage:
#   process-compose -f process-compose.yaml up
#   process-compose -f process-compose.yaml down
#
# Or: thegent mcp up / thegent mcp down

version: "0.5"

log_location: .process-compose/process-compose.log
log_level: info

environment:
  - PYTHONUNBUFFERED=1
  - PYTHONPATH=src
  - THGENT_MCP_HOST=127.0.0.1
  - THGENT_MCP_PORT=3847
  - THGENT_CLIPROXY_PORT=8317
  - THGENT_CLIPROXY_ADAPTER=1
  - THGENT_CONTROL_PLANE_PORT=3849
  - THGENT_CONTROL_PLANE_URL=http://127.0.0.1:3849
  - THGENT_BUNDLE_PROXY=1  # Consolidation: MCP server spawns the proxy
  - THGENT_RELOAD=${THGENT_RELOAD:-0}
  # Universal Toolset (MTSP-01)
  - THGENT_MCP_MOUNT_PLAYWRIGHT=0
  - THGENT_MCP_MOUNT_SERENA=0
  - THGENT_MCP_MOUNT_OCTOCODE=0
  - THGENT_MCP_MOUNT_SEQUENTIAL_THINKING=0
  - THGENT_MCP_MOUNT_NEXT_DEVTOOLS=0
  - THGENT_SERENA_URL=http://127.0.0.1:3848/mcp
  # Worker Pool (MTSP-06)
  - THGENT_WORKER_POOL_SIZE=${THGENT_WORKER_POOL_SIZE:-4}
  - THGENT_WORKER_IDLE_TIMEOUT=${THGENT_WORKER_IDLE_TIMEOUT:-300}

processes:
  server:
    command: python3
    args:
      - -m
      - thegent.main
      - serve
      - --host=127.0.0.1
      - --port=3847
    working_dir: .
    availability:
      restart: on_failure
      max_restarts: 10
      backoff_seconds: 1
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 3847
        path: /health
      initial_delay_seconds: 2
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    log_location: .process-compose/logs/server.log
    log_length: 5000

  control-plane:
    command: python3
    args:
      - -m
      - thegent.main
      - control-plane
      - serve
      - --port=3849
    working_dir: .
    availability:
      restart: on_failure
      max_restarts: 10
      backoff_seconds: 1
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 3849
        path: /health
      initial_delay_seconds: 2
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    log_location: .process-compose/logs/control-plane.log

  # Worker Pool (MTSP-06): persistent warm Python workers to eliminate ~300ms startup latency.
  # Pool size is configurable via THGENT_WORKER_POOL_SIZE (default 4).
  worker-pool:
    command: python3
    args:
      - -c
      - |
        import asyncio, os, logging, signal
        from thegent.core.worker_pool import get_worker_pool
        logging.basicConfig(level=logging.INFO)
        pool_size = int(os.environ.get("THGENT_WORKER_POOL_SIZE", "4"))
        idle_timeout = int(os.environ.get("THGENT_WORKER_IDLE_TIMEOUT", "300"))
        async def main():
            pool = get_worker_pool(pool_size=pool_size, idle_timeout=idle_timeout)
            await pool.start()
            stop_event = asyncio.Event()
            loop = asyncio.get_running_loop()
            loop.add_signal_handler(signal.SIGTERM, stop_event.set)
            loop.add_signal_handler(signal.SIGINT, stop_event.set)
            await stop_event.wait()
            await pool.stop()
        asyncio.run(main())
    working_dir: .
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "true"]
      initial_delay_seconds: 3
      period_seconds: 30
    log_location: .process-compose/logs/worker-pool.log
    log_length: 2000
    depends_on:
      server:
        condition: process_healthy

  # Serena: only runs when THGENT_MCP_MOUNT_SERENA=1. When disabled, sleeps to avoid restart loops.
  serena:
    command: sh
    args:
      - -c
      - |
        if [ "${THGENT_MCP_MOUNT_SERENA:-0}" = "1" ]; then
          exec uvx --from 'git+https://github.com/oraios/serena' serena start-mcp-server --transport sse --port 3848 --context ide --project-from-cwd --open-web-dashboard false
        else
          exec sleep infinity
        fi
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "test \"${THGENT_MCP_MOUNT_SERENA:-0}\" != 1 || nc -z 127.0.0.1 3848"]
      initial_delay_seconds: 5
      period_seconds: 10
    log_location: .process-compose/logs/serena.log
