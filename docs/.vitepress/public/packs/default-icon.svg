<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#grad)"/>

  <!-- Package/Box icon -->
  <g transform="translate(128, 128)">
    <!-- Box outline -->
    <path d="M -60 -40 L 0 -70 L 60 -40 L 60 40 L 0 70 L -60 40 Z"
          fill="none"
          stroke="white"
          stroke-width="4"
          stroke-linejoin="round"/>

    <!-- Box top -->
    <line x1="-60" y1="-40" x2="0" y2="10" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="-40" x2="0" y2="10" stroke="white" stroke-width="4" stroke-linecap="round"/>

    <!-- Center cross -->
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.8"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Text label -->
  <text x="128" y="220"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16"
        font-weight="600"
        fill="white"
        text-anchor="middle"
        opacity="0.8">
    PACK
  </text>
</svg>
