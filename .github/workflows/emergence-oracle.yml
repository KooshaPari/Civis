name: Emergence Oracle FR-Validation

# Hard-fail gate: validates that FR contracts remain passing.
# The oracle binary exits non-zero if passing contracts fall below BASELINE (8).
# This prevents silent emergence regressions from landing on feat/civis-platform.

on:
  push:
    branches:
      - feat/civis-platform
      - feat/oracle-ci-gate
  pull_request:
    branches:
      - feat/civis-platform
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oracle-report:
    name: oracle-report (emergence-oracle FR contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-all-crates: true
      - name: Run oracle_report (FR hard gate — exits 1 if passed < baseline 8)
        run: cargo run -p emergence-oracle --bin oracle_report
