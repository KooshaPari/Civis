<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- pouring vessel / flask tipped at angle -->
  <path d="M20,10 L28,10 L36,26 L14,26 Z"
    fill="#0d1628" stroke="#50C8F0" stroke-width="2" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- flask neck -->
  <rect x="22" y="6" width="8" height="6" rx="2"
    fill="#0d1628" stroke="#50C8F0" stroke-width="2"/>
  <!-- stream of falling particles -->
  <circle cx="30" cy="32" r="2.5" fill="#50C8F0" opacity="0.9" filter="url(#glow)"/>
  <circle cx="34" cy="38" r="2" fill="#50C8F0" opacity="0.75"/>
  <circle cx="28" cy="40" r="1.5" fill="#50C8F0" opacity="0.6"/>
  <circle cx="36" cy="44" r="1.8" fill="#E8B84B" opacity="0.7" filter="url(#glow)"/>
  <circle cx="30" cy="47" r="1.2" fill="#50C8F0" opacity="0.5"/>
  <circle cx="38" cy="50" r="1.5" fill="#E8B84B" opacity="0.5"/>
  <circle cx="33" cy="53" r="1" fill="#50C8F0" opacity="0.4"/>
  <!-- pile at bottom -->
  <ellipse cx="32" cy="56" rx="12" ry="3" fill="#50C8F0" opacity="0.2"/>
</svg>
