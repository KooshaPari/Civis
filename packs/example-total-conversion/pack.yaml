# Example Total Conversion Pack
# Minimal demonstration of the DINOForge mod system

id: example-total-conversion
name: Example Total Conversion
version: 0.1.0
framework_version: ">=0.24.0 <1.0.0"
author: DINOForge Team
type: total_conversion
description: |
  Minimal example pack demonstrating a total conversion mod in DINOForge.

  This pack demonstrates:
  - Universe Bible system with custom faction and units
  - YAML schema validation and content loading
  - Multi-domain registration (factions, units)
  - Bundle reference patterns (visual_asset IDs)

  The Sentinels faction is a simple example faction with one unit type.
  This pack is ideal for mod authors learning DINOForge structure and patterns.

depends_on: []
conflicts_with: []

loads:
  factions:
    - factions/sentinels.yaml
  units:
    - units/sentinel-trooper.yaml
