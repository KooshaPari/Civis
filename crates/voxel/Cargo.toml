[package]
name = "civ-voxel"
description = "Adaptive voxel substrate: sparse octree + dense leaf chunks; deterministic mesh-dirty queue"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"

# Adaptive voxel kernel shared across Phenotype-org game clients.
# Pin the git revision so CI can resolve the same kernel without a sibling checkout.
phenotype-voxel = { package = "phenotype-gfx", git = "https://github.com/KooshaPari/phenotype-gfx.git" }

[dev-dependencies]
proptest = "1.4"
