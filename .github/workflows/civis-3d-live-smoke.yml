# Local-first: PRs use quality.yml + pr-governance only.
# Heavy live-attach smoke (F3D0 + voxel ground; no GPU) runs locally via
# `just civis-3d-live-smoke` on the developer machine and is attested in
# `.ci/quality-manifest.json` (gates: civis_3d_verify covers cargo check +
# clippy + targeted frame_triple / ws_smoke / bevy live_* tests). This workflow
# is dispatch-only — used for the offline-deps fallback documented in
# `docs/development-guide/fr-bevy-attach.md` (libasound/libudev/libxkbcommon
# libs that aren't on every CI runner).
name: Civis 3D Live Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  live-smoke:
    # Manual escape hatch: rerun the smoke on a Linux runner with the wgpu
    # link deps. Heavy (~10–20 min cold build) — never triggers automatically.
    if: github.event_name == 'workflow_dispatch'
    name: headless live-attach smoke (no GPU)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
      - name: Install Linux deps (Bevy / wgpu link)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev
      - uses: extractions/setup-just@v2
      - name: civis-3d-live-smoke
        run: just civis-3d-live-smoke
