<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    Civis app / window icon.
    Design language: docs/design/ui-design-language.md ("Console Holo").
      · Graphite base (rounded console plate, INK/GRAPHITE ramp).
      · Electric-green neon (#3DF07A) as the structural EDGE of an emergent
        voxel/world glyph — the "civilization rising from the substrate" mark.
      · Holo-cyan (#7FE9FF) as a single restrained accent: a projected
        orbit/scan ring + a rising apex voxel (emergence).
    Mark reads at 16px (bold neon silhouette of a 3-tier voxel ziggurat / world
    stack) and rewards inspection at 256px (bevel, scanline, holo ring, glow).
    License: hand-authored for Civis — project-owned (no third-party assets).
  -->
  <defs>
    <!-- graphite console plate, top-lit -->
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#1E242E"/>
      <stop offset="0.5" stop-color="#12161D"/>
      <stop offset="1"   stop-color="#0A0D12"/>
    </linearGradient>
    <!-- inner well behind the glyph -->
    <radialGradient id="well" cx="50%" cy="42%" r="62%">
      <stop offset="0"   stop-color="#161B23"/>
      <stop offset="1"   stop-color="#05070A"/>
    </radialGradient>
    <!-- neon edge glow -->
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- holo cyan glow -->
    <filter id="holo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="neonFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DF07A" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#1E7A45" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- console plate -->
  <rect x="14" y="14" width="228" height="228" rx="46" fill="url(#plate)"/>
  <!-- 2-tone Xbox-2001 bevel: lit top/left, shadow bottom/right -->
  <rect x="14.5" y="14.5" width="227" height="227" rx="45.5" fill="none"
        stroke="#4A5564" stroke-opacity="0.55" stroke-width="1.5"/>
  <rect x="15.5" y="15.5" width="225" height="225" rx="44.5" fill="none"
        stroke="#05070A" stroke-opacity="0.8" stroke-width="1.5"
        stroke-dasharray="320 360" stroke-dashoffset="-340"/>
  <!-- recessed inner well -->
  <rect x="34" y="34" width="188" height="188" rx="34" fill="url(#well)"/>
  <rect x="34.5" y="34.5" width="187" height="187" rx="33.5" fill="none"
        stroke="#1E242E" stroke-width="1"/>

  <!-- holo orbit / scan ring (projected, restrained cyan) -->
  <ellipse cx="128" cy="132" rx="78" ry="30" fill="none"
           stroke="#7FE9FF" stroke-opacity="0.45" stroke-width="2" filter="url(#holo)"/>
  <ellipse cx="128" cy="132" rx="78" ry="30" fill="none"
           stroke="#2FBFE6" stroke-opacity="0.25" stroke-width="5"/>

  <!-- ── EMERGENT VOXEL WORLD STACK (neon edge mark) ──
       Isometric 3-tier ziggurat of voxels = civilization rising from substrate.
       Faces are dim graphite/neon-tint; EDGES are electric green = the mark. -->
  <g filter="url(#neon)">
    <!-- tier 1 (base) -->
    <polygon points="128,178 76,150 128,122 180,150" fill="url(#neonFace)"
             stroke="#3DF07A" stroke-width="3.2" stroke-linejoin="round"/>
    <polygon points="76,150 76,168 128,196 128,178" fill="#0A0D12" fill-opacity="0.85"
             stroke="#1E7A45" stroke-width="2.4" stroke-linejoin="round"/>
    <polygon points="180,150 180,168 128,196 128,178" fill="#05070A" fill-opacity="0.9"
             stroke="#1E7A45" stroke-width="2.4" stroke-linejoin="round"/>
    <!-- tier 2 -->
    <polygon points="128,140 92,121 128,102 164,121" fill="url(#neonFace)"
             stroke="#3DF07A" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="92,121 92,135 128,154 128,140" fill="#0A0D12" fill-opacity="0.85"
             stroke="#1E7A45" stroke-width="2.2" stroke-linejoin="round"/>
    <polygon points="164,121 164,135 128,154 128,140" fill="#05070A" fill-opacity="0.9"
             stroke="#1E7A45" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- tier 3 (apex voxel) -->
    <polygon points="128,108 108,97 128,86 148,97" fill="url(#neonFace)"
             stroke="#3DF07A" stroke-width="2.8" stroke-linejoin="round"/>
    <polygon points="108,97 108,109 128,120 128,108" fill="#0A0D12" fill-opacity="0.85"
             stroke="#1E7A45" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="148,97 148,109 128,120 128,108" fill="#05070A" fill-opacity="0.9"
             stroke="#1E7A45" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- emergence spark: rising holo-cyan apex point (the "live" cue) -->
  <line x1="128" y1="86" x2="128" y2="60" stroke="#7FE9FF" stroke-width="2.4"
        stroke-linecap="round" filter="url(#holo)" opacity="0.9"/>
  <circle cx="128" cy="58" r="5.5" fill="#7FE9FF" filter="url(#holo)"/>
  <circle cx="128" cy="58" r="2.4" fill="#ECEFF4"/>

  <!-- neon "live" core highlight on apex front edge -->
  <polyline points="108,97 128,86 148,97" fill="none" stroke="#8BFFB4"
            stroke-width="1.2" opacity="0.8" stroke-linejoin="round"/>

  <!-- corner registration ticks (console motif) -->
  <g stroke="#3DF07A" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round">
    <polyline points="56,40 40,40 40,56"/>
    <polyline points="200,40 216,40 216,56"/>
    <polyline points="56,216 40,216 40,200"/>
    <polyline points="200,216 216,216 216,200"/>
  </g>
</svg>
