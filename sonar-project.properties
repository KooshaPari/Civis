# SonarCloud configuration for DINOForge
# Trigger re-scan: PR 188 (2026-05-24)
# See: https://docs.sonarcloud.io/enriching/test-coverage/test-coverage-parameters/

sonar.projectKey=DINOForge
sonar.organization=dinoforge

# Source directories
sonar.sources=src/SDK,src/Bridge,src/Domains,src/Tools

# Test directories
sonar.tests=src/Tests,src/Tests/Integration
sonar.test.inclusions=**/*.Tests.cs

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.cs.opencover.reportsPaths=src/Tests/coverage.cobertura.xml
sonar.cs.xunit.reportsPaths=**/*.trx

# Exclusions — generated code, tests, CI-only, Runtime (needs Unity)
sonar.exclusions=\
  **/*.generated.cs,\
  **/obj/**,\
  **/bin/**,\
  **/packages/**,\
  **/Runtime/**,\
  **/*Tests*.cs,\
  **/Mocks/**,\
  **/Fixtures/**,\
  scripts/ci/**

# Coverage exclusions (test files, generated, CI-only)
sonar.coverage.exclusions=\
  **/*.Tests.cs,\
  **/Test*.cs,\
  **/Mock*.cs,\
  **/obj/**,\
  **/bin/**,\
  **/packages/**,\
  **/Runtime/**

# CPD exclusions (duplication detection off for tests, CI scripts, analyzer boilerplate)
sonar.cpd.exclusions=\
  **/Tests/**,\
  src/Analyzers/**,\
  scripts/ci/**

# Quality profile — use SonarC# default (or specify a custom one)
sonar.csharp.fileSuffixes=.cs
sonar.csharp.ignoreHeaderComments=true

# Issues — CI detect scripts use regex_timeout; ignore ReDoS hotspots if still scanned
sonar.issue.ignore.multicriteria=ci_redos_py,ci_redos_pysec
sonar.issue.ignore.multicriteria.ci_redos_py.ruleKey=python:S5852
sonar.issue.ignore.multicriteria.ci_redos_py.resourceKey=scripts/ci/**
sonar.issue.ignore.multicriteria.ci_redos_pysec.ruleKey=pythonsecurity:S5852
sonar.issue.ignore.multicriteria.ci_redos_pysec.resourceKey=scripts/ci/**
