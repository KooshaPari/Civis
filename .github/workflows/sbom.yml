name: Generate SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions: {}

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.0.0 
        with:
          global-json-file: global.json

      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln /p:RestoreLockedMode=true

      - name: Generate SBOM for SDK
        run: |
          dotnet CycloneDX src/SDK/DINOForge.SDK.csproj \
            --output . \
            --filename sbom-sdk \
            --json

      - name: Generate SBOM for Bridge Protocol
        run: |
          dotnet CycloneDX src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            --output . \
            --filename sbom-bridge-protocol \
            --json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: sbom-files
          path: |
            sbom-sdk.json
            sbom-bridge-protocol.json
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" sbom-sdk.json sbom-bridge-protocol.json --clobber
