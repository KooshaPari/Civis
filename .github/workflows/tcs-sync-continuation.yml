name: tcs-sync-continuation
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Pattern #97 detection gate — fails CI when a C# call site constructs
# a ``TaskCompletionSource`` or ``TaskCompletionSource<T>`` without
# passing ``TaskCreationOptions.RunContinuationsAsynchronously``. The
# default behavior runs await continuations inline on the producer
# thread, which causes main-thread starvation and cross-thread
# deadlocks at the Runtime / Bridge boundaries.
#
# Companion: scripts/ci/detect_tcs_sync_continuations.py (run with
# --self-test for spec). Allowlist:
# docs/qa/tcs-sync-continuation-allowlist.txt.
# Cross-reference: tasks #271 (3 known TCS sites being fixed) /
# #272 (this gate) / future Roslyn analyzer for compile-time
# enforcement.

on:
  pull_request:
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_tcs_sync_continuations.py"
      - "docs/qa/tcs-sync-continuation-allowlist.txt"
      - ".github/workflows/tcs-sync-continuation.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_tcs_sync_continuations.py"
      - "docs/qa/tcs-sync-continuation-allowlist.txt"
      - ".github/workflows/tcs-sync-continuation.yml"
  workflow_dispatch:
jobs:
  tcs-sync-continuation-check:
    name: Pattern #97 tcs-sync-continuation
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12"

      - name: Self-test the gate
        run: python scripts/ci/detect_tcs_sync_continuations.py --self-test

      - name: Run tcs-sync-continuation gate
        run: python scripts/ci/detect_tcs_sync_continuations.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: tcs-sync-continuation-report
          path: docs/qa/tcs-sync-continuation-report.json
          if-no-files-found: warn
          retention-days: 14
