<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- clock ring -->
  <circle cx="32" cy="32" r="22" fill="#0d1628" stroke="#50C8F0" stroke-width="2.5" filter="url(#glow)"/>
  <!-- tick marks -->
  <line x1="32" y1="12" x2="32" y2="16" stroke="#50C8F0" stroke-width="2" opacity="0.6"/>
  <line x1="32" y1="48" x2="32" y2="52" stroke="#50C8F0" stroke-width="2" opacity="0.6"/>
  <line x1="12" y1="32" x2="16" y2="32" stroke="#50C8F0" stroke-width="2" opacity="0.6"/>
  <line x1="48" y1="32" x2="52" y2="32" stroke="#50C8F0" stroke-width="2" opacity="0.6"/>
  <!-- clock hands (frozen/diagonal position) -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#50C8F0" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" opacity="0.5"/>
  <line x1="32" y1="32" x2="42" y2="36" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.5"/>
  <!-- center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#50C8F0"/>
  <!-- pause bars (overlaid on clock face) -->
  <rect x="25" y="24" width="5" height="16" rx="2" fill="#E8B84B" filter="url(#glow)"/>
  <rect x="34" y="24" width="5" height="16" rx="2" fill="#E8B84B" filter="url(#glow)"/>
</svg>
