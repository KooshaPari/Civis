name: Journey Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  journey-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Rust test
        run: cargo test --workspace
