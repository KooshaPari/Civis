<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- scroll body -->
  <rect x="16" y="14" width="32" height="36" rx="3"
    fill="#0d1628" stroke="#50C8F0" stroke-width="2" filter="url(#glow)"/>
  <!-- scroll rolled top -->
  <ellipse cx="32" cy="14" rx="16" ry="4"
    fill="#112240" stroke="#50C8F0" stroke-width="2"/>
  <!-- scroll rolled bottom -->
  <ellipse cx="32" cy="50" rx="16" ry="4"
    fill="#112240" stroke="#50C8F0" stroke-width="2"/>
  <!-- text lines on scroll -->
  <line x1="22" y1="24" x2="42" y2="24" stroke="#50C8F0" stroke-width="1.5" opacity="0.7"/>
  <line x1="22" y1="30" x2="42" y2="30" stroke="#50C8F0" stroke-width="1.5" opacity="0.7"/>
  <line x1="22" y1="36" x2="38" y2="36" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
  <!-- gear overlay (lower-right corner) -->
  <circle cx="44" cy="46" r="8" fill="#0a1020" stroke="#E8B84B" stroke-width="2" filter="url(#glow)"/>
  <circle cx="44" cy="46" r="3.5" fill="#0a1020" stroke="#E8B84B" stroke-width="1.5"/>
  <!-- gear teeth (8 teeth) -->
  <line x1="44" y1="36" x2="44" y2="38" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="54" x2="44" y2="56" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="46" x2="36" y2="46" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="46" x2="54" y2="46" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="39" x2="38.4" y2="40.4" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="49.6" y1="51.6" x2="51" y2="53" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="53" x2="38.4" y2="51.6" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="49.6" y1="40.4" x2="51" y2="39" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>
</svg>
