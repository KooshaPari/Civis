# Local-first quality: developers run `lefthook run pre-push` (or `just quality-manifest`).
# This workflow only verifies the committed attestation — no Rust/Node toolchain on the runner.
name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-manifest:
    name: quality-manifest (cloud verify)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Must match the PR branch tip: default pull_request checkout is the
          # ephemeral merge commit, which breaks git_sha attestation in the manifest.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  # Optional heavy sweep (manual / release only — not required for PR merge).
  quality-full:
    name: quality-full (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - name: Full Rust + web sweep
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          (cd clients/godot-ref/rust && cargo test)
          (cd web && npm test)
          (cd web/dashboard && bun install --frozen-lockfile && bun run typecheck && bun run build)
      - name: Run CA dirty-chunk benchmark
        continue-on-error: true
        run: cargo bench --bench ca_dirty_chunk
      - name: Upload CA dirty-chunk criterion artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: criterion-ca-dirty-chunk
          path: target/criterion
          if-no-files-found: warn
          retention-days: 30
