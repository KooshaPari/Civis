name: orphan-process-start
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Pattern #102 detection gate — fails CI when production C# code calls
# ``Process.Start(...)`` in a way that orphans the Process handle.
# Two failure shapes are flagged HIGH:
#
#   1. Statement-level fire-and-forget (``Process.Start(psi);`` with no
#      LHS) in core code (src/Bridge/, src/Runtime/, src/SDK/) — the
#      Process IDisposable handle is dropped and OS handle closure
#      relies on finalizer GC.
#
#   2. Field-assignment with intervening ``await``/``throw`` and no
#      covering try/catch that calls Kill()/Dispose() on failure — the
#      orphan-on-throw variant where the spawned handle survives a
#      crashing caller.
#
# The healthy patterns are ``using var p = Process.Start(...)`` for
# scope-local spawns, or a try/catch-with-cleanup wrapper around the
# field assignment. Trailing ``// pattern-102-allowed: <reason>``
# blesses an intentional fire-and-forget.
#
# Companion: scripts/ci/detect_orphan_process_start.py (run with
# --self-test for spec). Allowlist:
# docs/qa/orphan-process-start-allowlist.txt.
# Cross-reference: tasks #295 (top-4 HIGH/MED sweep) /
# #296 (`using var _` wrap) / #297 (this gate) / #298 (CLAUDE.md
# doctrine + Pattern Catalog entry).

on:
  pull_request:
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_orphan_process_start.py"
      - "docs/qa/orphan-process-start-allowlist.txt"
      - ".github/workflows/orphan-process-start.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.cs"
      - "scripts/ci/detect_orphan_process_start.py"
      - "docs/qa/orphan-process-start-allowlist.txt"
      - ".github/workflows/orphan-process-start.yml"
  workflow_dispatch:
jobs:
  orphan-process-start-check:
    name: Pattern #102 orphan-process-start
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12"

      - name: Self-test the gate
        run: python scripts/ci/detect_orphan_process_start.py --self-test

      - name: Run orphan-process-start gate
        run: python scripts/ci/detect_orphan_process_start.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: orphan-process-start-report
          path: docs/qa/orphan-process-start-report.json
          if-no-files-found: warn
          retention-days: 14
