# CivLab mod manifest — example PolicyMod (CIV-0700 §4.1 outline).
# MVP: manifest only; WASM guest and host callbacks are not loaded yet.

[mod]
id = "example-policy"
name = "Example Carbon Tax Policy"
version = "0.1.0"
api_version = "1"
mod_type = "policy"
author = "CivLab"
description = "Stub policy mod for manifest validation and mod-host CI."

[dependencies]
civlab-api = ">=1.0.0, <2.0.0"

[permissions]
read_economy = true
read_climate = true
read_military = false
read_diplomacy = false
read_citizens = false
write_policy = true
write_economy = false
write_events = false
write_scenario = false
transfer_funds = false

[runtime]
# Defaults apply when omitted; values must not exceed host maximums (CIV-0700 §4.2).
memory_mb = 32
cpu_us = 30
