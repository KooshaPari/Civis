<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1628;stop-opacity:1" />
    </linearGradient>
    <!-- Globe gradient -->
    <radialGradient id="globeGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d2040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060d1e;stop-opacity:1" />
    </radialGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff7d4;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#E8B84B;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#c4892a;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0" />
    </radialGradient>
    <!-- Cyan glow filter -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Gold glow filter -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Text shadow -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#50C8F0" flood-opacity="0.5" />
    </filter>
    <!-- Clip for globe -->
    <clipPath id="globeClip">
      <circle cx="150" cy="150" r="95" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)" />

  <!-- ── GLOBE EMBLEM (left side) ── -->
  <!-- Outer ring glow -->
  <circle cx="150" cy="150" r="105" fill="none" stroke="#50C8F0" stroke-width="1.5" opacity="0.25" />
  <circle cx="150" cy="150" r="108" fill="none" stroke="#50C8F0" stroke-width="0.5" opacity="0.15" />

  <!-- Globe body -->
  <circle cx="150" cy="150" r="95" fill="url(#globeGrad)" stroke="#50C8F0" stroke-width="1.5" />

  <!-- Terraced latitude bands -->
  <g clip-path="url(#globeClip)" opacity="0.7">
    <!-- Latitude arcs -->
    <ellipse cx="150" cy="150" rx="95" ry="25" fill="none" stroke="#50C8F0" stroke-width="0.8" opacity="0.5" />
    <ellipse cx="150" cy="150" rx="95" ry="50" fill="none" stroke="#50C8F0" stroke-width="0.8" opacity="0.4" />
    <ellipse cx="150" cy="150" rx="95" ry="70" fill="none" stroke="#50C8F0" stroke-width="0.8" opacity="0.35" />
    <!-- Longitude arcs -->
    <ellipse cx="150" cy="150" rx="25" ry="95" fill="none" stroke="#50C8F0" stroke-width="0.8" opacity="0.4" />
    <ellipse cx="150" cy="150" rx="55" ry="95" fill="none" stroke="#50C8F0" stroke-width="0.8" opacity="0.35" />
    <ellipse cx="150" cy="150" rx="80" ry="95" fill="none" stroke="#50C8F0" stroke-width="0.8" opacity="0.3" />

    <!-- Terraced landmass shapes (stylized) -->
    <!-- Continent silhouettes -->
    <path d="M90,115 L105,100 L125,98 L140,105 L145,120 L135,130 L120,128 L105,135 L95,128 Z"
          fill="#1e4a30" stroke="#2a6040" stroke-width="0.5" opacity="0.9" />
    <path d="M155,105 L175,95 L195,100 L205,115 L200,130 L185,135 L170,130 L160,120 Z"
          fill="#1e4a30" stroke="#2a6040" stroke-width="0.5" opacity="0.9" />
    <!-- Terrace steps on first continent -->
    <path d="M95,120 L110,112 L125,112 L130,120 L120,125 L105,125 Z"
          fill="#2a6040" opacity="0.7" />
    <path d="M100,126 L115,120 L125,122 L122,130 L108,130 Z"
          fill="#3a7050" opacity="0.6" />
    <!-- Water highlight -->
    <path d="M130,155 Q150,145 170,155 Q175,165 160,170 Q145,175 135,165 Z"
          fill="#0d3050" stroke="#50C8F0" stroke-width="0.5" opacity="0.6" />
    <!-- Southern terrace land -->
    <path d="M115,165 L140,160 L155,165 L150,180 L130,182 L115,175 Z"
          fill="#1e4a30" stroke="#2a6040" stroke-width="0.5" opacity="0.8" />
  </g>

  <!-- Sun: upper right of globe -->
  <circle cx="215" cy="68" r="28" fill="url(#sunGrad)" filter="url(#goldGlow)" />
  <!-- Sun rays -->
  <g filter="url(#goldGlow)" opacity="0.8">
    <line x1="215" y1="32" x2="215" y2="22" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" />
    <line x1="239" y1="44" x2="246" y2="37" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" />
    <line x1="251" y1="68" x2="261" y2="68" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" />
    <line x1="239" y1="92" x2="246" y2="99" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" />
    <line x1="191" y1="44" x2="184" y2="37" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" />
    <line x1="179" y1="68" x2="169" y2="68" stroke="#E8B84B" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Globe equator highlight -->
  <ellipse cx="150" cy="150" rx="95" ry="12" fill="none" stroke="#50C8F0" stroke-width="1.5"
           opacity="0.6" clip-path="url(#globeClip)" />

  <!-- Globe pole dots -->
  <circle cx="150" cy="55" r="3" fill="#50C8F0" opacity="0.8" />
  <circle cx="150" cy="245" r="3" fill="#50C8F0" opacity="0.5" />

  <!-- ── WORDMARK ── -->
  <!-- Main CIVIS text -->
  <text x="295" y="185"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="130"
        font-weight="900"
        letter-spacing="12"
        fill="#e8eef5"
        filter="url(#textShadow)"
        text-anchor="start">CIVIS</text>

  <!-- Cyan accent underline -->
  <rect x="295" y="200" width="440" height="3" fill="#50C8F0" opacity="0.9" rx="1.5" />
  <!-- Gold accent thin line -->
  <rect x="295" y="207" width="440" height="1.5" fill="#E8B84B" opacity="0.7" rx="0.75" />

  <!-- Subtitle tagline -->
  <text x="515" y="240"
        font-family="'Trebuchet MS', 'Arial', sans-serif"
        font-size="18"
        font-weight="400"
        letter-spacing="6"
        fill="#50C8F0"
        text-anchor="middle"
        opacity="0.85">CIVILISATION SANDBOX</text>

  <!-- Corner accent marks -->
  <g stroke="#E8B84B" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="30,20 20,20 20,30" />
    <polyline points="780,20 790,20 790,30" />
    <polyline points="30,280 20,280 20,270" />
    <polyline points="780,280 790,280 790,270" />
  </g>
</svg>
