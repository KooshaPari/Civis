<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Cyan faction: The Aether Lattice — crystalline radial sigil, precise geometry -->
  <defs>
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="cyanAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#50C8F0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#50C8F0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ambient -->
  <circle cx="64" cy="64" r="52" fill="url(#cyanAmbient)"/>
  <!-- outer ring -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="#50C8F0" stroke-width="2" opacity="0.45"/>
  <circle cx="64" cy="64" r="42" fill="none" stroke="#50C8F0" stroke-width="1.2" opacity="0.3"/>
  <!-- central crystal: vertical hexagonal prism -->
  <polygon points="64,18 86,40 86,88 64,110 42,88 42,40"
    fill="#08161e" stroke="#50C8F0" stroke-width="3" stroke-linejoin="round" filter="url(#cyanGlow)"/>
  <!-- inner facet lines -->
  <line x1="64" y1="18" x2="64" y2="110" stroke="#50C8F0" stroke-width="1.5" opacity="0.6"/>
  <line x1="42" y1="40" x2="86" y2="88" stroke="#50C8F0" stroke-width="1" opacity="0.4"/>
  <line x1="86" y1="40" x2="42" y2="88" stroke="#50C8F0" stroke-width="1" opacity="0.4"/>
  <!-- inner lattice diamond -->
  <polygon points="64,40 78,64 64,88 50,64"
    fill="#0d2530" stroke="#7fdcf7" stroke-width="2" filter="url(#cyanGlow)"/>
  <!-- four cardinal nodes -->
  <circle cx="64" cy="14" r="4" fill="#50C8F0" filter="url(#cyanGlow)"/>
  <circle cx="64" cy="114" r="3" fill="#50C8F0" opacity="0.7"/>
  <circle cx="14" cy="64" r="3" fill="#50C8F0" opacity="0.7"/>
  <circle cx="114" cy="64" r="3" fill="#50C8F0" opacity="0.7"/>
  <!-- core -->
  <circle cx="64" cy="64" r="5" fill="#08161e" stroke="#7fdcf7" stroke-width="2"/>
  <circle cx="64" cy="64" r="2" fill="#7fdcf7" filter="url(#cyanGlow)"/>
</svg>
