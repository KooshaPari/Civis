version: "0.5"

log_location: .process-compose/process-compose.log
log_level: info

environment:
  - RUST_LOG=${RUST_LOG:-info}
  - CIV_SERVER_HOST=${CIV_SERVER_HOST:-0.0.0.0}
  - CIV_SERVER_PORT=${CIV_SERVER_PORT:-8080}
  - CIV_METRICS_PORT=${CIV_METRICS_PORT:-9090}

processes:
  postgres:
    command: sh
    args:
      - -c
      - |
        if command -v postgres >/dev/null 2>&1; then
          exec postgres -D .process-compose/data/pg -p 5432 -h 127.0.0.1
        fi
        if command -v docker >/dev/null 2>&1; then
          exec docker run --rm \
            -e POSTGRES_USER=civis \
            -e POSTGRES_PASSWORD=civis \
            -e POSTGRES_DB=civis \
            -p 5432:5432 \
            -v "$PWD/.process-compose/data/pg:/var/lib/postgresql/data" \
            postgres:16
        fi
        echo "postgres or docker is required" >&2
        exit 1
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "netstat -tulpn 2>/dev/null | grep -q ':5432 ' || curl -sf http://127.0.0.1:${CIV_PG_PORT:-5432}/healthz >/dev/null 2>&1"]
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
    log_location: .process-compose/logs/postgres.log

  dragonfly:
    command: sh
    args:
      - -c
      - |
        if command -v dragonfly >/dev/null 2>&1; then
          exec dragonfly --bind 127.0.0.1 --port 6379
        fi
        if command -v redis-server >/dev/null 2>&1; then
          exec redis-server --port 6379 --bind 127.0.0.1
        fi
        if command -v docker >/dev/null 2>&1; then
          exec docker run --rm -p 6379:6379 dragonflydb/dragonfly
        fi
        echo "dragonfly or redis-server or docker is required" >&2
        exit 1
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "netstat -tulpn 2>/dev/null | grep -q ':6379 ' || curl -sf http://127.0.0.1:${CIV_DRAGONFLY_PORT:-6379}/healthz >/dev/null 2>&1"]
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 10
    log_location: .process-compose/logs/dragonfly.log

  nats:
    command: sh
    args:
      - -c
      - |
        if command -v nats-server >/dev/null 2>&1; then
          exec nats-server --jetstream --port 4222 --addr 127.0.0.1
        fi
        if command -v docker >/dev/null 2>&1; then
          exec docker run --rm -p 4222:4222 nats:2 --jetstream --port 4222 --addr 0.0.0.0
        fi
        echo "nats-server or docker is required" >&2
        exit 1
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "netstat -tulpn 2>/dev/null | grep -q ':4222 ' || curl -sf http://127.0.0.1:${CIV_NATS_PORT:-4222}/healthz >/dev/null 2>&1"]
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 10
    log_location: .process-compose/logs/nats.log

  minio:
    command: sh
    args:
      - -c
      - |
        mkdir -p .process-compose/data/minio
        if command -v minio >/dev/null 2>&1; then
          exec minio server .process-compose/data/minio --address 127.0.0.1:${CIV_MINIO_PORT:-9000} --console-address 127.0.0.1:${CIV_MINIO_CONSOLE_PORT:-9001}
        fi
        if command -v docker >/dev/null 2>&1; then
          exec docker run --rm \
            -e MINIO_ROOT_USER=${CIV_MINIO_ACCESS_KEY} \
            -e MINIO_ROOT_PASSWORD=${CIV_MINIO_SECRET_KEY} \
            -p ${CIV_MINIO_PORT:-9000}:${CIV_MINIO_PORT:-9000} \
            -p ${CIV_MINIO_CONSOLE_PORT:-9001}:${CIV_MINIO_CONSOLE_PORT:-9001} \
            -v "$PWD/.process-compose/data/minio:/data" \
            minio/minio server /data --address 0.0.0.0:9000 --console-address 0.0.0.0:9001
        fi
        echo "minio or docker is required" >&2
        exit 1
    environment:
      - MINIO_ROOT_USER=${CIV_MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${CIV_MINIO_SECRET_KEY}
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "netstat -tulpn 2>/dev/null | grep -Eq ':(${CIV_MINIO_PORT:-9000}|${CIV_MINIO_CONSOLE_PORT:-9001}) ' || curl -sf http://127.0.0.1:${CIV_MINIO_PORT:-9000}/minio/health/ready >/dev/null 2>&1"]
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
    log_location: .process-compose/logs/minio.log

  sim-server:
    command: cargo
    args: ["run", "-p", "civ-server", "--release"]
    working_dir: .
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: sh
        args: ["-c", "netstat -tulpn 2>/dev/null | grep -q ${CIV_SERVER_PORT:-8080} || curl -s http://localhost:${CIV_SERVER_PORT:-8080}/health >/dev/null 2>&1 || true"]
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 10
    log_location: .process-compose/logs/sim-server.log
    depends_on:
      - condition: "healthy"

  metrics-collector:
    command: sh
    args:
      - -c
      - |
        while true; do
          sleep 10
          curl -s http://localhost:${CIV_METRICS_PORT:-9090}/metrics > /tmp/civ-metrics-$(date +%s).txt 2>/dev/null || true
        done
    depends_on:
      sim-server:
        condition: "process_healthy"
    availability:
      restart: on_failure
      max_restarts: 3
      backoff_seconds: 5
    log_location: .process-compose/logs/metrics-collector.log

  replay-validator:
    command: sh
    args:
      - -c
      - |
        set -e
        echo "Waiting for sim-server to stabilize..."
        sleep 5

        # Run deterministic replay validation
        if [[ -f "crates/engine/tests/fr_determinism_replay.rs" ]]; then
          echo "Running determinism replay tests..."
          cargo test --package civ-engine --test fr_determinism_replay -- --test-threads=1
          echo "Determinism validation passed"
        else
          echo "Replay test not yet implemented"
        fi

        # Keep process alive
        while true; do
          sleep 60
        done
    depends_on:
      sim-server:
        condition: "process_healthy"
    availability:
      restart: on_failure
      max_restarts: 2
      backoff_seconds: 10
    log_location: .process-compose/logs/replay-validator.log
