[package]
name = "civ-save-db"
description = "Session-scoped SQLite save metadata index (CIV-1000 §9.2–9.3 MVP)"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

[features]
bench = []

[dev-dependencies]
criterion = "0.5"
tempfile = "3"

[[bench]]
name = "sink_bench"
harness = false
required-features = ["bench"]
