<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440">
  <!--
    Loading-bg: dimmer, lower-contrast variant of the title scene.
    Clear horizontal band ~60% down (y≈840-920) for progress bar + tip text.
    Overall brightness reduced ~40%, colors desaturated, mid-ground contrast softened.
  -->
  <defs>
    <!-- Dimmer sky gradient -->
    <linearGradient id="skyGradDim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#02060e;stop-opacity:1" />
      <stop offset="28%"  style="stop-color:#060c18;stop-opacity:1" />
      <stop offset="55%"  style="stop-color:#09122a;stop-opacity:1" />
      <stop offset="78%"  style="stop-color:#101e38;stop-opacity:1" />
      <stop offset="88%"  style="stop-color:#1c2614;stop-opacity:1" />
      <stop offset="95%"  style="stop-color:#2c2610;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38280a;stop-opacity:1" />
    </linearGradient>

    <!-- Muted horizon glow -->
    <radialGradient id="horizonGlowDim" cx="62%" cy="100%" r="70%">
      <stop offset="0%"   style="stop-color:#a07830;stop-opacity:0.2" />
      <stop offset="40%"  style="stop-color:#804818;stop-opacity:0.1" />
      <stop offset="70%"  style="stop-color:#304860;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#02060e;stop-opacity:0" />
    </radialGradient>

    <!-- Dimmer mountain gradient -->
    <linearGradient id="farMtnDim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#0c1a30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101e38;stop-opacity:1" />
    </linearGradient>

    <!-- Dimmer mid hill gradient -->
    <linearGradient id="midHillDim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#10261a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#08140e;stop-opacity:1" />
    </linearGradient>

    <!-- Near ground dim -->
    <linearGradient id="nearDim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#0a160e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04080a;stop-opacity:1" />
    </linearGradient>

    <!-- Progress bar band gradient: slightly lighter strip -->
    <linearGradient id="progressBandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#0a1018;stop-opacity:0" />
      <stop offset="25%"  style="stop-color:#0e1820;stop-opacity:0.7" />
      <stop offset="50%"  style="stop-color:#0f1a24;stop-opacity:0.85" />
      <stop offset="75%"  style="stop-color:#0e1820;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0a1018;stop-opacity:0" />
    </linearGradient>

    <!-- Moon glow dim -->
    <radialGradient id="moonGlowDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#c0d8f0;stop-opacity:0.7" />
      <stop offset="50%"  style="stop-color:#80b0d0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#50C8F0;stop-opacity:0" />
    </radialGradient>

    <!-- Fog/blur filter -->
    <filter id="fogDim">
      <feGaussianBlur stdDeviation="10" />
    </filter>

    <!-- Settlement glow dim -->
    <filter id="settleGlowDim" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- ── SKY (dim) ── -->
  <rect width="2560" height="1440" fill="url(#skyGradDim)" />
  <rect width="2560" height="1440" fill="url(#horizonGlowDim)" />

  <!-- ── STARS (dim, sparser) ── -->
  <g fill="white" opacity="0.5">
    <circle cx="120"  cy="60"  r="1.2" />
    <circle cx="280"  cy="40"  r="1.5" />
    <circle cx="620"  cy="30"  r="1.6" />
    <circle cx="960"  cy="45"  r="1.5" />
    <circle cx="1380" cy="55"  r="1.8" />
    <circle cx="1720" cy="80"  r="1.5" />
    <circle cx="2080" cy="65"  r="1.6" />
    <circle cx="2440" cy="70"  r="1.5" />
    <circle cx="390"  cy="150" r="1.0" />
    <circle cx="740"  cy="160" r="1.2" />
    <circle cx="1260" cy="95"  r="0.9" />
    <circle cx="1820" cy="155" r="1.2" />
    <circle cx="2380" cy="95"  r="1.0" />
  </g>

  <!-- Moon (dim) -->
  <circle cx="1980" cy="160" r="50" fill="url(#moonGlowDim)" opacity="0.6" />
  <circle cx="1980" cy="160" r="38" fill="#a8c8e8" opacity="0.5" />

  <!-- ── FAR MOUNTAINS (dim, desaturated) ── -->
  <path d="
    M 1400,720
    L 1480,580 L 1520,610 L 1560,540 L 1600,570
    L 1650,495 L 1700,530 L 1740,510 L 1780,545
    L 1820,470 L 1870,505 L 1910,480 L 1960,520
    L 2000,455 L 2050,490 L 2090,465 L 2140,500
    L 2180,440 L 2230,475 L 2280,455 L 2340,490
    L 2380,430 L 2430,465 L 2480,445 L 2560,490
    L 2560,720
    Z"
    fill="url(#farMtnDim)" opacity="0.7" />

  <path d="
    M 0,720 L 0,660
    L 80,610 L 140,640 L 200,595 L 260,625
    L 340,580 L 390,605 L 450,590 L 500,615
    L 560,600 L 620,635 L 700,620 L 760,650
    L 850,640 L 920,660 L 1000,645 L 1080,665
    L 1160,650 L 1260,680 L 1400,720
    Z"
    fill="url(#farMtnDim)" opacity="0.55" />

  <!-- Mountain mist: heavier in dim variant -->
  <rect x="0" y="560" width="2560" height="200" fill="#0a1020" opacity="0.45" filter="url(#fogDim)" />

  <!-- ── MID HILLS (dim) ── -->
  <path d="
    M 1300,900
    L 1350,780 L 1420,820 L 1500,760 L 1580,800
    L 1660,740 L 1740,770 L 1820,730 L 1900,765
    L 1980,720 L 2060,755 L 2140,720 L 2220,755
    L 2300,715 L 2400,745 L 2480,720 L 2560,750
    L 2560,900
    Z"
    fill="url(#midHillDim)" opacity="0.85" />

  <path d="
    M 0,900 L 0,840
    L 100,800 L 200,830 L 300,790 L 400,820
    L 500,800 L 600,835 L 700,815 L 800,845
    L 900,830 L 1000,855 L 1100,840 L 1200,860
    L 1300,850 L 1300,900
    Z"
    fill="url(#midHillDim)" opacity="0.7" />

  <!-- ── SETTLEMENT (dim, only glow windows visible) ── -->
  <g filter="url(#settleGlowDim)" opacity="0.6">
    <rect x="1620" y="810" width="180" height="70" fill="#06100a" />
    <rect x="1618" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1642" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1666" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1690" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1714" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1738" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1762" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1782" y="800" width="16" height="18" fill="#06100a" />
    <rect x="1690" y="730" width="40" height="82" fill="#071208" />
    <rect x="1688" y="720" width="10" height="14" fill="#071208" />
    <rect x="1702" y="720" width="10" height="14" fill="#071208" />
    <rect x="1716" y="720" width="10" height="14" fill="#071208" />
    <!-- Dim flag -->
    <line x1="1710" y1="720" x2="1710" y2="696" stroke="#a07828" stroke-width="1.5" opacity="0.5" />
    <polygon points="1710,696 1724,703 1710,710" fill="#a07828" opacity="0.4" />
    <!-- Windows (dim warm glow) -->
    <rect x="1698" y="755" width="8"  height="10" fill="#a07828" opacity="0.4" rx="1" />
    <rect x="1714" y="755" width="8"  height="10" fill="#a07828" opacity="0.3" rx="1" />
    <rect x="1648" y="775" width="6"  height="8"  fill="#a07828" opacity="0.3" rx="1" />
    <rect x="1760" y="775" width="6"  height="8"  fill="#a07828" opacity="0.3" rx="1" />
  </g>
  <ellipse cx="1710" cy="882" rx="100" ry="14" fill="#a07828" opacity="0.07" filter="url(#fogDim)" />

  <!-- ── NEAR GROUND (dim) ── -->
  <path d="
    M 0,1440 L 0,920
    L 80,910  L 160,925 L 240,908 L 320,918
    L 400,905 L 480,915 L 560,900 L 640,912
    L 720,905 L 800,918 L 880,908 L 960,920
    L 1040,910 L 1120,922 L 1200,912 L 1280,925
    L 1360,915 L 1440,928 L 1520,918 L 1600,930
    L 1680,920 L 1760,932 L 1840,922 L 1920,935
    L 2000,925 L 2080,938 L 2160,928 L 2240,940
    L 2320,930 L 2400,942 L 2480,932 L 2560,945
    L 2560,1440
    Z"
    fill="url(#nearDim)" />

  <!-- ── HEAVY OVERLAY: dim the whole scene ── -->
  <rect width="2560" height="1440" fill="#020408" opacity="0.45" />

  <!-- ── PROGRESS BAR BAND (y≈840-920, clear horizontal strip) ── -->
  <!-- Subtle lighter band so text/bar are legible against the dark bg -->
  <!-- The band itself is just a slightly less dark overlay -->
  <rect x="0" y="800" width="2560" height="140" fill="url(#progressBandGrad)" />

  <!-- Faint progress bar track guide (artists' reference — Bevy code draws the real bar) -->
  <rect x="280" y="856" width="2000" height="8" fill="#1a2a38" opacity="0.7" rx="4" />
  <!-- Track border -->
  <rect x="280" y="854" width="2000" height="12" fill="none" stroke="#50C8F0" stroke-width="0.8" opacity="0.2" rx="5" />

  <!-- Tip text zone indicator (center, below bar) -->
  <!-- Empty zone: game code writes tip text here. No placeholder text in SVG. -->

  <!-- ── FINAL VIGNETTE (stronger than title-bg) ── -->
  <rect x="0"    y="0"    width="2560" height="300"  fill="#02060e" opacity="0.7" />
  <rect x="0"    y="1140" width="2560" height="300"  fill="#020408" opacity="0.75" />
  <rect x="0"    y="0"    width="400"  height="1440" fill="#02060e" opacity="0.3" />
  <rect x="2160" y="0"    width="400"  height="1440" fill="#02060e" opacity="0.3" />

  <!-- ── CYAN HORIZON ACCENT (very subtle) ── -->
  <line x1="0" y1="718" x2="2560" y2="718" stroke="#50C8F0" stroke-width="0.6" opacity="0.06" />
</svg>
