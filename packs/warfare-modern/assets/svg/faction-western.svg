<?xml version="1.0" encoding="UTF-8"?>
<!--
  Western Alliance — Faction Crest
  DINOForge Warfare-Modern pack · identity asset

  ORIGINAL ART DISCLAIMER
  ========================
  All geometry in this file is wholly original and hand-authored for the
  DINOForge project. The crest motif — a chevron over a compass-rose with
  a shield outline — is generic open military-heraldry grammar. It has not
  been derived from, nor does it reproduce, any real national insignia,
  coat-of-arms, NATO seal, military unit patch, or trademarked symbol.
  The "Western Alliance" is a wholly fictional faction.

  Dimensions: 256 × 256  (square badge / crest format)

  Palette: identity-modern.md §2.1
    NATO Navy     #1C2B3A  — shield fill / deep bg
    Olive Drab    #4A5240  — secondary fill
    Hi-Vis Amber  #F5A623  — chevron, star, accent
    Buff White    #EDE8DC  — text, compass spokes
    Faded Field   #A0A08A  — secondary text
    Camo Edge     #2E3528  — border / outline
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="Western Alliance faction crest">

  <defs>
    <!-- Shield fill gradient: navy top to olive-drab lower -->
    <linearGradient id="wa-shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C2B3A"/>
      <stop offset="70%"  stop-color="#243040"/>
      <stop offset="100%" stop-color="#2E3528"/>
    </linearGradient>

    <!-- Amber spoke highlight -->
    <radialGradient id="wa-center-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#F5A623" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Outer square border (chamfered top-left + bottom-right) ── -->
  <polygon id="wa-outer-border"
           points="14,0 256,0 256,242 242,256 0,256 0,14"
           fill="#2E3528"
           stroke="#F5A623" stroke-width="2"/>

  <!-- ── Shield silhouette ──
       Classic heraldic shield: wide at top, pointed base.
       Entirely original geometry — not derived from any real coat-of-arms.
  -->
  <path id="wa-shield"
        d="M 128,236
           C 60,200 28,170 28,110
           L 28,44
           L 128,24
           L 228,44
           L 228,110
           C 228,170 196,200 128,236
           Z"
        fill="url(#wa-shield-fill)"
        stroke="#4A5240" stroke-width="3"/>

  <!-- Shield inner chamfer border (amber line inset 10px) -->
  <path id="wa-shield-inner"
        d="M 128,218
           C 72,186 44,160 44,110
           L 44,56
           L 128,40
           L 212,56
           L 212,110
           C 212,160 184,186 128,218
           Z"
        fill="none"
        stroke="#F5A623" stroke-width="1.5" stroke-dasharray="8 4"/>

  <!-- ── NATO-grammar 8-point compass rose (centre of shield) ──
       8 equal spokes radiating from centre at (128, 126)
       4 cardinal (longer, 36px) + 4 diagonal (shorter, 24px)
       All spokes: Buff White outline, Amber fill on cardinals
  -->
  <!-- Amber glow halo at rose centre -->
  <circle cx="128" cy="126" r="38" fill="url(#wa-center-glow)"/>

  <!-- Outer rose ring -->
  <circle id="wa-rose-ring" cx="128" cy="126" r="36"
          fill="none" stroke="#EDE8DC" stroke-width="1.5"/>

  <!-- 4 cardinal spokes — amber, longer -->
  <!-- North -->
  <line x1="128" y1="90"  x2="128" y2="68"
        stroke="#F5A623" stroke-width="5" stroke-linecap="square"/>
  <!-- East -->
  <line x1="164" y1="126" x2="186" y2="126"
        stroke="#F5A623" stroke-width="5" stroke-linecap="square"/>
  <!-- South -->
  <line x1="128" y1="162" x2="128" y2="184"
        stroke="#F5A623" stroke-width="5" stroke-linecap="square"/>
  <!-- West -->
  <line x1="92"  y1="126" x2="70"  y2="126"
        stroke="#F5A623" stroke-width="5" stroke-linecap="square"/>

  <!-- 4 diagonal spokes — white, shorter -->
  <!-- NE -->
  <line x1="154" y1="100" x2="169" y2="85"
        stroke="#EDE8DC" stroke-width="3" stroke-linecap="square"/>
  <!-- SE -->
  <line x1="154" y1="152" x2="169" y2="167"
        stroke="#EDE8DC" stroke-width="3" stroke-linecap="square"/>
  <!-- SW -->
  <line x1="102" y1="152" x2="87"  y2="167"
        stroke="#EDE8DC" stroke-width="3" stroke-linecap="square"/>
  <!-- NW -->
  <line x1="102" y1="100" x2="87"  y2="85"
        stroke="#EDE8DC" stroke-width="3" stroke-linecap="square"/>

  <!-- Rose inner ring -->
  <circle cx="128" cy="126" r="14"
          fill="#1C2B3A" stroke="#EDE8DC" stroke-width="1.5"/>
  <!-- Centre dot (amber) -->
  <circle cx="128" cy="126" r="5"
          fill="#F5A623"/>

  <!-- ── Three-chevron motif above rose (top of shield) ──
       3 right-pointing chevrons >>>  rendered as V-shapes pointing right,
       stacked vertically, rotated 0° (pointing up-right) as a rank indicator.
       Pure geometric angular shapes — no real insignia derivation.
  -->
  <!-- Chevron 1 (top, outermost) -->
  <polyline id="wa-chev-1"
            points="98,64 128,52 158,64"
            fill="none" stroke="#F5A623" stroke-width="4"
            stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Chevron 2 -->
  <polyline id="wa-chev-2"
            points="104,72 128,62 152,72"
            fill="none" stroke="#F5A623" stroke-width="3.5"
            stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Chevron 3 (innermost) -->
  <polyline id="wa-chev-3"
            points="110,80 128,72 146,80"
            fill="none" stroke="#A0A08A" stroke-width="2.5"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- ── Faction label — WESTERN ALLIANCE ── -->
  <text x="128" y="206"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="13" font-weight="400" letter-spacing="3"
        fill="#EDE8DC" text-anchor="middle">WESTERN</text>
  <text x="128" y="220"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="11" font-weight="400" letter-spacing="2"
        fill="#A0A08A" text-anchor="middle">ALLIANCE</text>

  <!-- ── Corner classification marks ── -->
  <text x="10" y="14"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="8" fill="#4A5240">WA-01</text>
  <text x="246" y="252"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="8" fill="#4A5240" text-anchor="end">THT-1</text>

</svg>
