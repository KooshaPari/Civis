name: PR Compile Gate

# The missing oracle: cargo test --workspace (default features) NEVER compiles the
# bevy client (optional `bevy`/`egui` features), so un-compiling client code merged
# silently and broke main repeatedly. This gate runs cargo check on every PR — both
# the default workspace AND the feature-gated bevy client — so non-compiling code
# fails BEFORE merge, not after.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - feat/civis-platform

permissions:
  contents: read

jobs:
  workspace-compile:
    name: workspace-compile (cargo check --workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-all-crates: true
      - name: cargo check --workspace --all-targets
        run: cargo check --workspace --all-targets

  client-compile:
    name: client-compile (civ-bevy-ref bevy,egui)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-all-crates: true
      - name: cargo check -p civ-bevy-ref --features bevy,egui
        run: cargo check -p civ-bevy-ref --features bevy,egui
