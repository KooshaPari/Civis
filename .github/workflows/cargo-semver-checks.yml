# Local-first: PRs use quality.yml + pr-governance only.
# Heavy gate (cargo-semver-checks) runs locally via lefthook pre-push and is
# attested in `.ci/quality-manifest.json`; this workflow is dispatch-only.
name: cargo-semver-checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  semver-checks:
    # Manual escape hatch: run heavy semver-checks on the runner when explicitly asked.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: obi1kenobi/cargo-semver-checks-action@v2
