# Civis dev-loop build configuration.
#
# Goal: fast incremental dev builds without regressing release or determinism.
# See docs/development-guide/dev-loop.md for the full loop and measured deltas.
#
# IMPORTANT: nothing here changes codegen/optimization of the `release` profile,
# so release determinism is unaffected. The only build-wide change is the linker
# (rust-lld), which produces a functionally identical binary — it only links
# faster than the default MSVC `link.exe`.
#
# NOTE: this file deliberately sets NO `[build] target-dir`. A user-level
# ~/.cargo/config.toml already redirects the target dir off the C: drive;
# overriding it here would refill C:. Do not add a `target-dir` key.

[build]
# Incremental compilation: reuse codegen units across warm rebuilds. This is the
# single biggest warm-rebuild win and is safe for dev. CI/release pipelines
# should keep it off (they set CARGO_INCREMENTAL=0) for reproducible artifacts.
incremental = true

# --- Fast linker (Windows / x86_64-pc-windows-msvc) ---
# rust-lld ships *inside* the Rust toolchain (no install needed) and links far
# faster than MSVC link.exe. Only affects link time, not codegen, so it cannot
# change runtime determinism. `-Zthreads` is nightly-only and intentionally omitted.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# --- Fast linker (Linux) ---
# Prefer the system clang + lld; mold is even faster if installed (swap to
# "-Clink-arg=-fuse-ld=mold"). Commented out so it never breaks a machine that
# lacks clang/lld — uncomment locally if available.
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-Clink-arg=-fuse-ld=lld"]

# --- Fast linker (macOS Apple Silicon) ---
# The default ld-prime on recent Xcode is already fast; lld via the line below
# is optional.
# [target.aarch64-apple-darwin]
# rustflags = ["-Clink-arg=-fuse-ld=lld"]

# --- Cranelift codegen backend (optional, nightly) ---
# rustc_codegen_cranelift cuts *codegen* time substantially for debug builds but
# requires a nightly toolchain + `rustup component add rustc-codegen-cranelift`.
# It is NOT wired here because rust-toolchain.toml pins stable. To try it locally:
#   rustup toolchain install nightly
#   rustup component add rustc-codegen-cranelift --toolchain nightly
#   CARGO_PROFILE_DEV_CODEGEN_BACKEND=cranelift cargo +nightly build -Zcodegen-backend ...
