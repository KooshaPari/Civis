<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="impactGlow" cx="55%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#E8B84B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- impact glow -->
  <circle cx="40" cy="40" r="18" fill="url(#impactGlow)"/>
  <!-- meteor body (rough circle, angled) -->
  <ellipse cx="22" cy="22" rx="10" ry="8"
    fill="#1a2840" stroke="#E8B84B" stroke-width="2.5"
    transform="rotate(-35 22 22)" filter="url(#glow)"/>
  <!-- crater pitting on meteor -->
  <circle cx="18" cy="19" r="2" fill="none" stroke="#50C8F0" stroke-width="1" opacity="0.6"/>
  <circle cx="25" cy="24" r="1.5" fill="none" stroke="#50C8F0" stroke-width="1" opacity="0.5"/>
  <!-- trail streak 1 -->
  <line x1="28" y1="28" x2="52" y2="52" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  <!-- trail streak 2 (fainter) -->
  <line x1="26" y1="30" x2="48" y2="54" stroke="#E8B84B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- burst lines at impact point -->
  <line x1="44" y1="44" x2="52" y2="38" stroke="#50C8F0" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="44" x2="54" y2="48" stroke="#50C8F0" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="44" x2="44" y2="56" stroke="#50C8F0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="44" x2="36" y2="54" stroke="#50C8F0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- impact dot -->
  <circle cx="44" cy="44" r="3" fill="#E8B84B" filter="url(#glow)"/>
</svg>
