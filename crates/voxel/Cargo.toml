[package]
name = "civ-voxel"
description = "Adaptive voxel substrate: sparse octree + dense leaf chunks; deterministic mesh-dirty queue"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"

# Adaptive voxel kernel (sibling Phenotype-org repo).
# Path-dep for local development; switch to a git-rev pin once the kernel API stabilises.
phenotype-voxel = { path = "../../../phenotype-voxel" }

[dev-dependencies]
proptest = "1.4"
