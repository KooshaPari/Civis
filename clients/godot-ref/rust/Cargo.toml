[package]
name = "civis-godot-rust"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
civ-engine = { path = "../../../crates/engine" }
civ-protocol-3d = { path = "../../../crates/protocol-3d" }
civ-voxel = { path = "../../../crates/voxel" }
godot = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
