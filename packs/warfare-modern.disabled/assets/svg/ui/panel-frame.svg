<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | panel-frame.svg | 256x256 chamfered tactical-HUD panel frame -->
<!-- Palette: #1C2B3A fill, #4A5240 border, #F5A623 accent strip, #EDE8DC header rule -->
<!-- 9-slice ready:
     Top-left corner:     0,0  to  28,28   (chamfer corner region)
     Top-right corner:   228,0  to 256,28
     Bottom-left corner:   0,228 to  28,256
     Bottom-right corner: 228,228 to 256,256
     9-slice insets: left=28, top=28, right=28, bottom=28
     Stretch center:      28,28 to 228,228
     Accent strip is in left=0..3 (fill with left-edge slice) — keep left inset at 28 to include it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">

  <!-- === PANEL BODY (semi-transparent tactical fill) === -->
  <!-- Chamfered polygon: cut top-left 12px, bottom-right 12px per identity doc -->
  <polygon
    points="24,0 256,0 256,256 0,256 0,24"
    fill="#1C2318"
    fill-opacity="0.92"/>

  <!-- === OUTER BORDER: 1px #4A5240 following chamfer === -->
  <polygon
    points="24,0.5 255.5,0.5 255.5,255.5 0.5,255.5 0.5,24"
    fill="none"
    stroke="#4A5240"
    stroke-width="1"/>

  <!-- === LEFT ACCENT STRIP: 3px #F5A623 (Alliance) ===
       Runs full left edge (following chamfer), narrowing at corner -->
  <line x1="2" y1="26" x2="2" y2="256" stroke="#F5A623" stroke-width="3"/>

  <!-- === TOP-LEFT CHAMFER DETAIL: small notch fill === -->
  <!-- The chamfer cut is a diagonal at TL (0,24)-(24,0) -->
  <!-- Chamfer edge highlight line -->
  <line x1="0" y1="24" x2="24" y2="0" stroke="#2E3528" stroke-width="1"/>

  <!-- === BOTTOM-RIGHT CHAMFER DETAIL === -->
  <!-- per identity doc: also bottom-right 12px notch -->
  <line x1="256" y1="244" x2="244" y2="256" stroke="#2E3528" stroke-width="1"/>
  <!-- Recutting corner polygon to incorporate BR chamfer -->
  <!-- Override the fill polygon with both chamfers -->
  <polygon
    points="24,1 255,1 255,244 244,255 1,255 1,24"
    fill="#1C2318"
    fill-opacity="0.92"/>
  <polygon
    points="24,0.5 255.5,0.5 255.5,243.5 243.5,255.5 0.5,255.5 0.5,24"
    fill="none"
    stroke="#4A5240"
    stroke-width="1"/>

  <!-- === HEADER RULE: 1px #4A5240 at 24px from top inner edge === -->
  <line x1="4" y1="40" x2="252" y2="40" stroke="#4A5240" stroke-width="1"/>

  <!-- === INNER CHROME FRAME (subtle double-line effect) === -->
  <polygon
    points="26,3 253,3 253,241 241,253 3,253 3,26"
    fill="none"
    stroke="#2E3528"
    stroke-width="0.5"
    stroke-opacity="0.5"/>

  <!-- === CORNER TICK MARKS (tactical HUD corner brackets) === -->
  <!-- Top-left (inside chamfer zone) -->
  <polyline points="28,8 28,20 40,20" fill="none" stroke="#4A5240" stroke-width="1"/>
  <!-- Top-right -->
  <polyline points="228,8 228,20 216,20" fill="none" stroke="#4A5240" stroke-width="1"/>
  <!-- Bottom-left -->
  <polyline points="28,248 28,236 40,236" fill="none" stroke="#4A5240" stroke-width="1"/>
  <!-- Bottom-right (inside chamfer) -->
  <polyline points="228,248 228,236 216,236" fill="none" stroke="#4A5240" stroke-width="1"/>

  <!-- === AMBER CORNER ACCENT (top-right, bottom-left — tactical indicator) === -->
  <!-- Top-right: small 3px amber dot -->
  <rect x="248" y="4" width="4" height="4" fill="#F5A623"/>
  <!-- Bottom-left -->
  <rect x="4" y="248" width="4" height="4" fill="#F5A623"/>

  <!-- === HEADER ZONE VISUAL CUE (top 40px, very subtle tint) === -->
  <rect x="3" y="3" width="250" height="37" fill="#1C2B3A" fill-opacity="0.4"/>

</svg>
