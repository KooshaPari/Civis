name: Quality Gate

# Local-first: PRs use quality.yml + pr-governance-gate only.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@stable
      - name: Run 9-gate quality system
        env:
          QUALITY_GATE_ALL_FILES: "true"
        run: bash scripts/quality/quality-gate.sh
