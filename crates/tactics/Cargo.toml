[package]
name = "civ-tactics"
description = "Tactical voxel-destructible combat (per-soldier) + doctrine evolution genetic-algo"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
rand = "0.8.6"
rand_chacha = "0.3"
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
civ-voxel = { path = "../voxel" }
civ-agents = { path = "../agents" }
diplomacy = { package = "civ-diplomacy", path = "../diplomacy" }
legends = { package = "civ-legends", path = "../legends" }

[dev-dependencies]
proptest = "1.11"
