<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civis Dashboard</title>
    <script>
      (function () {
        var t = localStorage.getItem("data-theme") || localStorage.getItem("civis-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
