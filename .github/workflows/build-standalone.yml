name: Build Bevy Standalone Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - feat/civis-platform
    paths:
      - "clients/bevy-ref/**"

permissions:
  contents: read

jobs:
  build-standalone:
    name: build civ-standalone (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-all-crates: true
      - name: Build civ-standalone
        run: cargo build --release -p civ-bevy-ref --bin civ-standalone --features bevy,egui
      - name: Package executable + assets
        run: |
          New-Item -ItemType Directory -Path artifact | Out-Null
          Copy-Item -Path target/release/civ-standalone.exe -Destination artifact/civ-standalone.exe
          Copy-Item -Path clients/bevy-ref/assets -Destination artifact/assets -Recurse
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: civ-standalone-windows
          path: |
            artifact/civ-standalone.exe
            artifact/assets
