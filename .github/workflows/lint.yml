name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4 
        with:
          dotnet-version: |
            11.0.x
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln

      - name: Check formatting
        run: dotnet format src/DINOForge.CI.NoRuntime.sln --verify-no-changes --verbosity diagnostic
