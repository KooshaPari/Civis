<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <!--
    Civis wordmark — "Console Holo" design language (docs/design/ui-design-language.md).
    Graphite plate, the voxel-world app glyph as the lockup mark, CIVIS in a
    Geist-style sans (system fallback) with an electric-green active underline +
    holo-cyan hairline, uppercase tracked tagline. Restrained neon (edge only).
    License: hand-authored for Civis — project-owned.
  -->
  <defs>
    <linearGradient id="wmPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12161D"/>
      <stop offset="1" stop-color="#0A0D12"/>
    </linearGradient>
    <linearGradient id="wmNeonFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DF07A" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1E7A45" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="wmNeon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wmHolo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="640" height="180" rx="18" fill="url(#wmPlate)"/>
  <rect x="0.5" y="0.5" width="639" height="179" rx="17.5" fill="none"
        stroke="#4A5564" stroke-opacity="0.35" stroke-width="1"/>

  <!-- ── app glyph mark (left) ── -->
  <g transform="translate(40,30) scale(0.47)" filter="url(#wmNeon)">
    <ellipse cx="128" cy="132" rx="78" ry="30" fill="none"
             stroke="#7FE9FF" stroke-opacity="0.4" stroke-width="3"/>
    <polygon points="128,178 76,150 128,122 180,150" fill="url(#wmNeonFace)"
             stroke="#3DF07A" stroke-width="5" stroke-linejoin="round"/>
    <polygon points="76,150 76,168 128,196 128,178" fill="#0A0D12"
             stroke="#1E7A45" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="180,150 180,168 128,196 128,178" fill="#05070A"
             stroke="#1E7A45" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="128,140 92,121 128,102 164,121" fill="url(#wmNeonFace)"
             stroke="#3DF07A" stroke-width="4.6" stroke-linejoin="round"/>
    <polygon points="92,121 92,135 128,154 128,140" fill="#0A0D12"
             stroke="#1E7A45" stroke-width="3.6" stroke-linejoin="round"/>
    <polygon points="164,121 164,135 128,154 128,140" fill="#05070A"
             stroke="#1E7A45" stroke-width="3.6" stroke-linejoin="round"/>
    <polygon points="128,108 108,97 128,86 148,97" fill="url(#wmNeonFace)"
             stroke="#3DF07A" stroke-width="4.4" stroke-linejoin="round"/>
  </g>
  <line x1="100" y1="42" x2="100" y2="20" stroke="#7FE9FF" stroke-width="3"
        stroke-linecap="round" filter="url(#wmHolo)" opacity="0.9"/>
  <circle cx="100" cy="18" r="5" fill="#7FE9FF" filter="url(#wmHolo)"/>

  <!-- ── wordmark (Geist-style sans; system fallback chain) ── -->
  <text x="170" y="106"
        font-family="'Geist','Inter','Segoe UI',system-ui,'Helvetica Neue',Arial,sans-serif"
        font-size="78" font-weight="700" letter-spacing="6"
        fill="#ECEFF4">CIVIS</text>

  <!-- electric-green active underline + holo-cyan hairline -->
  <rect x="172" y="120" width="298" height="3" rx="1.5" fill="#3DF07A"/>
  <rect x="172" y="127" width="298" height="1.2" rx="0.6" fill="#7FE9FF" opacity="0.7"/>

  <!-- uppercase tracked tagline -->
  <text x="174" y="150"
        font-family="'Geist Mono','JetBrains Mono','SFMono-Regular',Consolas,monospace"
        font-size="13" font-weight="500" letter-spacing="5"
        fill="#9AA4B2">CIVILISATION SANDBOX</text>

  <!-- corner registration ticks (console motif) -->
  <g stroke="#3DF07A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round">
    <polyline points="22,14 12,14 12,24"/>
    <polyline points="618,14 628,14 628,24"/>
    <polyline points="22,166 12,166 12,156"/>
    <polyline points="618,166 628,166 628,156"/>
  </g>
</svg>
