name: test-isolation

# Pattern #93 detection gate — fails CI when any test class touches
# process-global state (env vars, working directory, class-static paths,
# named pipes / TCP ports) without opting into the appropriate
# [Collection(...)], or sets a production-prefixed env-var
# (DINOFORGE_<not TEST_>...). Allowlist lives at
# docs/qa/global-state-allowlist.txt.
#
# Companion: scripts/ci/detect_global_state_tests.py (run with --self-test
# for spec). Policy: docs/qa/test-isolation-policy.md.
# Cross-reference: tasks #93/#255/#256/#257.

on:
  pull_request:
    paths:
      - "src/Tests/**"
      - "scripts/ci/detect_global_state_tests.py"
      - "docs/qa/global-state-allowlist.txt"
      - "docs/qa/test-isolation-policy.md"
      - ".github/workflows/test-isolation.yml"
  push:
    branches: [main]
    paths:
      - "src/Tests/**"
      - "scripts/ci/detect_global_state_tests.py"
      - "docs/qa/global-state-allowlist.txt"
      - "docs/qa/test-isolation-policy.md"
      - ".github/workflows/test-isolation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-isolation-check:
    name: Pattern #93 detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Self-test the gate
        run: python scripts/ci/detect_global_state_tests.py --self-test

      - name: Run test-isolation gate
        run: python scripts/ci/detect_global_state_tests.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: global-state-report
          path: docs/qa/global-state-report.json
          if-no-files-found: warn
          retention-days: 14
