<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | role-infantry.svg | 64x64 monochrome glyph -->
<!-- Palette: primary #EDE8DC on transparent; stroke #EDE8DC -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Head -->
  <circle cx="32" cy="11" r="6" fill="#EDE8DC"/>
  <!-- Helmet brim -->
  <rect x="25" y="15" width="14" height="3" rx="1" fill="#EDE8DC"/>
  <!-- Torso -->
  <rect x="27" y="18" width="10" height="14" fill="#EDE8DC"/>
  <!-- Left arm -->
  <rect x="21" y="18" width="6" height="10" rx="2" fill="#EDE8DC"/>
  <!-- Right arm (extended forward, holding rifle) -->
  <rect x="37" y="18" width="6" height="10" rx="2" fill="#EDE8DC"/>
  <!-- Legs -->
  <rect x="27" y="32" width="4" height="14" rx="2" fill="#EDE8DC"/>
  <rect x="33" y="32" width="4" height="14" rx="2" fill="#EDE8DC"/>
  <!-- Boots -->
  <rect x="25" y="44" width="7" height="4" rx="1" fill="#EDE8DC"/>
  <rect x="32" y="44" width="7" height="4" rx="1" fill="#EDE8DC"/>
  <!-- Rifle (diagonal 45 degrees, from right shoulder upward) -->
  <!-- Barrel: line from (43,18) to (55,6) -->
  <line x1="43" y1="22" x2="57" y2="8" stroke="#EDE8DC" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Rifle body/stock -->
  <rect x="37" y="20" width="10" height="4" rx="1" transform="rotate(-45 42 22)" fill="#EDE8DC"/>
</svg>
