name: Game Automation Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/automation/**'
      - 'scripts/start-mcp.ps1'
  schedule:
    # Run daily at 2 AM UTC (9 PM EST)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      instance_count:
        description: 'Number of game instances to test'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
      test_duration:
        description: 'Test duration in seconds'
        required: false
        default: '60'

permissions:
  contents: read
  checks: write

jobs:
  parallel-automation:
    name: Parallel Game Automation (${{ matrix.instances }} instances)
    runs-on: windows-latest
    timeout-minutes: 20

    strategy:
      matrix:
        instances: [1, 2, 4]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@6bd8b7f7d58d76bb371f91465f0c7d208eccb313 # v4.0.0
        with:
          dotnet-version: '11.0.x'
          include-prerelease: true

      - name: Verify .NET installation
        run: |
          dotnet --version
          dotnet --info

      - name: Setup game environment
        run: |
          Write-Host "Setting up game paths..." -ForegroundColor Cyan
          $gamePath = "G:\SteamLibrary\steamapps\common\Diplomacy is Not an Option"
          if (Test-Path $gamePath) {
            Write-Host "✓ Game found at: $gamePath" -ForegroundColor Green
          } else {
            Write-Host "⚠ Game not found at expected path" -ForegroundColor Yellow
            Write-Host "Creating mock environment for testing..." -ForegroundColor Yellow
            New-Item -ItemType Directory -Path $gamePath -Force | Out-Null
            New-Item -ItemType File -Path "$gamePath\Diplomacy is Not an Option.exe" -Force | Out-Null
          }
        shell: powershell

      - name: Start MCP server
        run: |
          Write-Host "Starting MCP server..." -ForegroundColor Cyan

          # Change to MCP directory
          Push-Location src/Tools/DinoforgeMcp

          # Start MCP in background (detached)
          $mcpProcess = Start-Process -FilePath python `
            -ArgumentList "-m dinoforge_mcp.server" `
            -NoNewWindow `
            -PassThru

          Write-Host "MCP process started: $($mcpProcess.Id)" -ForegroundColor Green

          # Wait for server to start
          $maxRetries = 15
          $retryCount = 0
          while ($retryCount -lt $maxRetries) {
            try {
              $health = Invoke-WebRequest -Uri "http://127.0.0.1:8765/health" `
                -TimeoutSec 2 -ErrorAction Stop
              if ($health.StatusCode -eq 200) {
                Write-Host "✓ MCP server is running" -ForegroundColor Green
                break
              }
            } catch {
              $retryCount++
              Start-Sleep -Seconds 1
            }
          }

          if ($retryCount -ge $maxRetries) {
            Write-Host "✗ MCP server failed to start" -ForegroundColor Red
            exit 1
          }

          Pop-Location
        shell: powershell
        timeout-minutes: 2

      - name: Run parallel automation test
        run: |
          Write-Host "Running parallel automation test..." -ForegroundColor Cyan

          $testDuration = if ('${{ github.event.inputs.test_duration }}' -ne '') {
            [int]'${{ github.event.inputs.test_duration }}'
          } else {
            60
          }

          $instanceCount = if ('${{ matrix.instances }}' -ne '') {
            [int]'${{ matrix.instances }}'
          } else {
            2
          }

          Write-Host "Test parameters: $instanceCount instances, ${testDuration}s duration" -ForegroundColor Cyan

          # Run test
          & .\scripts\automation\Test-ParallelAutomation.ps1 `
            -InstanceCount $instanceCount `
            -TestDurationSeconds $testDuration `
            -Verbose

          $exitCode = $LASTEXITCODE
          Write-Host "Test exit code: $exitCode" -ForegroundColor Cyan
          exit $exitCode
        shell: powershell
        timeout-minutes: 10

      - name: Verify game state
        if: success()
        run: |
          Write-Host "Verifying game state..." -ForegroundColor Cyan

          & .\scripts\automation\Verify-GameState.ps1 `
            -InstanceCount 2 `
            -TestDurationSeconds 30 `
            -Verbose
        shell: powershell
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: game-automation-screenshots-${{ matrix.instances }}-instances
          path: docs/automation/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: game-automation-logs-${{ matrix.instances }}-instances
          path: |
            docs/automation/logs/
            *.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Report test results
        if: always()
        run: |
          Write-Host "=== Test Summary ===" -ForegroundColor Cyan
          Write-Host "Instance count: ${{ matrix.instances }}"
          Write-Host "Status: ${{ job.status }}"
          if ('${{ job.status }}' -eq 'success') {
            Write-Host "✓ All tests passed" -ForegroundColor Green
          } else {
            Write-Host "✗ Some tests failed" -ForegroundColor Red
          }
        shell: powershell

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [parallel-automation]

    steps:
      - name: Generate summary
        run: |
          echo "## Game Automation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Instance Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | ${{ needs.parallel-automation.outputs.test_1_result || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | ${{ needs.parallel-automation.outputs.test_2_result || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | ${{ needs.parallel-automation.outputs.test_4_result || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Screenshots uploaded" >> $GITHUB_STEP_SUMMARY
          echo "- Logs uploaded" >> $GITHUB_STEP_SUMMARY

      - name: Set job status
        if: needs.parallel-automation.result == 'failure'
        run: exit 1
