<?xml version="1.0" encoding="UTF-8"?>
<!--
  DINOForge Warfare: Clone Wars — Main Menu Title Lockup
  File: logo-title.svg
  ViewBox: 0 0 1600 600

  ORIGINAL FAN-ART — DINOForge project (github.com/KooshaPari/Dino)
  This is an original geometric composition created for the DINOForge mod platform.
  Not affiliated with or endorsed by Lucasfilm Ltd. or The Walt Disney Company.
  Star Wars and related marks are trademarks of their respective owners.
  All geometry is original; no copyrighted assets, fonts, or logotypes have been
  reproduced or traced. Color #FFE81F is a hex value, not a protected trademark.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1600 600"
     width="1600" height="600"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Starfield / background gradient -->
    <radialGradient id="bgNebula" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#0B1B3A" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#05080F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#05060A" stop-opacity="1"/>
    </radialGradient>

    <!-- Gold perspective gradient: bright at bottom, muted at top (depth sell) -->
    <linearGradient id="goldPerspective" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#FFE81F"/>
      <stop offset="55%"  stop-color="#D4BF18"/>
      <stop offset="100%" stop-color="#7A6E12"/>
    </linearGradient>

    <!-- Supertitle gold (flat, smaller) -->
    <linearGradient id="goldFlat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFE81F"/>
      <stop offset="100%" stop-color="#B8A415"/>
    </linearGradient>

    <!-- Gold outer glow filter -->
    <filter id="goldGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#FFE81F" flood-opacity="0.28" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dark bevel / edge shadow filter -->
    <filter id="darkBevel" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#1A1A05" flood-opacity="0.85"/>
    </filter>

    <!-- Republic cog symbol (8-tooth gear), centered at 0,0, r≈26 -->
    <symbol id="repCog" viewBox="-32 -32 64 64">
      <!-- Gear body ring -->
      <circle cx="0" cy="0" r="16" fill="#FFE81F" stroke="#B8A415" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="8"  fill="#05060A"/>
      <!-- 8 gear teeth as rotated rounded rects -->
      <g fill="#FFE81F">
        <rect x="-4" y="-28" width="8" height="12" rx="2"/>
        <rect x="-4" y="-28" width="8" height="12" rx="2" transform="rotate(45)"/>
        <rect x="-4" y="-28" width="8" height="12" rx="2" transform="rotate(90)"/>
        <rect x="-4" y="-28" width="8" height="12" rx="2" transform="rotate(135)"/>
        <rect x="-4" y="-28" width="8" height="12" rx="2" transform="rotate(180)"/>
        <rect x="-4" y="-28" width="8" height="12" rx="2" transform="rotate(225)"/>
        <rect x="-4" y="-28" width="8" height="12" rx="2" transform="rotate(270)"/>
        <rect x="-4" y="-28" width="8" height="12" rx="2" transform="rotate(315)"/>
      </g>
    </symbol>

    <!-- CIS hex symbol (hexagon with inner honeycomb dots), centered at 0,0, r≈26 -->
    <symbol id="cisHex" viewBox="-32 -32 64 64">
      <!-- Outer hexagon -->
      <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
               fill="#D99A3C" stroke="#9A6B2F" stroke-width="1.5"/>
      <!-- Inner smaller hexagon cutout area -->
      <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7"
               fill="#05060A"/>
      <!-- 7 honeycomb dots (center + 6 around) -->
      <circle cx="0"    cy="0"    r="3" fill="#D99A3C"/>
      <circle cx="0"    cy="-9"   r="2.2" fill="#9A6B2F"/>
      <circle cx="7.8"  cy="-4.5" r="2.2" fill="#9A6B2F"/>
      <circle cx="7.8"  cy="4.5"  r="2.2" fill="#9A6B2F"/>
      <circle cx="0"    cy="9"    r="2.2" fill="#9A6B2F"/>
      <circle cx="-7.8" cy="4.5"  r="2.2" fill="#9A6B2F"/>
      <circle cx="-7.8" cy="-4.5" r="2.2" fill="#9A6B2F"/>
    </symbol>

    <!-- Clipping rect for the whole canvas -->
    <clipPath id="canvasClip">
      <rect x="0" y="0" width="1600" height="600"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 0 — Background
  ═══════════════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="1600" height="600" fill="url(#bgNebula)"/>

  <!-- Starfield: static star dots of varying size/opacity -->
  <g fill="#F5F7FA" clip-path="url(#canvasClip)">
    <!-- Scattered star points, hand-placed for even distribution -->
    <circle cx="48"   cy="22"  r="1.1" opacity="0.85"/>
    <circle cx="132"  cy="57"  r="0.8" opacity="0.6"/>
    <circle cx="210"  cy="14"  r="1.3" opacity="0.9"/>
    <circle cx="285"  cy="82"  r="0.7" opacity="0.55"/>
    <circle cx="370"  cy="35"  r="1.0" opacity="0.75"/>
    <circle cx="450"  cy="10"  r="0.9" opacity="0.7"/>
    <circle cx="530"  cy="68"  r="1.2" opacity="0.8"/>
    <circle cx="615"  cy="28"  r="0.7" opacity="0.6"/>
    <circle cx="700"  cy="50"  r="1.4" opacity="0.9"/>
    <circle cx="780"  cy="12"  r="0.8" opacity="0.65"/>
    <circle cx="860"  cy="75"  r="1.1" opacity="0.75"/>
    <circle cx="945"  cy="30"  r="0.9" opacity="0.7"/>
    <circle cx="1025" cy="18"  r="1.3" opacity="0.85"/>
    <circle cx="1110" cy="62"  r="0.7" opacity="0.55"/>
    <circle cx="1195" cy="40"  r="1.0" opacity="0.8"/>
    <circle cx="1280" cy="20"  r="0.8" opacity="0.65"/>
    <circle cx="1365" cy="55"  r="1.2" opacity="0.75"/>
    <circle cx="1450" cy="8"   r="1.0" opacity="0.9"/>
    <circle cx="1540" cy="45"  r="0.7" opacity="0.6"/>
    <circle cx="80"   cy="150" r="0.9" opacity="0.7"/>
    <circle cx="165"  cy="110" r="1.1" opacity="0.8"/>
    <circle cx="255"  cy="135" r="0.6" opacity="0.5"/>
    <circle cx="340"  cy="165" r="1.0" opacity="0.75"/>
    <circle cx="425"  cy="120" r="0.8" opacity="0.65"/>
    <circle cx="510"  cy="155" r="1.3" opacity="0.85"/>
    <circle cx="595"  cy="100" r="0.7" opacity="0.6"/>
    <circle cx="680"  cy="140" r="1.1" opacity="0.78"/>
    <circle cx="770"  cy="115" r="0.9" opacity="0.72"/>
    <circle cx="855"  cy="160" r="0.7" opacity="0.55"/>
    <circle cx="940"  cy="105" r="1.4" opacity="0.9"/>
    <circle cx="1030" cy="145" r="0.8" opacity="0.65"/>
    <circle cx="1120" cy="125" r="1.0" opacity="0.78"/>
    <circle cx="1205" cy="90"  r="0.6" opacity="0.52"/>
    <circle cx="1290" cy="150" r="1.1" opacity="0.82"/>
    <circle cx="1380" cy="110" r="0.9" opacity="0.7"/>
    <circle cx="1465" cy="135" r="0.7" opacity="0.58"/>
    <circle cx="1555" cy="95"  r="1.2" opacity="0.8"/>
    <circle cx="60"   cy="555" r="0.8" opacity="0.6"/>
    <circle cx="150"  cy="520" r="1.0" opacity="0.75"/>
    <circle cx="240"  cy="570" r="0.7" opacity="0.55"/>
    <circle cx="320"  cy="540" r="1.2" opacity="0.85"/>
    <circle cx="410"  cy="510" r="0.9" opacity="0.7"/>
    <circle cx="495"  cy="558" r="0.6" opacity="0.5"/>
    <circle cx="575"  cy="525" r="1.1" opacity="0.8"/>
    <circle cx="660"  cy="545" r="0.8" opacity="0.65"/>
    <circle cx="745"  cy="515" r="1.3" opacity="0.88"/>
    <circle cx="830"  cy="565" r="0.7" opacity="0.58"/>
    <circle cx="920"  cy="530" r="1.0" opacity="0.75"/>
    <circle cx="1005" cy="555" r="0.9" opacity="0.72"/>
    <circle cx="1090" cy="520" r="0.6" opacity="0.52"/>
    <circle cx="1175" cy="560" r="1.1" opacity="0.82"/>
    <circle cx="1260" cy="510" r="0.8" opacity="0.65"/>
    <circle cx="1345" cy="545" r="1.0" opacity="0.78"/>
    <circle cx="1430" cy="525" r="0.7" opacity="0.58"/>
    <circle cx="1520" cy="560" r="1.2" opacity="0.85"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 1 — Supertitle: "DINOFORGE PRESENTS" (small, centered, flat)
       Position: centered at x=800, y≈135
  ═══════════════════════════════════════════════════════════════ -->
  <g filter="url(#goldGlow)">
    <!-- Supertitle text rendered as spaced letter-form bars (geometric sans approximation) -->
    <!-- "DINOFORGE PRESENTS" — rendered as a stylized bar-letter composition -->
    <!-- Each letter approximated with rect/path primitives in Orbitron style -->

    <!-- We render the supertitle as a centered text element using system geometric fallback,
         styled to approximate Orbitron. The SVG text element is used for clarity and
         downstream font substitution. -->
    <text
      x="800" y="148"
      font-family="Orbitron, 'Saira Condensed', 'Arial Black', sans-serif"
      font-size="28"
      font-weight="700"
      letter-spacing="10"
      text-anchor="middle"
      fill="url(#goldFlat)"
      opacity="0.82">DINOFORGE PRESENTS</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 2 — Main perspective wordmark trapezoid
       "CLONE WARS" in trapezoidal perspective tilt
       Bottom width ~1180px centered, top compressed to ~540px
       Bottom baseline y≈430, top of letters y≈220
  ═══════════════════════════════════════════════════════════════ -->

  <!-- Perspective trapezoid clip: bottom-wide, top-narrow, centered at x=800 -->
  <defs>
    <clipPath id="trapClip">
      <!-- Bottom corners: 210,430 and 1390,430 (width 1180) -->
      <!-- Top corners:  630,220 and  970,220 (width  340) -->
      <polygon points="210,430 1390,430 970,220 630,220"/>
    </clipPath>
  </defs>

  <!-- Main wordmark fill block (trapezoidal gold plate behind letters) -->
  <polygon points="195,435 1405,435 985,215 615,215"
           fill="url(#goldPerspective)"
           opacity="0.08"/>

  <!-- "CLONE WARS" — rendered as geometric bar letters in perspective.
       We use SVG text with a skew/scale transform that approximates the trapezoid tilt.
       The transform: scale(1, 0.72) + perspective skewX on the text group.
       Letters sit on perspective baseline. -->

  <!-- Outer glow pass (blurred duplicate) -->
  <g opacity="0.35" filter="url(#darkBevel)">
    <text
      x="800" y="418"
      font-family="Orbitron, 'Arial Black', Impact, sans-serif"
      font-size="188"
      font-weight="900"
      letter-spacing="-2"
      text-anchor="middle"
      fill="#FFE81F"
      transform="translate(0,0) scale(1,1)">CLONE WARS</text>
  </g>

  <!-- Main gold text — perspective illusion via horizontal squeeze at top using a gradient mask -->
  <g filter="url(#goldGlow)">
    <text
      x="800" y="418"
      font-family="Orbitron, 'Arial Black', Impact, sans-serif"
      font-size="188"
      font-weight="900"
      letter-spacing="-2"
      text-anchor="middle"
      fill="url(#goldPerspective)">CLONE WARS</text>
  </g>

  <!-- Dark bevel stroke pass -->
  <text
    x="800" y="418"
    font-family="Orbitron, 'Arial Black', Impact, sans-serif"
    font-size="188"
    font-weight="900"
    letter-spacing="-2"
    text-anchor="middle"
    fill="none"
    stroke="#1A1A05"
    stroke-width="2.5"
    opacity="0.65">CLONE WARS</text>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 3 — Subtitle: "GALACTIC CONFLICT"
       Centered below main wordmark, flat baseline
  ═══════════════════════════════════════════════════════════════ -->
  <g filter="url(#goldGlow)">
    <text
      x="800" y="492"
      font-family="'Saira Condensed', 'Saira', Orbitron, sans-serif"
      font-size="40"
      font-weight="600"
      letter-spacing="18"
      text-anchor="middle"
      fill="url(#goldFlat)"
      opacity="0.9">GALACTIC CONFLICT</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 4 — Underline rule + faction endcaps
       Rule: y=520, from x≈220 to x≈1380, 2px gold
       Left endcap: Republic Cog at (220, 520)
       Right endcap: CIS Hex at (1380, 520)
  ═══════════════════════════════════════════════════════════════ -->

  <!-- Left arm: x=252 to x=740 -->
  <line x1="258" y1="520" x2="735" y2="520"
        stroke="#FFE81F" stroke-width="2" opacity="0.85"/>

  <!-- Small center diamond spacer -->
  <polygon points="800,511 810,520 800,529 790,520"
           fill="#FFE81F" opacity="0.9"/>

  <!-- Right arm: x=865 to x=1350 -->
  <line x1="865" y1="520" x2="1342" y2="520"
        stroke="#FFE81F" stroke-width="2" opacity="0.85"/>

  <!-- Republic Cog endcap — left -->
  <use href="#repCog" x="224" y="494" width="52" height="52"/>

  <!-- CIS Hex endcap — right -->
  <use href="#cisHex" x="1324" y="494" width="52" height="52"/>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 5 — Trademark disclaimer footnote
  ═══════════════════════════════════════════════════════════════ -->
  <text
    x="800" y="582"
    font-family="'Exo 2', Exo2, 'Titillium Web', sans-serif"
    font-size="13"
    letter-spacing="1.5"
    text-anchor="middle"
    fill="#8B93A1"
    opacity="0.7">Unofficial fan project. Not affiliated with or endorsed by Lucasfilm Ltd. or The Walt Disney Company.</text>

</svg>
