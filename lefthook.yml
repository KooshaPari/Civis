# lefthook.yml — Fleet-wide git hook configuration
# This config uses caching optimizations for commit/push hooks
# For the strictest check, run: ./grade.sh (or just grade)

pre-commit:
  parallel: true
  commands:
    editorconfig:
      run: git diff --cached --name-only | xargs -n1 test -f && echo "Checking editorconfig..."
      skip:
        - merge
        - rebase
    lint:
      run: |
        # Only lint changed files (caching optimization)
        CHANGED=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(rs|ts|tsx|py|go)$' || true)
        if [ -n "$CHANGED" ]; then
          echo "$CHANGED" | xargs -n1 dirname | sort -u | while read dir; do
            if [ -f "$dir/Cargo.toml" ]; then
              cd "$dir" && cargo fmt -- --check && cargo clippy -- -D warnings
            elif [ -f "$dir/package.json" ]; then
              cd "$dir" && npx eslint --ext .ts,.tsx . 2>/dev/null || true
            elif [ -f "$dir/pyproject.toml" ]; then
              cd "$dir" && ruff check . 2>/dev/null || true
            elif [ -f "$dir/go.mod" ]; then
              cd "$dir" && go vet ./... 2>/dev/null || true
            fi
            cd - > /dev/null
          done
        fi
      skip:
        - merge
        - rebase
    test-fast:
      run: |
        # Only run tests for changed packages (caching optimization)
        CHANGED=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(rs|ts|tsx|py|go)$' || true)
        if [ -n "$CHANGED" ]; then
          # Run task grade-fast for affected areas
          if [ -f "Justfile" ]; then
            just grade-fast 2>/dev/null || true
          elif [ -f "Taskfile.yml" ]; then
            task grade-fast 2>/dev/null || true
          fi
        fi
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    conventional:
      # Logic lives in scripts/check-commit-msg.sh — keeping (, ), | out of the inline hook avoids
      # cmd.exe pre-parsing them on Windows (lefthook runs hooks via cmd.exe -> sh).
      run: sh scripts/check-commit-msg.sh {1}

pre-push:
  parallel: false
  commands:
    build:
      priority: 1
      run: dotnet build src/DINOForge.CI.NoRuntime.sln -c Release --verbosity minimal

    test-unit:
      priority: 2
      env:
        CI: "true"
        GameInstalled: "false"
      run: dotnet test src/Tests/DINOForge.Tests.csproj -c Release --verbosity normal

    test-integration:
      priority: 3
      # DINO_DISABLE_TEST_LAUNCH=1 prevents fixtures (GameFixture, GameTestFixture,
      # LiveGameIntegrationTests, GameSandboxIntegrationTests) from launching the
      # game during pre-push. All consumers skip gracefully via _gameAvailable /
      # _infrastructureAvailable guards, avoiding ConnectAsync-cancellation OCE
      # escapes that previously broke VSTestTask (iter-144 wave-1 push fix).
      #
      # NOTE: Integration csproj is NOT in DINOForge.CI.NoRuntime.sln, so the
      # `build` step above does not produce its artifacts. We omit --no-build
      # here so `dotnet test` restores+compiles the Integration project (and
      # its transitive deps) on demand. Iter-144 P0 push-blocker fix.
      env:
        DINO_DISABLE_TEST_LAUNCH: "1"
      run: dotnet test src/Tests/Integration/DINOForge.Tests.Integration.csproj -c Release --verbosity normal
