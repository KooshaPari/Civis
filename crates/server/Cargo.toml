[package]
name = "civ-server"
description = "Server application for the CivLab deterministic simulation engine"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
civ-engine = { path = "../engine", version = "0.1.0" }
civ-voxel = { path = "../voxel" }
civ-protocol-3d = { path = "../protocol-3d" }
thiserror = "1"

[lib]
path = "src/lib.rs"

[[bin]]
name = "civ-server"
path = "src/main.rs"

[dev-dependencies]
proptest = "1.4"
