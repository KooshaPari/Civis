name: Polyglot Build

on:
  push:
    branches: [main]
    paths:
      - 'src/Tools/AssetPipelineRust/**'
      - 'src/Tools/DependencyResolver/**'
      - 'src/Tools/AssetPipelineZig/**'
      - 'src/Tools/DinoforgeMcp/**'
      - '.github/workflows/polyglot-build.yml'
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-rust:
    name: Build Rust Asset Pipeline - ${{ matrix.runner }}
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runner: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            artifact-name: libdinoforge_asset_pipeline.so
          - os: ubuntu-24.04-arm64
            runner: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            artifact-name: libdinoforge_asset_pipeline.so
          - os: windows-latest
            runner: windows-x64
            rust-target: x86_64-pc-windows-msvc
            artifact-name: dinoforge_asset_pipeline.dll
          - os: macos-latest
            runner: macos-arm64
            rust-target: aarch64-apple-darwin
            artifact-name: libdinoforge_asset_pipeline.dylib
          - os: macos-13
            runner: macos-x64
            rust-target: x86_64-apple-darwin
            artifact-name: libdinoforge_asset_pipeline.dylib
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.7
        with:
          workspaces: src/Tools/AssetPipelineRust

      - name: Build Rust library (release)
        working-directory: src/Tools/AssetPipelineRust
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Run Rust tests
        working-directory: src/Tools/AssetPipelineRust
        run: cargo test --release --target ${{ matrix.rust-target }}

      - name: Upload Rust artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rust-asset-pipeline-${{ matrix.runner }}
          path: src/Tools/AssetPipelineRust/target/${{ matrix.rust-target }}/release/${{ matrix.artifact-name }}
          if-no-files-found: warn
          retention-days: 30

  build-go:
    name: Build Go Dependency Resolver - ${{ matrix.runner }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runner: linux-x64
            go-os: linux
            go-arch: amd64
            binary-name: dinoforge-resolver
          - os: ubuntu-24.04-arm64
            runner: linux-arm64
            go-os: linux
            go-arch: arm64
            binary-name: dinoforge-resolver
          - os: windows-latest
            runner: windows-x64
            go-os: windows
            go-arch: amd64
            binary-name: dinoforge-resolver.exe
          - os: macos-latest
            runner: macos-arm64
            go-os: darwin
            go-arch: arm64
            binary-name: dinoforge-resolver
          - os: macos-13
            runner: macos-x64
            go-os: darwin
            go-arch: amd64
            binary-name: dinoforge-resolver
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: src/Tools/DependencyResolver/go.sum

      - name: Create output directory
        working-directory: src/Tools/DependencyResolver
        run: mkdir -p bin

      - name: Build Go binary
        working-directory: src/Tools/DependencyResolver
        env:
          GOOS: ${{ matrix.go-os }}
          GOARCH: ${{ matrix.go-arch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o bin/${{ matrix.binary-name }} main.go

      - name: Run Go tests
        working-directory: src/Tools/DependencyResolver
        run: go test -v ./...

      - name: Upload Go artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-resolver-${{ matrix.runner }}
          path: src/Tools/DependencyResolver/bin/${{ matrix.binary-name }}
          if-no-files-found: warn
          retention-days: 30

  build-zig:
    name: Build Zig Asset Pipeline - ${{ matrix.runner }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runner: linux-x64
            zig-target: x86_64-linux-gnu
            artifact-name: dinoforge_asset_pipeline_zig.so
          - os: ubuntu-24.04-arm64
            runner: linux-arm64
            zig-target: aarch64-linux-gnu
            artifact-name: dinoforge_asset_pipeline_zig.so
          - os: windows-latest
            runner: windows-x64
            zig-target: x86_64-windows-gnu
            artifact-name: dinoforge_asset_pipeline_zig.dll
          - os: macos-latest
            runner: macos-arm64
            zig-target: aarch64-macos
            artifact-name: dinoforge_asset_pipeline_zig.dylib
          - os: macos-13
            runner: macos-x64
            zig-target: x86_64-macos
            artifact-name: dinoforge_asset_pipeline_zig.dylib
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@7ab2955eb728f5440978d5824358023be3a2802d # v2.2.0
        with:
          version: master

      - name: Run Zig tests
        working-directory: src/Tools/AssetPipelineZig
        run: zig test src/root.zig

      - name: Build Zig library (release)
        working-directory: src/Tools/AssetPipelineZig
        run: zig build-lib -O ReleaseFast -dynamic -target ${{ matrix.zig-target }} src/root.zig

      - name: Create output directory
        working-directory: src/Tools/AssetPipelineZig
        run: mkdir -p zig-out/lib

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        working-directory: src/Tools/AssetPipelineZig
        shell: pwsh
        run: Move-Item -Path root.dll -Destination zig-out/lib/dinoforge_asset_pipeline_zig.dll -Force

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        working-directory: src/Tools/AssetPipelineZig
        run: |
          if [ -f root.so ]; then
            mv root.so zig-out/lib/dinoforge_asset_pipeline_zig.so
          elif [ -f root.dylib ]; then
            mv root.dylib zig-out/lib/dinoforge_asset_pipeline_zig.dylib
          fi

      - name: Upload Zig artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: zig-asset-pipeline-${{ matrix.runner }}
          path: src/Tools/AssetPipelineZig/zig-out/lib/
          if-no-files-found: warn
          retention-days: 30

  build-python:
    name: Build Python MCP Server - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'src/Tools/DinoforgeMcp/pyproject.toml'

      - name: Install dependencies
        working-directory: src/Tools/DinoforgeMcp
        run: pip install -e .[dev]

      - name: Run Python tests
        working-directory: src/Tools/DinoforgeMcp
        run: pytest tests/ -v --cov=dinoforge_mcp --cov-report=xml

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: src/Tools/DinoforgeMcp/coverage.xml
          if-no-files-found: warn
          retention-days: 30

  build-playcua:
    name: Build PlayCUA (Rust isolation layer)
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone PlayCUA repository
        run: |
          cd /tmp
          git clone https://github.com/KooshaPari/playcua.git
          cd playcua
          echo "PlayCUA cloned to /tmp/playcua"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.7
        with:
          workspaces: /tmp/playcua

      - name: Build PlayCUA (release)
        working-directory: /tmp/playcua
        run: cargo build --release

      - name: Run PlayCUA tests
        working-directory: /tmp/playcua
        run: cargo test --release

      - name: Prepare artifact
        run: |
          mkdir -p playcua-release
          if [ -f /tmp/playcua/target/release/playcua ]; then
            cp /tmp/playcua/target/release/playcua playcua-release/
          elif [ -f /tmp/playcua/target/release/playcua.exe ]; then
            cp /tmp/playcua/target/release/playcua.exe playcua-release/
          fi
          ls -lh playcua-release/

      - name: Upload PlayCUA artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playcua-release-ubuntu
          path: playcua-release/
          if-no-files-found: warn
          retention-days: 30

  verify-artifacts:
    name: Verify Polyglot Artifacts
    runs-on: ubuntu-latest
    needs: [build-rust, build-go, build-zig, build-python, build-playcua]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: polyglot-artifacts

      - name: Generate artifact inventory
        run: |
          echo "=== Polyglot Build Artifacts Inventory ===" > artifact-summary.txt
          echo "" >> artifact-summary.txt
          echo "Build Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> artifact-summary.txt
          echo "" >> artifact-summary.txt
          find polyglot-artifacts -type f -exec ls -lh {} \; | awk '{print $9, "(" $5 ")"}' >> artifact-summary.txt
          echo "" >> artifact-summary.txt
          echo "=== Platform Coverage ===" >> artifact-summary.txt
          echo "" >> artifact-summary.txt
          echo "Rust:" >> artifact-summary.txt
          ls -1 polyglot-artifacts/rust-asset-pipeline-* 2>/dev/null | sed 's/polyglot-artifacts\//  /' >> artifact-summary.txt || echo "  (none)" >> artifact-summary.txt
          echo "" >> artifact-summary.txt
          echo "Go:" >> artifact-summary.txt
          ls -1 polyglot-artifacts/go-resolver-* 2>/dev/null | sed 's/polyglot-artifacts\//  /' >> artifact-summary.txt || echo "  (none)" >> artifact-summary.txt
          echo "" >> artifact-summary.txt
          echo "Zig:" >> artifact-summary.txt
          ls -1 polyglot-artifacts/zig-asset-pipeline-* 2>/dev/null | sed 's/polyglot-artifacts\//  /' >> artifact-summary.txt || echo "  (none)" >> artifact-summary.txt
          echo "" >> artifact-summary.txt
          echo "Python:" >> artifact-summary.txt
          ls -1 polyglot-artifacts/python-coverage-* 2>/dev/null | sed 's/polyglot-artifacts\//  /' >> artifact-summary.txt || echo "  (none)" >> artifact-summary.txt
          echo "" >> artifact-summary.txt
          echo "PlayCUA:" >> artifact-summary.txt
          ls -1 polyglot-artifacts/playcua-release-* 2>/dev/null | sed 's/polyglot-artifacts\//  /' >> artifact-summary.txt || echo "  (none)" >> artifact-summary.txt
          cat artifact-summary.txt

      - name: Upload artifact summary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: polyglot-artifact-summary
          path: artifact-summary.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Verify artifact count
        run: |
          RUST_COUNT=$(find polyglot-artifacts -path "*rust-asset-pipeline-*" -type d | wc -l)
          GO_COUNT=$(find polyglot-artifacts -path "*go-resolver-*" -type d | wc -l)
          ZIG_COUNT=$(find polyglot-artifacts -path "*zig-asset-pipeline-*" -type d | wc -l)
          PYTHON_COUNT=$(find polyglot-artifacts -path "*python-coverage-*" -type d | wc -l)
          PLAYCUA_COUNT=$(find polyglot-artifacts -path "*playcua-release-*" -type d | wc -l)
          TOTAL=$((RUST_COUNT + GO_COUNT + ZIG_COUNT + PYTHON_COUNT + PLAYCUA_COUNT))
          echo "Rust artifacts: $RUST_COUNT"
          echo "Go artifacts: $GO_COUNT"
          echo "Zig artifacts: $ZIG_COUNT"
          echo "Python artifacts: $PYTHON_COUNT"
          echo "PlayCUA artifacts: $PLAYCUA_COUNT"
          echo "Total artifacts: $TOTAL"
          if [ "$TOTAL" -lt 16 ]; then
            echo "⚠ Warning: Expected at least 16 artifacts (5 Rust + 5 Go + 5 Zig + 3 Python + 1 PlayCUA)"
          else
            echo "✓ Good: Artifact collection complete"
          fi

  verify-integration:
    name: Verify C# Polyglot Integration
    runs-on: ubuntu-latest
    needs: [build-python]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@4d6c8fcf3c8f7a60068d26b594648e99df24cee3 # v4.0.0
        with:
          dotnet-version: |
            8.0.x
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln /p:RestoreLockedMode=true /p:GameInstalled=false

      - name: Build PackCompiler (tests polyglot integration)
        run: dotnet build src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj -c Release --no-restore

      - name: Run polyglot unit tests
        run: >
          dotnet test src/Tests/DINOForge.Tests.csproj -c Release
          -p:GameInstalled=false
          --no-restore
          --filter "FullyQualifiedName~SdkPolyglotIntegration"
          --verbosity normal

      - name: Verify AssetOptimizationService Zig integration
        continue-on-error: true
        run: >
          dotnet test src/Tests/DINOForge.Tests.csproj -c Release
          -p:GameInstalled=false
          --filter "FullyQualifiedName~AssetOptimization"
          --verbosity normal
