version: "3"

tasks:
  default:
    desc: Build the detected project
    cmds:
      - task: build

  build:
    desc: Build the detected project
    cmds:
      - |
        if ls *.sln >/dev/null 2>&1 || find . -name '*.csproj' -not -path './.git/*' | grep -q .; then
          dotnet build
        elif [ -f package.json ]; then
          if command -v bun >/dev/null 2>&1 && [ -f bun.lockb -o -f bun.lock ]; then
            bun run build
          else
            npm run build
          fi
        elif [ -f pyproject.toml ]; then
          python -m build
        elif [ -f go.mod ]; then
          go build ./...
        elif [ -f Cargo.toml ]; then
          cargo build
        elif [ -f pom.xml ]; then
          mvn package
        elif [ -f gradlew ]; then
          ./gradlew build
        elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
          gradle build
        elif [ -f Makefile ]; then
          make build
        else
          echo "No build target detected."
        fi

  test:
    desc: Run tests for the detected project
    cmds:
      - |
        if ls *.sln >/dev/null 2>&1 || find . -name '*.csproj' -not -path './.git/*' | grep -q .; then
          dotnet test
        elif [ -f package.json ]; then
          if command -v bun >/dev/null 2>&1 && [ -f bun.lockb -o -f bun.lock ]; then
            bun test
          else
            npm test
          fi
        elif [ -f pyproject.toml ]; then
          pytest
        elif [ -f go.mod ]; then
          go test ./...
        elif [ -f Cargo.toml ]; then
          cargo test
        elif [ -f pom.xml ]; then
          mvn test
        elif [ -f gradlew ]; then
          ./gradlew test
        elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
          gradle test
        elif [ -f Makefile ]; then
          make test
        else
          echo "No test target detected."
        fi

  lint:
    desc: Run lint checks for the detected project
    cmds:
      - |
        if ls *.sln >/dev/null 2>&1 || find . -name '*.csproj' -not -path './.git/*' | grep -q .; then
          dotnet format --verify-no-changes
        elif [ -f package.json ]; then
          if command -v bun >/dev/null 2>&1 && [ -f bun.lockb -o -f bun.lock ]; then
            bun run lint
          else
            npm run lint
          fi
        elif [ -f pyproject.toml ]; then
          ruff check .
        elif [ -f go.mod ]; then
          go vet ./...
        elif [ -f Cargo.toml ]; then
          cargo clippy --all-targets --all-features -- -D warnings
        elif [ -f pom.xml ]; then
          mvn verify
        elif [ -f gradlew ]; then
          ./gradlew check
        elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
          gradle check
        elif [ -f Makefile ]; then
          make lint
        else
          echo "No lint target detected."
        fi

  clean:
    desc: Clean build outputs
    cmds:
      - |
        if ls *.sln >/dev/null 2>&1 || find . -name '*.csproj' -not -path './.git/*' | grep -q .; then
          dotnet clean
        elif [ -f package.json ]; then
          rm -rf dist build .next coverage
        elif [ -f pyproject.toml ]; then
          rm -rf build dist *.egg-info .pytest_cache .ruff_cache
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
        elif [ -f go.mod ]; then
          go clean
        elif [ -f Cargo.toml ]; then
          cargo clean
        elif [ -f pom.xml ]; then
          mvn clean
        elif [ -f gradlew ]; then
          ./gradlew clean
        elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
          gradle clean
        elif [ -f Makefile ]; then
          make clean
        else
          echo "No clean target detected."
        fi
