<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- connecting line (arc) between nodes -->
  <path d="M14,32 Q32,14 50,32" stroke="#50C8F0" stroke-width="2" fill="none" stroke-dasharray="4 3" opacity="0.7"/>
  <path d="M14,32 Q32,50 50,32" stroke="#E8B84B" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- left node -->
  <circle cx="14" cy="32" r="7" fill="#0d1628" stroke="#50C8F0" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="14" cy="32" r="3" fill="#50C8F0" opacity="0.6"/>
  <!-- right node -->
  <circle cx="50" cy="32" r="7" fill="#0d1628" stroke="#50C8F0" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="50" cy="32" r="3" fill="#50C8F0" opacity="0.6"/>
  <!-- center mediator node (gold) -->
  <circle cx="32" cy="24" r="6" fill="#0d1628" stroke="#E8B84B" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="32" cy="24" r="2.5" fill="#E8B84B" opacity="0.8"/>
  <!-- lines from center to nodes -->
  <line x1="32" y1="30" x2="14" y2="32" stroke="#50C8F0" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="30" x2="50" y2="32" stroke="#50C8F0" stroke-width="1.5" opacity="0.6"/>
</svg>
