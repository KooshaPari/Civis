<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- camera-orbit tool: orbit ellipse around a central pivot with a camera node -->
  <ellipse cx="32" cy="32" rx="24" ry="11"
    fill="none" stroke="#50C8F0" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="32" cy="32" rx="11" ry="24"
    fill="none" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
  <!-- central pivot -->
  <circle cx="32" cy="32" r="4" fill="#0d1628" stroke="#E8B84B" stroke-width="2"/>
  <!-- orbiting camera body -->
  <rect x="49" y="27" width="9" height="7" rx="1.5"
    fill="#0d1628" stroke="#50C8F0" stroke-width="2" filter="url(#glow)"/>
  <polygon points="49,29 45,31 45,29.5 49,31.5" fill="#E8B84B"/>
  <!-- direction arrowhead on orbit -->
  <polygon points="8,32 13,29 13,35" fill="#50C8F0" filter="url(#glow)"/>
</svg>
