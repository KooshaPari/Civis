<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Population: three stylized figures stacked -->
  <defs>
    <filter id="popGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- back-left figure (dimmer) -->
  <circle cx="9" cy="11" r="3.5" fill="#0a1628" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
  <path d="M4,26 Q4,18 9,18 Q14,18 14,26" fill="#0a1628" stroke="#50C8F0" stroke-width="1.5" opacity="0.5" fill-opacity="0"/>
  <!-- back-right figure (dimmer) -->
  <circle cx="23" cy="11" r="3.5" fill="#0a1628" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
  <path d="M18,26 Q18,18 23,18 Q28,18 28,26" fill="#0a1628" stroke="#50C8F0" stroke-width="1.5" opacity="0.5" fill-opacity="0"/>
  <!-- front center figure (bright) -->
  <circle cx="16" cy="9" r="4.5" fill="#0d1e38" stroke="#50C8F0" stroke-width="2" filter="url(#popGlow)"/>
  <path d="M8,28 Q8,18 16,18 Q24,18 24,28" fill="#0d1e38" stroke="#50C8F0" stroke-width="2" filter="url(#popGlow)" fill-opacity="0"/>
  <!-- center figure face dot -->
  <circle cx="16" cy="9" r="2" fill="#50C8F0" opacity="0.6"/>
</svg>
