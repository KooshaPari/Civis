# Local-first: PRs use quality.yml + pr-governance only.
# Heavy gate (cargo-audit) runs locally via lefthook pre-push and is attested
# in `.ci/quality-manifest.json`; this workflow is a dispatch-only escape hatch
# for when a developer explicitly wants the cloud to rerun the audit and merge
# an updated manifest. The scheduled trigger is kept at one weekly slot to
# satisfy advisory dashboards without burning PR minutes.
name: Cargo Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 3"

permissions:
  contents: read

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  cargo-audit:
    # Manual escape hatch: run heavy audit on the runner when explicitly asked.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
