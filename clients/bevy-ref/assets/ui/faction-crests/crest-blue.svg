<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Blue faction: The Tide Glyph — layered concentric circles, wave arcs, oceanic -->
  <defs>
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="blueAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2980b9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2980b9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="64" cy="64" r="55" fill="url(#blueAmbient)"/>
  <!-- Outer broken ring -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="16 6" opacity="0.5"/>
  <!-- Mid ring -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="#2980b9" stroke-width="2.5" opacity="0.6" filter="url(#blueGlow)"/>
  <!-- Inner ring (solid) -->
  <circle cx="64" cy="64" r="26" fill="#050e1a" stroke="#2980b9" stroke-width="3" filter="url(#blueGlow)"/>
  <!-- Wave arcs upper -->
  <path d="M30,52 Q44,40 58,52 Q72,64 86,52 Q96,44 100,52"
    fill="none" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round" filter="url(#blueGlow)"/>
  <!-- Wave arcs lower -->
  <path d="M28,76 Q42,64 56,76 Q70,88 84,76 Q94,68 100,76"
    fill="none" stroke="#2980b9" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Cardinal axis lines -->
  <line x1="64" y1="12" x2="64" y2="116" stroke="#2980b9" stroke-width="1.5" opacity="0.3"/>
  <line x1="12" y1="64" x2="116" y2="64" stroke="#2980b9" stroke-width="1.5" opacity="0.3"/>
  <!-- Diagonal short lines -->
  <line x1="64" y1="38" x2="64" y2="90" stroke="#2980b9" stroke-width="1" opacity="0.2"/>
  <!-- Central sigil: three-pronged trident shape -->
  <line x1="64" y1="82" x2="64" y2="46" stroke="#3498db" stroke-width="4" stroke-linecap="round" filter="url(#blueGlow)"/>
  <line x1="52" y1="58" x2="64" y2="46" stroke="#3498db" stroke-width="3" stroke-linecap="round" filter="url(#blueGlow)"/>
  <line x1="76" y1="58" x2="64" y2="46" stroke="#3498db" stroke-width="3" stroke-linecap="round" filter="url(#blueGlow)"/>
  <line x1="52" y1="52" x2="52" y2="64" stroke="#3498db" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="76" y1="52" x2="76" y2="64" stroke="#3498db" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Center node -->
  <circle cx="64" cy="64" r="5" fill="#3498db" filter="url(#blueGlow)"/>
  <!-- Cardinal tick nodes -->
  <circle cx="64" cy="24" r="3.5" fill="#2980b9" opacity="0.8"/>
  <circle cx="64" cy="104" r="3.5" fill="#2980b9" opacity="0.8"/>
  <circle cx="24" cy="64" r="3.5" fill="#2980b9" opacity="0.8"/>
  <circle cx="104" cy="64" r="3.5" fill="#2980b9" opacity="0.8"/>
</svg>
