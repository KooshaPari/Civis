# Local-first: PRs use quality.yml + pr-governance only.
# FR coverage (traceability matrix + civ-engine determinism/replay/hash chain
# + civ-research + web spectator tests) runs locally via
# `bash scripts/fr-coverage/run-fr-coverage.sh` and is gated by lefthook
# pre-push emission. This workflow is dispatch-only.
name: FR Coverage

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-verify:
    name: manifest-verify (cloud)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify local quality manifest
        run: bash scripts/quality/verify-quality-manifest.sh

  coverage:
    # Manual escape hatch: rerun the FR coverage sweep on the cloud.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
      - name: FR coverage
        run: bash scripts/fr-coverage/run-fr-coverage.sh
