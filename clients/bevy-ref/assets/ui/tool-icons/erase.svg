<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- erase / delete tool: tilted eraser block sweeping, with debris particles -->
  <g transform="rotate(-30 32 34)">
    <rect x="18" y="22" width="28" height="18" rx="3"
      fill="#0d1628" stroke="#50C8F0" stroke-width="2.5" filter="url(#glow)"/>
    <!-- gold leading face -->
    <rect x="18" y="34" width="28" height="6" rx="2"
      fill="#2a1d05" stroke="#E8B84B" stroke-width="2"/>
    <line x1="32" y1="22" x2="32" y2="40" stroke="#50C8F0" stroke-width="1.2" opacity="0.5"/>
  </g>
  <!-- erased debris particles -->
  <circle cx="14" cy="48" r="2" fill="#50C8F0" opacity="0.8"/>
  <circle cx="20" cy="54" r="1.5" fill="#E8B84B" opacity="0.7"/>
  <circle cx="10" cy="40" r="1.5" fill="#50C8F0" opacity="0.6"/>
</svg>
