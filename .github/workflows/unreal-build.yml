# Optional Unreal compile check on Windows.
# GitHub-hosted runners do not ship UE 5.4; expect exit code 2 (engine not found).
# Install UE locally and run clients/unreal-show/scripts/build.ps1 for a real compile.
name: Unreal build (optional)

# Local-first: PRs use quality.yml + pr-governance-gate only.
# Run heavy gates locally: lefthook run pre-push
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  unreal-show:
    name: civ-show (rust-shim + UE if present)
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
      - name: Run automated build script
        shell: pwsh
        working-directory: clients/unreal-show
        run: |
          $out = & ./scripts/build.ps1 2>&1
          $code = $LASTEXITCODE
          $out | Write-Host
          switch ($code) {
            0 { Write-Host 'UE build succeeded (runner had engine installed).' }
            2 {
              Write-Host '::notice::UE 5.4 not on runner — rust-shim built; UE step skipped (expected on GitHub-hosted).'
            }
            default { exit $code }
          }
