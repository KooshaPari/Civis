name: framework-version
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Pattern #94 detection gate — fails CI when a pack manifest declares an
# unbounded ``framework_version`` constraint (no ``<`` upper bound) or a
# vacuous upper bound (``<1.0.0`` while the SDK is still pre-1.0). This
# enforces what schemas/pack-manifest.schema.json's regex enforces at
# validation time, but at the CI level so manifests that bypass schema
# validation are still rejected.
#
# Companion: scripts/ci/check_framework_version.py (run with --self-test
# for spec). Cross-reference: tasks #110 / #260.

on:
  pull_request:
    paths:
      - "packs/**/pack.yaml"
      - "packs/**/manifest.yaml"
      - "schemas/pack-manifest.schema.json"
      - "scripts/ci/check_framework_version.py"
      - "docs/qa/framework-version-allowlist.txt"
      - ".github/workflows/framework-version.yml"
  push:
    branches: [main]
    paths:
      - "packs/**/pack.yaml"
      - "packs/**/manifest.yaml"
      - "schemas/pack-manifest.schema.json"
      - "scripts/ci/check_framework_version.py"
      - "docs/qa/framework-version-allowlist.txt"
      - ".github/workflows/framework-version.yml"
  workflow_dispatch:
jobs:
  framework-version-check:
    name: Pattern #94 framework_version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12"

      - name: Install PyYAML + jsonschema
        run: pip install --quiet pyyaml jsonschema

      - name: Self-test the gate
        run: python scripts/ci/check_framework_version.py --self-test

      - name: Run framework-version gate
        run: python scripts/ci/check_framework_version.py --quiet

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v-latest
        with:
          name: framework-version-report
          path: docs/qa/framework-version-report.json
          if-no-files-found: warn
          retention-days: 14
