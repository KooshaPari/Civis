name: Security Guard (Hooks)

# Local-first: PRs use quality.yml + pr-governance-gate only.
# Run heavy gates locally: lefthook run pre-push
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  # Permissions audit (2026-06-10): phenoShared reusable
  # (.github/workflows/security-guard-hook-audit.yml) requests only
  # `contents: read` (workflow + job). Caller matches at workflow level;
  # explicit job-level block mirrors release-drafter.yml + alert-sync
  # callers and survives a future upstream permission bump.
  guard:
    uses: KooshaPari/phenoShared/.github/workflows/security-guard-hook-audit.yml@main
    permissions:
      contents: read
