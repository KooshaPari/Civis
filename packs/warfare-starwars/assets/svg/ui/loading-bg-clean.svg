<?xml version="1.0" encoding="UTF-8"?>
<!--
  loading-republic.svg — Republic faction loading-screen background
  Size: 1920 × 1080
  Palette: rep-deep-navy #0B1B3A (base), rep-jedi-blue #2D7DD2, rep-saber-blue #5FB3FF,
           rep-white #F5F7FA, ui-void #05060A, rep-gold #FFE81F, rep-gold-muted #B8A415
  Layout:
    - Full-bleed space background gradient (void→deep-navy)
    - 40 starfield dots scattered across field
    - 18 hyperspace-streak radial lines from vanishing point (960, 540)
      tinted rep-saber-blue → rep-white (motion-blur illusion)
    - Republic cog watermark (12-tooth, 280px radius) centered-upper at 20% opacity
    - Republic faction color wash: deep-navy radial vignette
    - Lower-third caption bar (1920×140 at y=940): ui-panel fill + gold 2px top rule
    - Gold progress-bar track (left-anchored in lower-third)
  Safe zones:
    - Logo: center 800×200 at y=280..480 (vertically centered upper half)
    - Progress bar: lower-third right zone x=1560..1880 y=975..1000
    - Tip text: lower-third left zone x=40..1500 y=960..1020
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Space background gradient: void bottom-center rising to deep-navy -->
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0B1B3A"/>
      <stop offset="60%"  stop-color="#080F20"/>
      <stop offset="100%" stop-color="#05060A"/>
    </radialGradient>

    <!-- Nebula glow: subtle blue-indigo cloud off-center -->
    <radialGradient id="nebulaGrad" cx="30%" cy="35%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1A3A6B" stop-opacity="0.45"/>
      <stop offset="55%"  stop-color="#0D2244" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#05060A" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary nebula (right) -->
    <radialGradient id="nebula2Grad" cx="72%" cy="25%" r="35%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2D7DD2" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#05060A" stop-opacity="0"/>
    </radialGradient>

    <!-- Hyperspace streak linear gradient: blue→white (motion lines) -->
    <linearGradient id="streakRepA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5FB3FF" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#5FB3FF" stop-opacity="0.7"/>
      <stop offset="85%"  stop-color="#F5F7FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F5F7FA" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="streakRepB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2D7DD2" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#5FB3FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F5F7FA" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Gold radial gradient for cog watermark -->
    <radialGradient id="cogWatermark" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE81F" stop-opacity="0.25"/>
      <stop offset="70%"  stop-color="#B8A415" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B8A415" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Lower-third bar gradient -->
    <linearGradient id="lowerThirdGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#10131A" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#05060A" stop-opacity="0.96"/>
    </linearGradient>

    <!-- Progress bar fill gradient (gold) -->
    <linearGradient id="progressFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8A415"/>
      <stop offset="60%"  stop-color="#FFE81F"/>
      <stop offset="100%" stop-color="#F5F7FA"/>
    </linearGradient>

    <!-- Clip for screen bounds -->
    <clipPath id="screen">
      <rect x="0" y="0" width="1920" height="1080"/>
    </clipPath>

    <!-- 12-tooth cog path (radius 280, tooth height 32, inner 248) generated at origin -->
    <!-- Cog drawn via polygon approximation: alternating outer/inner radii at 15° steps -->
  </defs>

  <!-- === LAYER 1: Space Background === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- === LAYER 2: Nebula Clouds === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#nebulaGrad)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#nebula2Grad)"/>

  <!-- === LAYER 3: Starfield (40 stars, varied sizes) === -->
  <g fill="#F5F7FA" clip-path="url(#screen)">
    <!-- Row 1 -->
    <circle cx="87"   cy="43"  r="1.2" opacity="0.9"/>
    <circle cx="234"  cy="112" r="0.8" opacity="0.6"/>
    <circle cx="415"  cy="28"  r="1.5" opacity="1.0"/>
    <circle cx="602"  cy="78"  r="0.9" opacity="0.7"/>
    <circle cx="789"  cy="54"  r="1.1" opacity="0.8"/>
    <circle cx="1023" cy="19"  r="1.4" opacity="0.95"/>
    <circle cx="1198" cy="91"  r="0.7" opacity="0.55"/>
    <circle cx="1356" cy="37"  r="1.3" opacity="0.85"/>
    <circle cx="1567" cy="62"  r="1.0" opacity="0.75"/>
    <circle cx="1734" cy="108" r="0.8" opacity="0.65"/>
    <circle cx="1867" cy="31"  r="1.2" opacity="0.90"/>
    <!-- Row 2 -->
    <circle cx="143"  cy="198" r="1.0" opacity="0.70"/>
    <circle cx="329"  cy="245" r="1.4" opacity="0.90"/>
    <circle cx="518"  cy="183" r="0.7" opacity="0.55"/>
    <circle cx="711"  cy="227" r="1.2" opacity="0.80"/>
    <circle cx="896"  cy="174" r="0.9" opacity="0.65"/>
    <circle cx="1134" cy="211" r="1.5" opacity="1.00"/>
    <circle cx="1312" cy="259" r="0.8" opacity="0.60"/>
    <circle cx="1489" cy="192" r="1.1" opacity="0.75"/>
    <circle cx="1678" cy="238" r="1.3" opacity="0.85"/>
    <circle cx="1812" cy="165" r="0.7" opacity="0.50"/>
    <!-- Row 3 (upper-mid) -->
    <circle cx="61"   cy="342" r="1.3" opacity="0.85"/>
    <circle cx="278"  cy="389" r="0.9" opacity="0.65"/>
    <circle cx="467"  cy="318" r="1.1" opacity="0.75"/>
    <circle cx="654"  cy="372" r="0.7" opacity="0.55"/>
    <circle cx="843"  cy="328" r="1.4" opacity="0.90"/>
    <circle cx="1078" cy="361" r="1.0" opacity="0.70"/>
    <circle cx="1245" cy="403" r="1.2" opacity="0.80"/>
    <circle cx="1434" cy="337" r="0.8" opacity="0.60"/>
    <circle cx="1623" cy="375" r="1.5" opacity="1.00"/>
    <circle cx="1801" cy="319" r="0.9" opacity="0.65"/>
    <!-- Scatter upper-right bright cluster -->
    <circle cx="1534" cy="142" r="1.6" opacity="1.00"/>
    <circle cx="1556" cy="127" r="0.8" opacity="0.70"/>
    <circle cx="1578" cy="158" r="0.6" opacity="0.50"/>
    <!-- Lower sparse stars (visible above lower-third) -->
    <circle cx="92"   cy="820" r="0.7" opacity="0.40"/>
    <circle cx="345"  cy="795" r="1.0" opacity="0.50"/>
    <circle cx="756"  cy="847" r="0.8" opacity="0.40"/>
    <circle cx="1122" cy="812" r="1.1" opacity="0.55"/>
    <circle cx="1445" cy="831" r="0.7" opacity="0.45"/>
    <circle cx="1756" cy="803" r="0.9" opacity="0.50"/>
  </g>

  <!-- === LAYER 4: Hyperspace Streaks (radial from 960,540) === -->
  <!-- Each streak: a thin trapezoid (polygon) pointing toward center with gradient overlay -->
  <!-- Streak width increases with distance from center; 18 streaks at ~20° spacing -->
  <g clip-path="url(#screen)" opacity="0.72">
    <!-- Streak angle 0° (right) -->
    <polygon points="960,538 960,542 1920,506 1920,514" fill="url(#streakRepA)" opacity="0.65"/>
    <!-- Streak angle 20° -->
    <polygon points="961,538 963,541 1920,336 1914,344" fill="url(#streakRepB)" opacity="0.50"/>
    <!-- Streak angle 40° -->
    <polygon points="962,537 964,540 1880,178 1872,186" fill="url(#streakRepA)" opacity="0.55"/>
    <!-- Streak angle 60° (upper-right) -->
    <polygon points="961,536 963,538 1612,0 1604,0" fill="url(#streakRepB)" opacity="0.45"/>
    <!-- Streak angle 80° -->
    <polygon points="959,536 961,538 1120,0 1114,0" fill="url(#streakRepA)" opacity="0.40"/>
    <!-- Streak angle 100° -->
    <polygon points="957,536 959,538 820,0 814,0" fill="url(#streakRepB)" opacity="0.40"/>
    <!-- Streak angle 120° (upper-left) -->
    <polygon points="956,537 958,540 304,0 298,0" fill="url(#streakRepA)" opacity="0.45"/>
    <!-- Streak angle 140° -->
    <polygon points="955,537 957,540 42,172 48,180" fill="url(#streakRepB)" opacity="0.50"/>
    <!-- Streak angle 160° -->
    <polygon points="955,538 957,541 0,344 0,352" fill="url(#streakRepA)" opacity="0.55"/>
    <!-- Streak angle 180° (left) -->
    <polygon points="957,538 957,542 0,502 0,510" fill="url(#streakRepB)" opacity="0.65"/>
    <!-- Streak angle 200° -->
    <polygon points="956,540 958,543 0,734 0,742" fill="url(#streakRepA)" opacity="0.55"/>
    <!-- Streak angle 220° -->
    <polygon points="956,541 958,544 48,898 54,906" fill="url(#streakRepB)" opacity="0.50"/>
    <!-- Streak angle 240° (lower-left) -->
    <polygon points="957,542 959,545 306,1080 314,1080" fill="url(#streakRepA)" opacity="0.45"/>
    <!-- Streak angle 260° -->
    <polygon points="958,542 960,545 820,1080 826,1080" fill="url(#streakRepB)" opacity="0.40"/>
    <!-- Streak angle 280° -->
    <polygon points="960,542 962,545 1118,1080 1124,1080" fill="url(#streakRepA)" opacity="0.40"/>
    <!-- Streak angle 300° (lower-right) -->
    <polygon points="961,541 963,544 1616,1080 1622,1080" fill="url(#streakRepB)" opacity="0.45"/>
    <!-- Streak angle 320° -->
    <polygon points="962,540 964,543 1876,896 1882,904" fill="url(#streakRepA)" opacity="0.50"/>
    <!-- Streak angle 340° -->
    <polygon points="962,539 964,542 1924,726 1920,734" fill="url(#streakRepB)" opacity="0.55"/>
  </g>

  <!-- Hyperspace center lens flare / vanishing point glow -->
  <radialGradient id="vpGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#F5F7FA" stop-opacity="0.55"/>
    <stop offset="25%"  stop-color="#5FB3FF" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#05060A" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="960" cy="540" rx="120" ry="120" fill="url(#vpGlow)"/>

  <!-- === LAYER 5: Republic 12-Tooth Cog Watermark (centered-upper, ~y=270) === -->
  <!--
    12-tooth cog: outer radius 280px, inner (root) radius 248px, tooth height 32px.
    Teeth are rectangular tabs at each 30° interval.
    Ring bore radius 120px (hollow center).
    Rendered at cx=960, cy=290 (upper-center), opacity 0.18 (gold watermark).
  -->
  <g transform="translate(960, 290)" opacity="0.18" fill="url(#cogWatermark)" stroke="#FFE81F" stroke-width="1.5" stroke-opacity="0.22">
    <!-- Cog ring body (annulus) approximated with two circles and difference -->
    <!-- Use path for 12-tooth cog: outer gear profile -->
    <path d="
      M 248,0
      L 280,0
      A 280,280 0 0,1 267.59,74.34
      L 236.96,65.87
      A 248,248 0 0,0 248,0 Z

      M 235.87,82.57
      L 267.59,74.34
      A 280,280 0 0,1 228.56,187.11
      L 202.71,165.76
      A 248,248 0 0,0 235.87,82.57 Z

      M 187.11,172.94
      L 228.56,187.11
      A 280,280 0 0,1 139.97,252.65
      L 124.42,224.08
      A 248,248 0 0,0 187.11,172.94 Z

      M 116.05,230.86
      L 139.97,252.65
      A 280,280 0 0,1 0.00,280.00
      L 0.00,248.00
      A 248,248 0 0,0 116.05,230.86 Z

      M -116.05,230.86
      L 0,248
      A 248,248 0 0,0 -116.05,230.86
      L -116.05,230.86 Z
    "
    fill="none"/>
    <!-- Simplified: draw cog as nested rings with tick marks for teeth -->
    <!-- Outer ring annulus -->
    <circle cx="0" cy="0" r="280" fill="#FFE81F" opacity="0.14"/>
    <circle cx="0" cy="0" r="248" fill="#0B1B3A" opacity="1.0"/>
    <circle cx="0" cy="0" r="248" fill="none" stroke="#FFE81F" stroke-width="2"/>
    <!-- 12 teeth as radial rectangles -->
    <g fill="#FFE81F" opacity="0.9">
      <!-- Tooth at 0°   --> <rect x="-10" y="-280" width="20" height="32" rx="2"/>
      <!-- Tooth at 30°  --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(30)"/>
      <!-- Tooth at 60°  --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(60)"/>
      <!-- Tooth at 90°  --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(90)"/>
      <!-- Tooth at 120° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(120)"/>
      <!-- Tooth at 150° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(150)"/>
      <!-- Tooth at 180° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(180)"/>
      <!-- Tooth at 210° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(210)"/>
      <!-- Tooth at 240° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(240)"/>
      <!-- Tooth at 270° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(270)"/>
      <!-- Tooth at 300° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(300)"/>
      <!-- Tooth at 330° --> <rect x="-10" y="-280" width="20" height="32" rx="2" transform="rotate(330)"/>
    </g>
    <!-- Hub bore -->
    <circle cx="0" cy="0" r="80" fill="#0B1B3A" opacity="0.95"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FFE81F" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner spokes (6 spokes) -->
    <g stroke="#FFE81F" stroke-width="3" opacity="0.35">
      <line x1="0" y1="-80" x2="0" y2="-248"/>
      <line x1="0" y1="-80" x2="0" y2="-248" transform="rotate(60)"/>
      <line x1="0" y1="-80" x2="0" y2="-248" transform="rotate(120)"/>
      <line x1="0" y1="-80" x2="0" y2="-248" transform="rotate(180)"/>
      <line x1="0" y1="-80" x2="0" y2="-248" transform="rotate(240)"/>
      <line x1="0" y1="-80" x2="0" y2="-248" transform="rotate(300)"/>
    </g>
  </g>

  <!-- LAYER 6 (baked lower-third caption + static progress bar) INTENTIONALLY OMITTED.
       BUG B: a frozen ~40% progress bar baked into the loading background read as a
       "fake static skeleton". Real progress is now composited at runtime as a LIVE
       layer by LoadingScreenController (src/Runtime/UI/). This is the clean themed BG only. -->
</svg>
