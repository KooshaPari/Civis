<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 28">
  <!--
    Small info chip / badge background. 9-slice: x=14/66, y=8/20.
    Used for resource counters, status tags, etc.
  -->
  <defs>
    <linearGradient id="chipBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080f20" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="chipSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#50C8F0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#50C8F0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="80" height="28" rx="14" ry="14" fill="url(#chipBg)"/>
  <rect x="0" y="0" width="80" height="16" rx="14" ry="14" fill="url(#chipSheen)"/>
  <rect x="0.75" y="0.75" width="78.5" height="26.5" rx="13.5" ry="13.5"
    fill="none" stroke="#50C8F0" stroke-width="1.5" opacity="0.6"/>
  <!-- left dot accent -->
  <circle cx="10" cy="14" r="3" fill="#50C8F0" opacity="0.5"/>
  <!-- right end line accent -->
  <line x1="68" y1="8" x2="72" y2="8" stroke="#50C8F0" stroke-width="1" opacity="0.5"/>
  <line x1="68" y1="20" x2="72" y2="20" stroke="#50C8F0" stroke-width="1" opacity="0.5"/>
</svg>
