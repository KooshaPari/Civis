name: Pack Validation

on:
  pull_request:
    paths:
      - 'packs/**'
      - '.github/workflows/pack-validation.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changed-packs:
    runs-on: ubuntu-latest
    outputs:
      packs: ${{ steps.changed.outputs.packs }}
      pack-count: ${{ steps.changed.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed pack directories
        id: changed
        run: |
          # Get list of changed files in packs/ directory
          CHANGED_FILES=$(git diff --name-only origin/main HEAD -- packs/ || echo "")

          # Extract unique pack directory names (second path component)
          CHANGED_PACKS=$(echo "$CHANGED_FILES" | grep -oP 'packs/\K[^/]+' | sort -u || echo "")

          if [ -z "$CHANGED_PACKS" ]; then
            echo "No packs detected in this PR"
            echo "packs=" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          else
            # Format as space-separated list for matrix
            PACK_LIST=$(echo "$CHANGED_PACKS" | tr '\n' ' ' | xargs)
            COUNT=$(echo "$CHANGED_PACKS" | wc -l)
            echo "packs=$PACK_LIST" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Detected $COUNT changed pack(s): $PACK_LIST"
          fi

  validate-packs:
    needs: detect-changed-packs
    if: needs.detect-changed-packs.outputs.packs != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pack: ${{ fromJson(format('[{0}]', format('"{0}"', replace(needs.detect-changed-packs.outputs.packs, ' ', '","')))) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          include-prerelease: true

      - name: Build PackCompiler
        run: dotnet build src/Tools/PackCompiler/ -c Release --verbosity minimal

      - name: Validate pack - ${{ matrix.pack }}
        id: validate
        run: |
          echo "::group::Validating pack: ${{ matrix.pack }}"
          dotnet run --project src/Tools/PackCompiler -- validate "packs/${{ matrix.pack }}" --strict --format=json > validation_${{ matrix.pack }}.json 2>&1 || {
            VALIDATION_EXIT=$?
            echo "validation_exit=$VALIDATION_EXIT" >> $GITHUB_OUTPUT
            exit $VALIDATION_EXIT
          }
          echo "validation_exit=0" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Parse validation results
        if: always()
        id: parse
        run: |
          if [ -f "validation_${{ matrix.pack }}.json" ]; then
            cat "validation_${{ matrix.pack }}.json"
          else
            echo "No validation output file found"
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: validation_${{ matrix.pack }}.json
          if-no-files-found: warn

  comment-results:
    needs: [detect-changed-packs, validate-packs]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all validation reports
        if: needs.detect-changed-packs.outputs.packs != ''
        uses: actions/download-artifact@v4
        with:
          name: validation-reports
          path: validation-reports

      - name: Check validation status
        id: status
        run: |
          FAILED=0
          if [ -d "validation-reports" ]; then
            for report in validation-reports/*.json; do
              if grep -q '"errors".*\[' "$report"; then
                FAILED=1
                break
              fi
            done
          fi
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Comment on PR - Success
        if: needs.detect-changed-packs.outputs.packs != '' && steps.status.outputs.failed == '0'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Pack validation passed! All ${{ needs.detect-changed-packs.outputs.pack-count }} pack(s) are valid.\n\nValidation checked:\n- pack.yaml structure and required fields\n- Manifest version compatibility\n- Dependency resolution\n- Content references (factions, units, buildings, etc.)\n- Schema compliance\n\nPack(s): `${{ needs.detect-changed-packs.outputs.packs }}`'
            })

      - name: Comment on PR - Failure
        if: needs.detect-changed-packs.outputs.packs != '' && steps.status.outputs.failed == '1'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Pack validation failed for one or more packs.\n\n**To fix locally:**\n```bash\n# For each pack that failed:\ndotnet run --project src/Tools/PackCompiler -- validate "packs/<pack-name>" --strict\n```\n\n**Common issues:**\n- Missing or invalid `pack.yaml` file\n- Missing required fields (id, name, version, author, type)\n- Invalid dependency references\n- Schema validation errors\n\nSee the workflow logs for detailed error messages: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })

      - name: Fail workflow if validation failed
        if: steps.status.outputs.failed == '1'
        run: exit 1
