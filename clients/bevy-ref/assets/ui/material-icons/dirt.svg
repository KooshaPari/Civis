<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dirt: layered terrain cross-section cube -->
  <defs>
    <linearGradient id="dirtTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a7a2a"/>
      <stop offset="100%" stop-color="#2e5018"/>
    </linearGradient>
    <linearGradient id="dirtBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a4a18"/>
      <stop offset="100%" stop-color="#4a2a08"/>
    </linearGradient>
  </defs>
  <!-- isometric box body -->
  <polygon points="24,10 42,20 42,38 24,48 6,38 6,20"
    fill="url(#dirtBody)" stroke="#8a5c18" stroke-width="2"/>
  <!-- top face (grass layer) -->
  <polygon points="24,10 42,20 24,30 6,20"
    fill="url(#dirtTop)" stroke="#4a7a2a" stroke-width="1.5"/>
  <!-- layer stripe in body (sediment line) -->
  <line x1="6" y1="28" x2="42" y2="28" stroke="#3a1e08" stroke-width="2" opacity="0.5"/>
  <!-- small pebble dots -->
  <circle cx="18" cy="33" r="1.5" fill="#3a2a10" opacity="0.6"/>
  <circle cx="30" cy="36" r="1.2" fill="#3a2a10" opacity="0.5"/>
  <!-- grass tuft on top -->
  <line x1="22" y1="18" x2="22" y2="12" stroke="#4a7a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="25" y2="10" stroke="#5a8a30" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="18" x2="28" y2="13" stroke="#4a7a2a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
