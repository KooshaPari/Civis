version: '3'

tasks:
  lint:
    desc: "Run linter with oxlint"
    cmds:
      - oxlint

  format:
    desc: "Format with oxfmt"
    cmds:
      - oxfmt --write .

  docs:dev:
    desc: "Start VitePress dev server"
    cmds:
      - bun run docs:dev

  docs:build:
    desc: "Build VitePress documentation"
    cmds:
      - bun run docs:build

  install:
    desc: "Install dependencies with bun"
    cmds:
      - bun install

  quality:
    desc: "Run quality checks (JS lint + docs + Rust just ci)"
    cmds:
      - task: lint
      - task: docs:build
      - just ci

  rust:ci:
    desc: "Rust lint, test, audit, unused-deps (Phenotype just ci)"
    cmds:
      - just ci

  civis-3d-verify:
    desc: "3D extension gate (build, test, clippy, fmt)"
    cmds:
      - just civis-3d-verify

  infra:up:
    desc: "Start native infra (postgres, dragonfly, nats, minio) via process-compose"
    cmds:
      - process-compose up

  dev:watch:
    desc: "civ-watch + dashboard (Rust HTTP :9090; no full process-compose required)"
    cmds:
      - just civis-3d-watch-build
      - just civis-3d-watch
