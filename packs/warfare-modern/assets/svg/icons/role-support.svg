<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | role-support.svg | 64x64 monochrome glyph -->
<!-- Medic cross with dog-tag chain and field kit bag -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Medic cross (bold, centered) -->
  <!-- Vertical bar -->
  <rect x="26" y="10" width="12" height="36" rx="2" fill="#EDE8DC"/>
  <!-- Horizontal bar -->
  <rect x="14" y="22" width="36" height="12" rx="2" fill="#EDE8DC"/>
  <!-- Field bag / kit below cross -->
  <rect x="22" y="48" width="20" height="10" rx="2" fill="#EDE8DC"/>
  <!-- Bag handle -->
  <path d="M27,48 L27,45 Q32,42 37,45 L37,48" fill="none" stroke="#EDE8DC" stroke-width="2" stroke-linecap="round"/>
  <!-- Bag cross indicator (small cross on bag) -->
  <line x1="32" y1="51" x2="32" y2="56" stroke="#1C2B3A" stroke-width="2"/>
  <line x1="28" y1="53" x2="36" y2="53" stroke="#1C2B3A" stroke-width="2"/>
</svg>
