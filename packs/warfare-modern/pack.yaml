# Modern Warfare Pack
# Contemporary total-conversion entrypoint with 3D-era factions and assets.

id: warfare-modern
name: Modern Warfare
version: 0.1.0
framework_version: ">=0.5.0 <1.0.0"
author: DINOForge
description: |
  A total conversion replacing the vanilla factions with a modern combined-arms roster.
  Includes infantry, mechanized vehicles, anti-air structures, and high-tech command economy.

type: total_conversion

depends_on: []
conflicts_with:
  - warfare-starwars

ui_theme:
  title: "MODERN WARFARE"
  subtitle: "Contemporary infantry, mechanized units, and tactical doctrine"
  primary_color: "#1F2A44"
  secondary_color: "#9AA8B3"
  accent_color: "#D6452F"
  text_color: "#EDEDED"
  background_tint: "#0B1020"
  logo: "assets/ui/menu_logo.png"
  background_image: "assets/ui/menu_bg.png"
  button_frame: "assets/ui/btn_normal.png"
  button_frame_hover: "assets/ui/btn_hover.png"

loads:
  factions:
    - factions
  units:
    - units
  buildings:
    - buildings
