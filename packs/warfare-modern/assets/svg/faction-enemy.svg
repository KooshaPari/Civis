<?xml version="1.0" encoding="UTF-8"?>
<!--
  Classic Enemy — Faction Crest
  DINOForge Warfare-Modern pack · identity asset

  ORIGINAL ART DISCLAIMER
  ========================
  All geometry in this file is wholly original and hand-authored for the
  DINOForge project. The angular crest motif — a stylised 5-pointed star
  with deliberately irregular proportions inscribed in an angular frame —
  is generic heraldic grammar used by the fictional "Classic Enemy" faction.
  It has NOT been derived from, nor does it reproduce, any national flag,
  coat-of-arms, military patch, Soviet seal, or any other real-world insignia,
  trademarked symbol, or copyrighted graphic.
  Proportions, angles, and stroke weights are unique to this file and differ
  materially from any real-world star symbol.

  Dimensions: 256 × 256  (square badge / crest format)

  Palette: identity-modern.md §2.2
    OPFOR Red      #8B1A1A  — primary fill / background
    Gunmetal       #3D4145  — secondary fill
    Woodland Green #3A4A2E  — tertiary fill
    Soviet Crimson #D42B2B  — star fill / accent
    Steel Ice      #6AACCC  — secondary accent (radar / comms feel)
    Cold Paper     #E0DDD5  — text
    Rusted Field   #887060  — secondary text
    Blast Edge     #252829  — border / outline
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="Classic Enemy faction crest">

  <defs>
    <!-- Background gradient: deep red top, gunmetal lower -->
    <linearGradient id="ce-bg-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8B1A1A"/>
      <stop offset="55%"  stop-color="#6B1414"/>
      <stop offset="100%" stop-color="#3D4145"/>
    </linearGradient>

    <!-- Crimson radial glow behind star -->
    <radialGradient id="ce-star-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#D42B2B" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#D42B2B" stop-opacity="0"/>
    </radialGradient>

    <!-- Steel-ice accent gradient for trim lines -->
    <linearGradient id="ce-ice-trim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6AACCC" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6AACCC" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- ── Outer angular border ──
       Hard-cut square with bottom-left + top-right 14px notch (angular language)
  -->
  <polygon id="ce-outer-border"
           points="0,14 14,0 256,0 256,242 242,256 0,256"
           fill="#252829"
           stroke="#D42B2B" stroke-width="2"/>

  <!-- ── Crest shape ──
       Angular hexagonal shield — flat-top/flat-bottom (military-crate shape),
       wider middle, chamfered at all 6 corners. Entirely original geometry.
  -->
  <path id="ce-crest"
        d="M 128,228
           L 36,188
           L 24,110
           L 60,44
           L 128,28
           L 196,44
           L 232,110
           L 220,188
           Z"
        fill="url(#ce-bg-fill)"
        stroke="#3D4145" stroke-width="3"/>

  <!-- Crest inner inset line (crimson dashed) -->
  <path id="ce-crest-inner"
        d="M 128,212
           L 50,176
           L 40,108
           L 72,54
           L 128,42
           L 184,54
           L 216,108
           L 206,176
           Z"
        fill="none"
        stroke="#D42B2B" stroke-width="1.5" stroke-dasharray="10 5"/>

  <!-- ── Steel-ice horizontal divider bands ──
       Two thin horizontal rules across the shield face —
       reference to "rank stripe" military language.
  -->
  <line x1="54"  y1="88"  x2="202" y2="88"
        stroke="url(#ce-ice-trim)" stroke-width="1.5"/>
  <line x1="44"  y1="178" x2="212" y2="178"
        stroke="url(#ce-ice-trim)" stroke-width="1"/>

  <!-- ── Star motif ──
       5-pointed star, deliberately irregular proportions.
       Outer vertices at r=56 from centre (128,126), rotated so top vertex
       points straight up. Inner radius r=23 (ratio 0.41 — differs from
       standard 0.382 to ensure originality). Angles and coordinates are
       unique to this asset.

       Vertex angles (outer): 270°, 342°, 54°, 126°, 198°  (top-point first)
       Inner angles offset by 36°: 306°, 18°, 90°, 162°, 234°

       Star fill: Soviet Crimson #D42B2B
       Star outline: none (solid fill, white edge highlight via offset copy)
  -->

  <!-- Crimson glow behind star -->
  <circle cx="128" cy="126" r="62" fill="url(#ce-star-glow)"/>

  <!--
    Star outer points (r=56, cx=128, cy=126):
      Top    (270°): 128, 70
      LR     (342°): 181.2, 107.3  → approx 181, 107
      LL     ( 54°): 161.4, 171.4  → approx 161, 171
      RL     (126°):  94.6, 171.4  → approx 95, 171
      RR     (198°):  74.8, 107.3  → approx 75, 107

    Star inner points (r=23, offset 36° from outer):
      (306°): 141.7, 107.3 → approx 142, 107
      ( 18°): 149.1, 133.1 → approx 149, 133
      ( 90°): 128, 149     → approx 128, 149
      (162°): 106.9, 133.1 → approx 107, 133
      (234°): 114.3, 107.3 → approx 114, 107

    Using slightly adjusted coords for visual quality.
  -->
  <polygon id="ce-star"
           points="
             128,70
             142,110
             181,107
             151,131
             161,171
             128,148
             95,171
             105,131
             75,107
             114,110
           "
           fill="#D42B2B"/>

  <!-- Star edge highlight (white offset, thin) -->
  <polygon points="
             128,72
             143,111
             180,108
             151,132
             160,170
             128,149
             96,170
             105,132
             76,108
             113,111
           "
           fill="none"
           stroke="#E0DDD5" stroke-width="1.2" stroke-linejoin="miter"/>

  <!-- ── Faction label — CLASSIC ENEMY ── -->
  <text x="128" y="198"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="13" font-weight="400" letter-spacing="3"
        fill="#E0DDD5" text-anchor="middle">CLASSIC</text>
  <text x="128" y="212"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="11" font-weight="400" letter-spacing="2"
        fill="#887060" text-anchor="middle">ENEMY</text>

  <!-- ── Corner classification marks ── -->
  <text x="10" y="14"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="8" fill="#3D4145">CE-01</text>
  <text x="246" y="252"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="8" fill="#3D4145" text-anchor="end">THT-1</text>

  <!-- ── Bottom bar: 3 angular chevrons pointing right (decoration) ──
       Angular OPFOR-style counter-chevrons (pointing left = defensive posture)
  -->
  <polyline points="42,228 56,236 42,244"
            fill="none" stroke="#D42B2B" stroke-width="2"
            stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="52,228 66,236 52,244"
            fill="none" stroke="#D42B2B" stroke-width="2"
            stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="200,228 214,236 200,244"
            fill="none" stroke="#D42B2B" stroke-width="2"
            stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="210,228 224,236 210,244"
            fill="none" stroke="#D42B2B" stroke-width="2"
            stroke-linecap="square" stroke-linejoin="miter"/>

</svg>
