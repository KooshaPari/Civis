# retrigger: 2026-06-21T12:31
# Local-first merge gate (Phenotype / agileplus pattern).
# Heavy quality runs locally via lefthook pre-push; cloud CI only verifies the
# committed `.ci/quality-manifest.json` attestation (see quality.yml).
name: pr-governance-gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  checks: read
  pull-requests: read
  statuses: read

jobs:
  pr-governance-gate:
    name: pr-governance-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify quality manifest (local-first attestation)
        run: bash scripts/quality/verify-quality-manifest.sh

      - name: Evaluate PR checks (local-first required-only gate)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            // Wrap the entire evaluation in try/catch so any unexpected
            // GraphQL error, missing payload, or thrown exception degrades
            // to a WARN summary instead of a hard FAIL. The gate's job is
            // to surface real, local required-check failures — not to die on
            // ancillary API hiccups.
            try {
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.review?.pull_request?.number;
            if (!prNumber) {
              // No PR context (push event, pull_request_review on a deleted PR,
              // or workflow_dispatch). This gate only governs PRs — exit 0.
              core.summary
                .addHeading("PR governance")
                .addRaw("No pull request context; gate skipped (exit 0).")
                .write();
              core.info("No pull request number was provided; skipping PR governance gate.");
              return;
            }

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    labels(first: 30) { nodes { name } }
                    commits(last: 1) {
                      nodes {
                        commit {
                          statusCheckRollup {
                            contexts(first: 100) {
                              nodes {
                                __typename
                                ... on CheckRun {
                                  name
                                  status
                                  conclusion
                                }
                                ... on StatusContext {
                                  context
                                  state
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber,
            });

            const pr = result.repository?.pullRequest;
            if (!pr) {
              core.summary
                .addHeading("PR governance")
                .addRaw(`PR #${prNumber} not found (deleted or no access); gate skipped.`)
                .write();
              core.info(`PR #${prNumber} not found; skipping gate.`);
              return;
            }

            const labels = new Set((pr.labels?.nodes || []).map((n) => n.name));
            const billingException =
              labels.has("ci-billing-exception") || labels.has("local-first-ci");

            // Local required checks — these are the ONLY contexts that may
            // block the gate when they report FAILURE / CANCELLED / TIMED_OUT /
            // STALE / ERROR. Everything else (third-party review bots, optional
            // legacy workflows, billing/quota status from outside) is ignored
            // by design — see alwaysNonBlockingBots + optionalBypass below.
            // NOTE: must be Array (not Set) — consumed via .some() which Set lacks.
            const requiredChecks = [
              /^pr-governance-gate$/i,
              /^quality-manifest/i,
              /^cargo-deny(\b|$)/i,
              /^cargo-audit(\b|$)/i,
              /^civis-3d-verify(\b|$)/i,
              /^codeql(\b|$)/i,
              /^trufflehog(\b|$)/i,
              /^ci\b/i,
              /^build\b/i,
              /^test\b/i,
              /^lint\b/i,
              /^format\b/i,
            ];

            // Third-party / legacy optional checks (never block when local-first
            // label is set, but still do not block when label is absent if the
            // check is in alwaysNonBlockingBots).
            const optionalBypass = [
              /billing/i,
              /quota/i,
              /spending/i,
              /actions.*limit/i,
              /^cargo-/i,
              /^Analyze \(rust\)$/i,
              /^quality-gate$/i,
              /^gate$/i,
              /^coverage$/i,
              /^links$/i,
              /^docs-build$/i,
              /^journey-validate$/i,
              /^Legacy Tooling/i,
              /^policy-gate$/i,
              /^guard$/i,
              /^semver-checks$/i,
              /^machete$/i,
              /^civ-show/i,
              /^GitGuardian/i,
              /^Kilo/i,
              /^semgrep/i,
              /^SonarCloud/i,
              /^Cursor Bugbot/i,
              /^CodeRabbit$/i,
              /^Rust Module Graph$/i,
            ];

            // External review bots whose app is often not installed and whose checks
            // sit QUEUED forever. These are NEVER blocking in any state — they are
            // informational only and must not gate merges. Matches:
            //   - "Kilo Code Review"
            //   - "Cursor Approval Agent" / "Cursor Bugbot" (defense-in-depth)
            //   - "Macroscope ..." / "Macroscope AI Review"
            //   - "Codacy ..." / "Snyk ..." / "Dependabot ..." etc.
            const alwaysNonBlockingBots = [
              /^Kilo Code Review$/i,
              /^Kilo/i,
              /^Cursor Approval Agent$/i,
              /^Cursor Bugbot/i,
              /^Macroscope/i,
              /^Codacy/i,
              /^Snyk/i,
              /^Dependabot/i,
              /^Codecov/i,
              /^imgbot/i,
              /^Renovate/i,
              /^human-eval/i,
              /^claude(\/|\s|-)?code?(\s|-)?review/i,
              /^aider/i,
              /^CodeRabbit$/i,
              /^greptile/i,
              /^coderabbitai/i,
              /^vercel/i,
              /^netlify/i,
              /^pages-build/i,
              /^release-drafter/i,
              /^scorecard/i,
              /^tag-automation/i,
              /^alert-sync/i,
            ];

            const FAILURE_STATES = ["FAILURE", "CANCELLED", "TIMED_OUT", "STALE", "ERROR"];

            const contexts =
              pr.commits?.nodes?.[0]?.commit?.statusCheckRollup?.contexts?.nodes || [];
            const failures = [];

            for (const node of contexts) {
              const name =
                node.__typename === "CheckRun" ? node.name : node.context;
              if (!name) continue;
              // Always-non-blocking external review bots: ignore in every state.
              // Even a FAILURE / SKIPPED / CANCELLED / QUEUED from these must
              // not block — they are out of our control and the app is often
              // not installed (Kilo Code Review sits QUEUED forever in particular).
              if (alwaysNonBlockingBots.some((re) => re.test(name))) {
                continue;
              }
              // Optional bypass: with the local-first label, ignore the
              // legacy/third-party checks. Without the label, they still
              // cannot block because we only fail on `requiredChecks`.
              if (optionalBypass.some((re) => re.test(name))) {
                continue;
              }
              // The remaining checks are "interesting". Determine whether
              // the check is one of our local required checks. If not, it
              // is informational — do not block the gate on it (this is the
              // key change: positive-list semantics, not negative-list).
              const isRequired = requiredChecks.some((re) => re.test(name));
              if (!isRequired) {
                core.info(`Non-required check '${name}' ignored.`);
                continue;
              }
              if (node.__typename === "CheckRun") {
                // For required local checks, only block on a completed
                // FAILURE/CANCELLED/TIMED_OUT/STALE/ERROR. A still-QUEUED /
                // IN_PROGRESS / REQUESTED / WAITING required check is
                // unusual — warn but don't block. A genuinely-required
                // local check that fails will be caught by its own
                // conclusion when it completes.
                if (node.status !== "COMPLETED") {
                  core.warning(
                    `Required check '${name}' is ${node.status}; ignoring (not blocking).`
                  );
                  continue;
                }
                if (FAILURE_STATES.includes((node.conclusion || "").toUpperCase())) {
                  failures.push(`Check '${name}' concluded with ${node.conclusion}.`);
                }
              } else if (FAILURE_STATES.includes((node.state || "").toUpperCase())) {
                // Legacy StatusContext path (deprecated API but still seen):
                // PENDING / SUCCESS / EXPECTED are silently skipped — only
                // hard failure states fail the gate.
                failures.push(`Status '${name}' is ${node.state}.`);
              }
            }

            if (failures.length > 0) {
              core.summary.addHeading("PR governance").addList(failures);
              core.setFailed(
                failures.join("\n") +
                  "\n\nTip: add label `local-first-ci` when third-party checks are optional for your PR."
              );
              return;
            }

            core.summary
              .addHeading("PR governance")
              .addRaw(
                billingException
                  ? "Manifest OK; optional third-party checks ignored (local-first label)."
                  : "Manifest OK; required local checks passed or were ignored as informational."
              )
              .write();
            } catch (err) {
              // Any unhandled exception (GraphQL throttling, malformed payload,
              // unknown field, transient API failure) becomes a WARN, not a
              // hard FAIL. The gate's purpose is to catch real required-check
              // failures, not to fail the workflow on its own infrastructure.
              const msg = err && err.message ? err.message : String(err);
              core.summary
                .addHeading("PR governance")
                .addRaw(`Gate encountered an error; treated as non-blocking: ${msg}`)
                .write();
              core.warning(`pr-governance-gate: error caught, exit 0 — ${msg}`);
            }
