<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | role-naval.svg | 64x64 monochrome glyph -->
<!-- Destroyer/patrol boat side profile with gun turret and wake lines -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hull (low waterline profile) -->
  <path d="M4,38 L8,30 L56,30 L60,38 Q56,44 4,44 Z" fill="#EDE8DC"/>
  <!-- Waterline / wake -->
  <line x1="2" y1="44" x2="62" y2="44" stroke="#EDE8DC" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Superstructure (center block) -->
  <rect x="22" y="22" width="20" height="10" rx="1" fill="#EDE8DC"/>
  <!-- Bridge windows (knockout) -->
  <rect x="24" y="24" width="4" height="3" fill="#1C2B3A"/>
  <rect x="30" y="24" width="4" height="3" fill="#1C2B3A"/>
  <rect x="36" y="24" width="4" height="3" fill="#1C2B3A"/>
  <!-- Mast / radar -->
  <line x1="32" y1="12" x2="32" y2="22" stroke="#EDE8DC" stroke-width="1.5"/>
  <line x1="26" y1="16" x2="38" y2="16" stroke="#EDE8DC" stroke-width="1.5"/>
  <!-- Radar dish -->
  <ellipse cx="32" cy="12" rx="4" ry="2" fill="none" stroke="#EDE8DC" stroke-width="1.5"/>
  <!-- Forward gun turret -->
  <rect x="10" y="26" width="10" height="6" rx="1" fill="#EDE8DC"/>
  <!-- Gun barrel -->
  <rect x="6" y="28" width="12" height="2" rx="1" fill="#EDE8DC"/>
  <!-- Aft gun / VLS -->
  <rect x="44" y="26" width="8" height="6" rx="1" fill="#EDE8DC"/>
  <!-- VLS hatches (3 small squares) -->
  <rect x="45" y="27" width="2" height="2" fill="#1C2B3A"/>
  <rect x="48" y="27" width="2" height="2" fill="#1C2B3A"/>
  <rect x="51" y="27" width="2" height="2" fill="#1C2B3A"/>
  <!-- Bow wave lines -->
  <path d="M4,44 Q2,48 4,50" fill="none" stroke="#EDE8DC" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M60,44 Q62,48 60,50" fill="none" stroke="#EDE8DC" stroke-width="1" stroke-dasharray="2,2"/>
</svg>
