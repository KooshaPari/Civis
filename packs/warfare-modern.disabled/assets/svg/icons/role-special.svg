<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | role-special.svg | 64x64 monochrome glyph -->
<!-- Special ops: lightning bolt + knife / rappel silhouette + chevron -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Lightning bolt (fast-strike symbol, large, central) -->
  <polygon points="38,6 24,32 34,32 26,58 42,30 32,30" fill="#EDE8DC"/>
  <!-- Knife silhouette (left side, vertical) -->
  <!-- Blade -->
  <polygon points="10,10 14,10 14,38 10,42" fill="#EDE8DC"/>
  <!-- Guard -->
  <rect x="8" y="38" width="8" height="3" rx="1" fill="#EDE8DC"/>
  <!-- Handle -->
  <rect x="10" y="41" width="4" height="10" rx="1" fill="#EDE8DC"/>
  <!-- Three chevrons (lower right, >>>) motif per identity doc -->
  <polyline points="50,44 56,50 50,56" fill="none" stroke="#EDE8DC" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="44,44 50,50 44,56" fill="none" stroke="#EDE8DC" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <polyline points="38,44 44,50 38,56" fill="none" stroke="#EDE8DC" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
</svg>
