name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Rust test
        run: cargo test --all

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install docs deps
        run: npm install
      - name: Build docs
        run: npm run docs:build
