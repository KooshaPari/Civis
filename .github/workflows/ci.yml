name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Rust Module Graph (cargo-modules --deny cyclic per workspace member) ──
  module-graph:
    name: Rust Module Graph
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-modules
        run: cargo install cargo-modules --locked
      - name: Module graph (cargo-modules)
        run: |
          # cargo-modules does not support --workspace; iterate packages.
          failed=0
          while IFS= read -r pkg; do
            echo "--- checking $pkg ---"
            if ! cargo m-check --package "$pkg"; then
              failed=1
            fi
          done < <(cargo metadata --no-deps --format-version 1 | python3 -c "
          import sys, json
          for p in json.load(sys.stdin)['packages']:
              print(p['name'])
          ")
          exit $failed