<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <!-- Holocron command-deck wordmark banner (hand-authored). -->
  <defs>
    <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141A24"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD28A"/>
      <stop offset="0.5" stop-color="#FFB347"/>
      <stop offset="1" stop-color="#E89A2E"/>
    </linearGradient>
  </defs>
  <rect width="640" height="160" rx="20" fill="url(#deck)"/>
  <rect x="0.5" y="0.5" width="639" height="159" rx="19.5" fill="none"
        stroke="#2A3340" stroke-opacity="0.6"/>
  <!-- mini mark (simplified ziggurat) -->
  <g transform="translate(48,32) scale(0.38)">
    <rect x="14" y="14" width="228" height="228" rx="46" fill="#0B0E14" stroke="#2A3340"/>
    <polygon points="128,178 76,150 128,122 180,150" fill="none" stroke="#FFB347" stroke-width="4"/>
    <polygon points="128,140 92,121 128,102 164,121" fill="none" stroke="#FFB347" stroke-width="3.5"/>
    <polygon points="128,108 108,97 128,86 148,97" fill="none" stroke="#FFB347" stroke-width="3"/>
    <circle cx="128" cy="58" r="6" fill="#5BE3FF"/>
  </g>
  <text x="200" y="98" font-family="Segoe UI, system-ui, sans-serif" font-size="72"
        font-weight="600" letter-spacing="6" fill="url(#title)">CIVIS</text>
  <text x="202" y="128" font-family="Segoe UI, system-ui, sans-serif" font-size="18"
        fill="#5BE3FF" opacity="0.75" letter-spacing="2">voxel civilization sandbox</text>
</svg>
