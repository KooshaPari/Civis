name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln
        env:
          CI: 'true'

      - name: Build dependencies (ordered)
        run: |
          for p in \
            src/SDK/DINOForge.SDK.csproj \
            src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            src/Bridge/Client/DINOForge.Bridge.Client.csproj \
            src/Domains/Warfare/DINOForge.Domains.Warfare.csproj \
            src/Domains/Economy/DINOForge.Domains.Economy.csproj \
            src/Domains/Scenario/DINOForge.Domains.Scenario.csproj \
            src/Domains/UI/DINOForge.Domains.UI.csproj \
            src/Tools/Installer/InstallerLib/DINOForge.Tools.Installer.csproj; do
            dotnet build "$p" -c Release --no-restore --verbosity minimal || exit 1
          done
        # Note: Runtime excluded - requires Unity which is only available locally

      - name: Build
        run: dotnet build src/DINOForge.CI.NoRuntime.sln --no-restore --configuration Release /p:BuildInParallel=false

      # Unit + Integration tests — both projects are in CI.NoRuntime.sln, built above in Release
      - name: Test (Unit)
        run: dotnet test src/Tests/DINOForge.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=unit-test-results.trx"

      - name: Test (Integration)
        run: dotnet test src/Tests/Integration/DINOForge.Tests.Integration.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"

      - name: Export test results to docs
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, glob, xml.etree.ElementTree as ET, os, datetime

          results = {"timestamp": datetime.datetime.utcnow().isoformat(), "suites": []}
          for trx in glob.glob("**/*.trx", recursive=True):
              tree = ET.parse(trx)
              root = tree.getroot()
              ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
              counters = root.find('.//t:ResultSummary/t:Counters', ns)
              if counters is not None:
                  results["suites"].append({
                      "file": trx,
                      "total": int(counters.get("total", 0)),
                      "passed": int(counters.get("passed", 0)),
                      "failed": int(counters.get("failed", 0)),
                      "skipped": int(counters.get("notExecuted", 0)),
                  })

          total = sum(s["total"] for s in results["suites"])
          passed = sum(s["passed"] for s in results["suites"])
          results["summary"] = {"total": total, "passed": passed, "failed": total - passed, "pass_rate": round(passed/total*100, 1) if total else 0}

          os.makedirs("docs/test-results", exist_ok=True)
          with open("docs/test-results/latest.json", "w") as f:
              json.dump(results, f, indent=2)
          print(f"Test results: {passed}/{total} passed ({results['summary']['pass_rate']}%)")
          PYEOF

      - name: Commit test results to docs
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/test-results/latest.json || true
          git diff --staged --quiet || git commit -m "ci: update test results [skip ci]"
          git push || true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@30eadd5010312f995f0d3b3cff7fe2984f69409e # v2.16.1
        if: always()
        with:
          files: |
            **/*.trx
          check_name: Unit & Integration Tests
          compare_to_earlier_commit: false
