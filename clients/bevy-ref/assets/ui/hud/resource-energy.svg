<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Energy: lightning bolt -->
  <defs>
    <filter id="energyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#c07020"/>
    </linearGradient>
  </defs>
  <!-- bolt shadow/glow layer -->
  <polygon points="19,3 10,18 16,18 13,29 22,14 16,14"
    fill="#E8B84B" opacity="0.25" filter="url(#energyGlow)"/>
  <!-- bolt body -->
  <polygon points="19,3 10,18 16,18 13,29 22,14 16,14"
    fill="url(#boltGrad)" stroke="#E8B84B" stroke-width="0.8" filter="url(#energyGlow)"/>
</svg>
