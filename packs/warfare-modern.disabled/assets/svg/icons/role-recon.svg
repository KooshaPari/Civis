<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | role-recon.svg | 64x64 monochrome glyph -->
<!-- Recon: binoculars + running figure silhouette + signal arc -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Binoculars (two circular lenses joined) -->
  <circle cx="20" cy="16" r="9" fill="#EDE8DC"/>
  <circle cx="36" cy="16" r="9" fill="#EDE8DC"/>
  <!-- Bridge between lenses -->
  <rect x="22" y="12" width="12" height="8" fill="#EDE8DC"/>
  <!-- Lens apertures (knockout) -->
  <circle cx="20" cy="16" r="5.5" fill="#1C2B3A"/>
  <circle cx="36" cy="16" r="5.5" fill="#1C2B3A"/>
  <!-- Lens reflection dot -->
  <circle cx="18" cy="14" r="1" fill="#EDE8DC"/>
  <circle cx="34" cy="14" r="1" fill="#EDE8DC"/>
  <!-- Running figure below (stylized, leaning forward) -->
  <!-- Head -->
  <circle cx="50" cy="28" r="5" fill="#EDE8DC"/>
  <!-- Torso (angled forward) -->
  <line x1="50" y1="33" x2="44" y2="44" stroke="#EDE8DC" stroke-width="4" stroke-linecap="round"/>
  <!-- Back arm (trailing) -->
  <line x1="50" y1="36" x2="56" y2="42" stroke="#EDE8DC" stroke-width="3" stroke-linecap="round"/>
  <!-- Front arm (forward, rifle held) -->
  <line x1="48" y1="36" x2="40" y2="32" stroke="#EDE8DC" stroke-width="3" stroke-linecap="round"/>
  <!-- Front leg -->
  <line x1="44" y1="44" x2="38" y2="54" stroke="#EDE8DC" stroke-width="3" stroke-linecap="round"/>
  <!-- Back leg -->
  <line x1="44" y1="44" x2="50" y2="56" stroke="#EDE8DC" stroke-width="3" stroke-linecap="round"/>
  <!-- Signal arc (top right corner) -->
  <path d="M54,8 Q62,12 58,20" fill="none" stroke="#EDE8DC" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M57,6 Q66,12 60,24" fill="none" stroke="#EDE8DC" stroke-width="1" stroke-linecap="round"/>
</svg>
