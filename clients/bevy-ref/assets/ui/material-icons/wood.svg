<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- wood material swatch: cut log end with concentric growth rings + bark -->
  <defs>
    <radialGradient id="woodGrain" cx="42%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#c8893f"/>
      <stop offset="100%" stop-color="#8a5a26"/>
    </radialGradient>
  </defs>
  <!-- bark ring -->
  <circle cx="24" cy="24" r="18" fill="#4a3115" stroke="#2e1d0c" stroke-width="2"/>
  <!-- end-grain face -->
  <circle cx="24" cy="24" r="15" fill="url(#woodGrain)"/>
  <!-- growth rings (off-center pith) -->
  <circle cx="21" cy="21" r="11" fill="none" stroke="#7a4d20" stroke-width="1.2" opacity="0.7"/>
  <circle cx="21" cy="21" r="7.5" fill="none" stroke="#7a4d20" stroke-width="1.2" opacity="0.7"/>
  <circle cx="21" cy="21" r="4" fill="none" stroke="#7a4d20" stroke-width="1.2" opacity="0.7"/>
  <!-- pith -->
  <circle cx="21" cy="21" r="1.6" fill="#5a3a18"/>
  <!-- radial crack -->
  <line x1="21" y1="21" x2="36" y2="30" stroke="#5a3a18" stroke-width="1.3" opacity="0.6"/>
  <!-- highlight sheen -->
  <path d="M14 16 A12 12 0 0 1 26 12" fill="none" stroke="#e0b070" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>
