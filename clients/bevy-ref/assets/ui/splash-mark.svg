<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360">
  <!--
    Civis splash / loading mark — the Star-Wars-projector boot moment
    (docs/design/ui-design-language.md §6 "Loading / boot"): a holo-cyan
    wireframe world building up with scanlines + corner brackets, the
    electric-green voxel glyph at its core, a Geist-mono progress readout.
    Static frame for a splash background; the live boot animates the sweep.
    License: hand-authored for Civis — project-owned.
  -->
  <defs>
    <radialGradient id="spBg" cx="50%" cy="46%" r="60%">
      <stop offset="0" stop-color="#0E3A4A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#05070A" stop-opacity="0"/>
    </radialGradient>
    <filter id="spHolo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="spNeon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="spGlobe"><circle cx="180" cy="158" r="96"/></clipPath>
  </defs>

  <rect width="360" height="360" fill="#05070A"/>
  <circle cx="180" cy="158" r="120" fill="url(#spBg)"/>

  <!-- holo wireframe globe -->
  <g filter="url(#spHolo)" clip-path="url(#spGlobe)">
    <circle cx="180" cy="158" r="96" fill="none" stroke="#7FE9FF" stroke-width="1.4" opacity="0.85"/>
    <g stroke="#7FE9FF" stroke-width="1" fill="none" opacity="0.45">
      <ellipse cx="180" cy="158" rx="96" ry="30"/>
      <ellipse cx="180" cy="158" rx="96" ry="62"/>
      <ellipse cx="180" cy="158" rx="30" ry="96"/>
      <ellipse cx="180" cy="158" rx="62" ry="96"/>
    </g>
    <!-- scanlines -->
    <g stroke="#2FBFE6" stroke-width="1" opacity="0.12">
      <line x1="84" y1="116" x2="276" y2="116"/>
      <line x1="84" y1="128" x2="276" y2="128"/>
      <line x1="84" y1="140" x2="276" y2="140"/>
      <line x1="84" y1="152" x2="276" y2="152"/>
      <line x1="84" y1="164" x2="276" y2="164"/>
      <line x1="84" y1="176" x2="276" y2="176"/>
      <line x1="84" y1="188" x2="276" y2="188"/>
      <line x1="84" y1="200" x2="276" y2="200"/>
    </g>
    <!-- bright scan-sweep line -->
    <line x1="84" y1="170" x2="276" y2="170" stroke="#7FE9FF" stroke-width="1.6" opacity="0.5"/>
  </g>
  <circle cx="180" cy="158" r="96" fill="none" stroke="#7FE9FF" stroke-width="1.6"
          opacity="0.9" filter="url(#spHolo)"/>

  <!-- electric-green voxel glyph at the core (emergence) -->
  <g filter="url(#spNeon)" transform="translate(52,40) scale(0.5)">
    <polygon points="128,178 88,156 128,134 168,156" fill="#0A0D12" fill-opacity="0.7"
             stroke="#3DF07A" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="128,146 100,131 128,116 156,131" fill="#0A0D12" fill-opacity="0.7"
             stroke="#3DF07A" stroke-width="3.6" stroke-linejoin="round"/>
    <polygon points="128,120 110,110 128,100 146,110" fill="#0A0D12" fill-opacity="0.7"
             stroke="#3DF07A" stroke-width="3.4" stroke-linejoin="round"/>
  </g>

  <!-- corner brackets (targeting/blueprint) -->
  <g stroke="#7FE9FF" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round">
    <polyline points="48,72 48,52 68,52"/>
    <polyline points="312,72 312,52 292,52"/>
    <polyline points="48,244 48,264 68,264"/>
    <polyline points="312,244 312,264 292,264"/>
  </g>

  <!-- Geist-mono progress readout -->
  <text x="180" y="312" text-anchor="middle"
        font-family="'Geist Mono','JetBrains Mono',Consolas,monospace"
        font-size="15" letter-spacing="3" fill="#7FE9FF" opacity="0.9">GENERATING WORLD</text>
  <text x="180" y="336" text-anchor="middle"
        font-family="'Geist Mono','JetBrains Mono',Consolas,monospace"
        font-size="13" letter-spacing="2" fill="#ECEFF4">— — . — %</text>
</svg>
