<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Red faction: The Pyre Sigil — angular flame totem, aggressive geometry -->
  <defs>
    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="redAmbient" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ambient -->
  <circle cx="64" cy="72" r="50" fill="url(#redAmbient)"/>
  <!-- outer hexagonal ring (angular) -->
  <polygon points="64,10 96,28 96,100 64,118 32,100 32,28"
    fill="none" stroke="#c0392b" stroke-width="2.5" opacity="0.5"/>
  <!-- inner hexagonal ring -->
  <polygon points="64,22 86,34 86,94 64,106 42,94 42,34"
    fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.35"/>
  <!-- central vertical axis -->
  <line x1="64" y1="18" x2="64" y2="110" stroke="#c0392b" stroke-width="1.5" opacity="0.4"/>
  <!-- primary totem body: tall diamond -->
  <polygon points="64,20 82,64 64,108 46,64"
    fill="#1a0808" stroke="#c0392b" stroke-width="3" stroke-linejoin="round" filter="url(#redGlow)"/>
  <!-- inner fill accent -->
  <polygon points="64,32 74,64 64,96 54,64"
    fill="#2d0a0a" stroke="#c0392b" stroke-width="1.5" opacity="0.8"/>
  <!-- horizontal crossbar (sword-cross motif) -->
  <line x1="40" y1="64" x2="88" y2="64" stroke="#c0392b" stroke-width="4" stroke-linecap="round" filter="url(#redGlow)"/>
  <!-- upper wing spikes -->
  <line x1="64" y1="40" x2="44" y2="52" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" filter="url(#redGlow)"/>
  <line x1="64" y1="40" x2="84" y2="52" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" filter="url(#redGlow)"/>
  <!-- lower wing spikes -->
  <line x1="64" y1="88" x2="44" y2="76" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="88" x2="84" y2="76" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- apex dot -->
  <circle cx="64" cy="20" r="4" fill="#c0392b" filter="url(#redGlow)"/>
  <!-- base dot -->
  <circle cx="64" cy="108" r="3" fill="#c0392b" opacity="0.6"/>
  <!-- eye motif at center -->
  <ellipse cx="64" cy="64" rx="7" ry="5" fill="#0a0000" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="64" cy="64" r="3" fill="#e74c3c" filter="url(#redGlow)"/>
</svg>
