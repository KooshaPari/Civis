name: CI Status Badges

on:
  schedule:
    # Run every 6 hours to keep badges fresh
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.yml'
      - 'scripts/ci/generate-badges.py'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  update-badges:
    name: Update CI Status Badges
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Generate badges
        run: python scripts/ci/generate-badges.py --repo ${{ github.repository }} --workflows ci,build-gate,lint,test-isolation,polyglot-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit badge updates
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md || true
          git diff --staged --quiet || git commit -m "ci: update CI status badges [skip ci]"
          git push || true
