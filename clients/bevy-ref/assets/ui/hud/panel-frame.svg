<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 160">
  <!--
    9-slice glass panel frame.
    Corner radius: 12px. Border: 2px cyan.
    Slice lines: at x=20, x=236 (left/right), y=20, y=140 (top/bottom).
    Scale the center freely; corners are fixed 20x20px slices.
  -->
  <defs>
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1628" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#060e1a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="topSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#50C8F0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50C8F0" stop-opacity="0"/>
    </linearGradient>
    <filter id="borderGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- background fill -->
  <rect x="0" y="0" width="256" height="160" rx="12" ry="12" fill="url(#panelBg)"/>
  <!-- top sheen (glass highlight) -->
  <rect x="2" y="2" width="252" height="60" rx="10" ry="10" fill="url(#topSheen)"/>
  <!-- border (glowing) -->
  <rect x="1" y="1" width="254" height="158" rx="11" ry="11"
    fill="none" stroke="#50C8F0" stroke-width="2" filter="url(#borderGlow)"/>
  <!-- inner accent border (subtle) -->
  <rect x="4" y="4" width="248" height="152" rx="9" ry="9"
    fill="none" stroke="#50C8F0" stroke-width="0.5" opacity="0.25"/>
  <!-- corner dots (decorative) -->
  <circle cx="14" cy="14" r="3" fill="#50C8F0" opacity="0.5"/>
  <circle cx="242" cy="14" r="3" fill="#50C8F0" opacity="0.5"/>
  <circle cx="14" cy="146" r="3" fill="#50C8F0" opacity="0.5"/>
  <circle cx="242" cy="146" r="3" fill="#50C8F0" opacity="0.5"/>
  <!-- top edge tick marks (decorative) -->
  <line x1="48" y1="1" x2="48" y2="5" stroke="#50C8F0" stroke-width="1" opacity="0.4"/>
  <line x1="208" y1="1" x2="208" y2="5" stroke="#50C8F0" stroke-width="1" opacity="0.4"/>
  <line x1="128" y1="1" x2="128" y2="6" stroke="#50C8F0" stroke-width="1.5" opacity="0.5"/>
  <!-- Slice guide lines (dotted — guides only, not rendered in game) -->
  <!-- x=20 -->  <line x1="20" y1="0" x2="20" y2="160" stroke="#FF00FF" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2"/>
  <!-- x=236 --> <line x1="236" y1="0" x2="236" y2="160" stroke="#FF00FF" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2"/>
  <!-- y=20 -->  <line x1="0" y1="20" x2="256" y2="20" stroke="#FF00FF" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2"/>
  <!-- y=140 --> <line x1="0" y1="140" x2="256" y2="140" stroke="#FF00FF" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2"/>
</svg>
