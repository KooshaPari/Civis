<?xml version="1.0" encoding="UTF-8"?>
<!-- DINOForge Warfare-Modern | loading-western.svg | 1920x1080 Western Alliance loading background -->
<!-- Palette: #141A18 base, #1C2B3A navy, #4A5240 olive, #F5A623 amber, #EDE8DC buff, #39D353 comms-green -->
<!-- Layout: satellite-pass / tactical HUD / briefing aesthetic. Space reserved for logo (top-center 480x96) and progress bar (bottom, within panel). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Satellite-pass dark background gradient (top dark, slight lighter center vignette) -->
    <radialGradient id="bg-vignette" cx="50%" cy="45%" r="70%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#1C2318" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0A0E0C" stop-opacity="1"/>
    </radialGradient>
    <!-- Grid line pattern (128x96 cells, 1px #EDE8DC 5% opacity) -->
    <pattern id="tactical-grid" x="0" y="0" width="128" height="96" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="128" y2="0" stroke="#EDE8DC" stroke-width="0.6" stroke-opacity="0.05"/>
      <line x1="0" y1="0" x2="0" y2="96" stroke="#EDE8DC" stroke-width="0.6" stroke-opacity="0.05"/>
    </pattern>
    <!-- Terrain contour-like noise pattern (simulated aerial imagery) -->
    <pattern id="terrain-marks" x="0" y="0" width="256" height="256" patternUnits="userSpaceOnUse">
      <!-- Irregular terrain patches -->
      <ellipse cx="80" cy="60" rx="50" ry="30" fill="#2E3528" fill-opacity="0.25"/>
      <ellipse cx="180" cy="140" rx="60" ry="25" fill="#3A4030" fill-opacity="0.2"/>
      <ellipse cx="30" cy="180" rx="35" ry="45" fill="#252E22" fill-opacity="0.18"/>
      <ellipse cx="200" cy="50" rx="40" ry="20" fill="#2E3528" fill-opacity="0.15"/>
      <!-- Road-like straight lines -->
      <line x1="0" y1="130" x2="256" y2="110" stroke="#3A4235" stroke-width="2" stroke-opacity="0.12"/>
      <line x1="90" y1="0" x2="120" y2="256" stroke="#3A4235" stroke-width="1.5" stroke-opacity="0.10"/>
    </pattern>
  </defs>

  <!-- === LAYER 1: Base background === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#bg-vignette)"/>

  <!-- === LAYER 2: Terrain texture overlay === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#terrain-marks)"/>

  <!-- === LAYER 3: Tactical grid overlay === -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#tactical-grid)"/>

  <!-- === LAYER 4: Satellite scan sweep lines (horizontal, very subtle) === -->
  <line x1="0" y1="270" x2="1920" y2="270" stroke="#39D353" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#39D353" stroke-width="0.4" stroke-opacity="0.06"/>
  <line x1="0" y1="810" x2="1920" y2="810" stroke="#39D353" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- === LAYER 5: Edge vignette (darkening borders) === -->
  <defs>
    <linearGradient id="left-vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0E0C" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#0A0E0C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="right-vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="75%" stop-color="#0A0E0C" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0E0C" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="top-vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060A08" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#060A08" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottom-vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="80%" stop-color="#060A08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#060A08" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="480" height="1080" fill="url(#left-vignette)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#right-vignette)"/>
  <rect x="0" y="0" width="1920" height="216" fill="url(#top-vignette)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#bottom-vignette)"/>

  <!-- === LAYER 6: Decorative corner bracket marks (tactical overlay) === -->
  <!-- Top-left corner bracket -->
  <polyline points="40,40 40,100 100,100" fill="none" stroke="#4A5240" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Top-right corner bracket -->
  <polyline points="1880,40 1880,100 1820,100" fill="none" stroke="#4A5240" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Bottom-left corner bracket -->
  <polyline points="40,1040 40,980 100,980" fill="none" stroke="#4A5240" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Bottom-right corner bracket -->
  <polyline points="1880,1040 1880,980 1820,980" fill="none" stroke="#4A5240" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Crosshair corner tick marks (inner) -->
  <line x1="40" y1="70" x2="56" y2="70" stroke="#F5A623" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="70" y1="40" x2="70" y2="56" stroke="#F5A623" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="1880" y1="70" x2="1864" y2="70" stroke="#F5A623" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="1850" y1="40" x2="1850" y2="56" stroke="#F5A623" stroke-width="1" stroke-opacity="0.5"/>

  <!-- === LAYER 7: CENTRAL BRIEFING PANEL (860x480, centered) === -->
  <!-- Panel shadow -->
  <rect x="526" y="298" width="868" height="488" rx="0" fill="#000000" fill-opacity="0.4"/>
  <!-- Panel body: #1C2318 @ 92% -->
  <rect x="524" y="296" width="868" height="484" fill="#1C2318" fill-opacity="0.92"/>
  <!-- Panel border: 1px #4A5240 -->
  <rect x="524" y="296" width="868" height="484" fill="none" stroke="#4A5240" stroke-width="1"/>
  <!-- Panel left accent strip: 3px #F5A623 (Alliance) -->
  <rect x="524" y="296" width="3" height="484" fill="#F5A623"/>

  <!-- TOP STRIP (860x56): faction designations -->
  <!-- Left half: Western Alliance (red+navy split) -->
  <rect x="527" y="299" width="430" height="55" fill="#1C2B3A"/>
  <!-- Right half: Classic Enemy -->
  <rect x="957" y="299" width="432" height="55" fill="#1C2B3A" fill-opacity="0.6"/>
  <!-- Center divider -->
  <line x1="957" y1="299" x2="957" y2="354" stroke="#EDE8DC" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Faction label: WESTERN ALLIANCE (left) -->
  <text x="600" y="332" font-family="Oswald, sans-serif" font-size="14" font-weight="700" fill="#EDE8DC" text-anchor="middle" letter-spacing="3">WESTERN ALLIANCE</text>
  <!-- Faction label: CLASSIC ENEMY (right) -->
  <text x="1175" y="332" font-family="Oswald, sans-serif" font-size="14" font-weight="700" fill="#EDE8DC" text-anchor="middle" letter-spacing="3">CLASSIC ENEMY</text>
  <!-- Alliance faction icon (simplified compass rose, 32x32) -->
  <circle cx="555" cy="327" r="12" fill="none" stroke="#EDE8DC" stroke-width="1.5"/>
  <line x1="555" y1="315" x2="555" y2="339" stroke="#F5A623" stroke-width="1.5"/>
  <line x1="543" y1="327" x2="567" y2="327" stroke="#F5A623" stroke-width="1.5"/>
  <line x1="547" y1="319" x2="563" y2="335" stroke="#F5A623" stroke-width="1"/>
  <line x1="563" y1="319" x2="547" y2="335" stroke="#F5A623" stroke-width="1"/>
  <!-- Enemy faction icon (5-point star outline, 32x32) -->
  <polygon points="1367,315 1369.4,322.6 1377,322.6 1371,327.4 1373.4,335 1367,330.3 1360.6,335 1363,327.4 1357,322.6 1364.6,322.6"
    fill="#EDE8DC" fill-opacity="0.7"/>

  <!-- Header rule below top strip -->
  <line x1="527" y1="354" x2="1391" y2="354" stroke="#4A5240" stroke-width="1"/>

  <!-- CENTER ZONE (860x360): mission briefing content -->
  <!-- Mission map placeholder (256x256, left-anchored, 6px olive border) -->
  <rect x="539" y="366" width="256" height="256" fill="#0E1410"/>
  <rect x="539" y="366" width="256" height="256" fill="none" stroke="#4A5240" stroke-width="6"/>
  <!-- Map grid inside placeholder -->
  <line x1="539" y1="409" x2="795" y2="409" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="539" y1="452" x2="795" y2="452" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="539" y1="495" x2="795" y2="495" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="539" y1="538" x2="795" y2="538" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="582" y1="366" x2="582" y2="622" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="625" y1="366" x2="625" y2="622" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="668" y1="366" x2="668" y2="622" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="711" y1="366" x2="711" y2="622" stroke="#2E3528" stroke-width="0.8"/>
  <line x1="754" y1="366" x2="754" y2="622" stroke="#2E3528" stroke-width="0.8"/>
  <!-- Map "unit" markers -->
  <circle cx="600" cy="420" r="4" fill="#F5A623" fill-opacity="0.7"/>
  <circle cx="640" cy="470" r="3" fill="#F5A623" fill-opacity="0.5"/>
  <rect x="700" y="500" width="8" height="8" fill="#CC2929" fill-opacity="0.7"/>
  <!-- MAP label -->
  <text x="667" y="634" font-family="Share Tech Mono, monospace" font-size="10" fill="#A0A08A" text-anchor="middle" letter-spacing="2">THEATER MAP</text>

  <!-- Right side: mission designation and briefing text (starts at x=811) -->
  <!-- Mission title -->
  <text x="811" y="400" font-family="Oswald, sans-serif" font-size="28" font-weight="700" fill="#F5A623" letter-spacing="2">OPERATION IRONLINE</text>
  <!-- Mission designation sub-header -->
  <text x="811" y="424" font-family="Share Tech Mono, monospace" font-size="11" fill="#A0A08A" letter-spacing="3">THEATER 01  //  PHASE 02  //  D+14</text>
  <!-- Briefing divider line -->
  <line x1="811" y1="434" x2="1375" y2="434" stroke="#4A5240" stroke-width="1"/>
  <!-- Briefing paragraph (lore, 3 lines) -->
  <text x="811" y="460" font-family="Special Elite, serif" font-size="13" fill="#C9A96E" xml:space="preserve">Allied forward elements have pushed to the Korsova ridge line.</text>
  <text x="811" y="480" font-family="Special Elite, serif" font-size="13" fill="#C9A96E" xml:space="preserve">Enemy armored columns are massing in the eastern lowland. Air</text>
  <text x="811" y="500" font-family="Special Elite, serif" font-size="13" fill="#C9A96E" xml:space="preserve">support is degraded — ground forces must hold the chokepoints.</text>
  <!-- Classification line -->
  <text x="811" y="535" font-family="Barlow Condensed, sans-serif" font-size="13" fill="#A0A08A" letter-spacing="2">CLASSIFICATION:  </text>
  <text x="979" y="535" font-family="Barlow Condensed, sans-serif" font-size="13" fill="#F5A623" font-weight="700" letter-spacing="2">[REDACTED]</text>
  <!-- Warning glyph (triangle) -->
  <polygon points="960,527 968,540 952,540" fill="#F5A623"/>
  <!-- Secondary info fields -->
  <text x="811" y="565" font-family="Share Tech Mono, monospace" font-size="11" fill="#606050" letter-spacing="1">COMMANDER: COL. A. HARKER  //  AUTH: SIGMA-7</text>
  <text x="811" y="582" font-family="Share Tech Mono, monospace" font-size="11" fill="#606050" letter-spacing="1">SECTOR: KORSOVA-NORTH  //  THREAT: HIGH</text>

  <!-- BOTTOM STRIP (860x64): progress bar area -->
  <line x1="527" y1="715" x2="1391" y2="715" stroke="#4A5240" stroke-width="1"/>
  <!-- Progress bar track -->
  <rect x="539" y="724" width="840" height="6" rx="3" fill="#2E3528"/>
  <!-- Progress bar fill placeholder (game will animate this; shown at 64% for preview) -->
  <rect x="539" y="724" width="538" height="6" rx="3" fill="#39D353"/>
  <!-- Loading status text -->
  <text x="539" y="749" font-family="Share Tech Mono, monospace" font-size="12" fill="#A0A08A" letter-spacing="2">LOADING THEATER ASSETS... 64%</text>
  <!-- Pulsing dot placeholder -->
  <circle cx="1381" cy="745" r="4" fill="#F5A623"/>

  <!-- === LAYER 8: LOGO PLACEHOLDER (top-center 480x96) === -->
  <!-- Bounding box hint for logo placement -->
  <rect x="720" y="140" width="480" height="96" fill="none" stroke="#4A5240" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.4"/>
  <!-- WARFARE: MODERN wordmark placeholder -->
  <text x="960" y="200" font-family="Bebas Neue, Oswald, sans-serif" font-size="48" font-weight="400" fill="#EDE8DC" text-anchor="middle" letter-spacing="12">WARFARE: MODERN</text>
  <!-- Brevity line (extends 40px past right edge of wordmark) -->
  <line x1="720" y1="212" x2="1244" y2="212" stroke="#EDE8DC" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- === LAYER 10: Scan line overlay (very subtle, CRT feel) === -->
  <defs>
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="1" fill="#000000" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#scanlines)"/>
</svg>
