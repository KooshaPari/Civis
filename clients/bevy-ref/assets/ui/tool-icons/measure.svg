<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- measure / ruler tool: diagonal ruler with tick marks -->
  <g transform="rotate(-45 32 32)">
    <rect x="8" y="26" width="48" height="12" rx="2"
      fill="#0d1628" stroke="#50C8F0" stroke-width="2.5" filter="url(#glow)"/>
    <!-- tick marks -->
    <line x1="16" y1="26" x2="16" y2="33" stroke="#50C8F0" stroke-width="1.5"/>
    <line x1="24" y1="26" x2="24" y2="36" stroke="#50C8F0" stroke-width="1.5"/>
    <line x1="32" y1="26" x2="32" y2="33" stroke="#50C8F0" stroke-width="1.5"/>
    <line x1="40" y1="26" x2="40" y2="36" stroke="#50C8F0" stroke-width="1.5"/>
    <line x1="48" y1="26" x2="48" y2="33" stroke="#50C8F0" stroke-width="1.5"/>
  </g>
  <!-- gold endpoint nodes -->
  <circle cx="13" cy="51" r="3" fill="#E8B84B" filter="url(#glow)"/>
  <circle cx="51" cy="13" r="3" fill="#E8B84B" filter="url(#glow)"/>
</svg>
